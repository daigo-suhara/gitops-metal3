kind: Cluster
apiVersion: kind.x-k8s.io/v1alpha4
name: metal3-mgmt
networking:
  apiServerAddress: "0.0.0.0"
  apiServerPort: 6443
  podSubnet: "10.244.0.0/16"
  serviceSubnet: "10.96.0.0/12"
nodes:
  - role: control-plane
    extraPortMappings:
      - containerPort: 80
        hostPort: 80
        protocol: TCP
      - containerPort: 443
        hostPort: 443
        protocol: TCP
      - containerPort: 6385
        hostPort: 6385
        protocol: TCP
      - containerPort: 5050
        hostPort: 5050
        protocol: TCP
      - containerPort: 6180
        hostPort: 6180
        protocol: TCP
