apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
namespace: argocd
resources:
  - https://raw.githubusercontent.com/argoproj/argo-cd/v2.13.0/manifests/install.yaml
  - argocd-ingress.yaml

patches:
  - target:
      kind: Deployment
      name: argocd-server
    patch: |
      - op: add
        path: /spec/template/spec/containers/0/args/-
        value: "--insecure"

  - target:
      kind: Service
      name: argocd-server
    patch: |
      - op: replace
        path: /spec/nodePort
        value: null
      - op: replace
        path: /spec/type
        value: LoadBalancer
