apiVersion: apps/v1
kind: Deployment
metadata:
  name: baremetal-operator-ironic
spec:
  template:
    spec:
      securityContext:
        runAsNonRoot: false
      volumes:
        # Persistent so image-mirror-populate's downloaded qcow2 survives
        # Ironic pod restarts; backed by the ironic-data PVC managed by
        # system/image-mirror/. emptyDir is nulled to drop the base's
        # default and avoid "more than 1 volume type" validation.
        - name: ironic-data-volume
          emptyDir: null
          persistentVolumeClaim:
            claimName: ironic-data
      containers:
        - name: ironic
          envFrom:
            - configMapRef:
                name: ironic
        - name: ironic-dnsmasq
          envFrom:
            - configMapRef:
                name: ironic
        - name: ironic-log-watch
          envFrom:
            - configMapRef:
                name: ironic
        - name: ironic-httpd
          envFrom:
            - configMapRef:
                name: ironic
          securityContext:
            runAsUser: 0
            privileged: true
            allowPrivilegeEscalation: true
            capabilities:
              add:
                - ALL
      initContainers:
        - name: ironic-ipa-downloader
          envFrom:
            - configMapRef:
                name: ironic
