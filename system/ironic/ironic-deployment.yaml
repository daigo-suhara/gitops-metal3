apiVersion: apps/v1
kind: Deployment
metadata:
  name: baremetal-operator-ironic
  namespace: metal3
spec:
  template:
    spec:
      hostNetwork: true
      securityContext:
        runAsNonRoot: false
        fsGroup: 994
      initContainers:
        - name: image-downloader
          image: alpine:3.20
          securityContext:
            runAsUser: 0
          command: ["sh", "-c"]
          args:
            - |
              set -ex
              apk add --no-cache curl
              DEST=/shared/html/images
              mkdir -p $DEST /shared/tftpboot /shared/ironic /shared/db

              IPA_BASE="https://tarballs.openstack.org/ironic-python-agent/dib/files"
              if [ ! -f $DEST/ironic-python-agent.kernel ]; then
                curl -L -o $DEST/ironic-python-agent.kernel $IPA_BASE/ipa-centos9-master.kernel
                curl -L -o $DEST/ironic-python-agent.initramfs $IPA_BASE/ipa-centos9-master.initramfs
              fi

              chmod -R 777 /shared
          volumeMounts:
            - name: ironic-data-volume
              mountPath: /shared
            - name: ironic-conf-volume
              mountPath: /conf
            - name: ironic-data-state-volume
              mountPath: /data
      containers:
        - name: ironic-dnsmasq
          volumeMounts:
            - name: ironic-data-volume
              mountPath: /shared
            - name: ironic-conf-volume
              mountPath: /conf
            - name: ironic-data-state-volume
              mountPath: /data
          envFrom:
            - configMapRef:
                name: ironic
        - name: ironic
          volumeMounts:
            - name: ironic-data-volume
              mountPath: /shared
            - name: ironic-conf-volume
              mountPath: /conf
            - name: ironic-data-state-volume
              mountPath: /data
          envFrom:
            - configMapRef:
                name: ironic
          livenessProbe:
            failureThreshold: 30
          readinessProbe:
            failureThreshold: 30
        - name: ironic-log-watch
          volumeMounts:
            - name: ironic-data-volume
              mountPath: /shared
            - name: ironic-conf-volume
              mountPath: /conf
            - name: ironic-data-state-volume
              mountPath: /data
          envFrom:
            - configMapRef:
                name: ironic
        - name: ironic-httpd
          volumeMounts:
            - name: ironic-data-volume
              mountPath: /shared
            - name: ironic-conf-volume
              mountPath: /conf
            - name: ironic-data-state-volume
              mountPath: /data
          securityContext:
            runAsUser: 0
          envFrom:
            - configMapRef:
                name: ironic
          livenessProbe:
            failureThreshold: 30
          readinessProbe:
            failureThreshold: 30
      volumes:
        - name: ironic-data-volume
          persistentVolumeClaim:
            claimName: image-pvc
        - name: ironic-conf-volume
          emptyDir: {}
        - name: ironic-data-state-volume
          emptyDir: {}
