apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  name: hostclaims.metal3.io
spec:
  group: metal3.io
  names:
    kind: HostClaim
    listKind: HostClaimList
    plural: hostclaims
    singular: hostclaim
  scope: Namespaced
  versions:
  - name: v1alpha1
    served: true
    storage: true
    schema:
      openAPIV3Schema:
        type: object
        properties:
          spec:
            type: object
            x-kubernetes-preserve-unknown-fields: true
          status:
            type: object
            x-kubernetes-preserve-unknown-fields: true
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: image-pvc
  namespace: metal3
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 50Gi
