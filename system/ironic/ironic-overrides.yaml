apiVersion: apps/v1
kind: Deployment
metadata:
  name: baremetal-operator-controller-manager
  namespace: metal3
spec:
  template:
    spec:
      hostNetwork: true
      securityContext:
        runAsNonRoot: false
        fsGroup: 994
      initContainers:
        - name: image-downloader
          image: alpine:3.20
          securityContext:
            runAsUser: 0
          command: ["sh", "-c"]
          args:
            - |
              set -ex
              apk add --no-cache curl
              DEST=/shared/html/images
              mkdir -p $DEST /shared/tftpboot /shared/ironic /shared/db

              IPA_BASE="https://tarballs.openstack.org/ironic-python-agent/dib/files"
              if [ ! -f $DEST/ironic-python-agent.kernel ]; then
                curl -L -o $DEST/ironic-python-agent.kernel $IPA_BASE/ipa-centos9-master.kernel
                curl -L -o $DEST/ironic-python-agent.initramfs $IPA_BASE/ipa-centos9-master.initramfs
              fi

              chmod -R 777 /shared
          volumeMounts:
            - name: ironic-data-volume
              mountPath: /shared
            - name: ironic-conf-volume
              mountPath: /conf
            - name: ironic-data-state-volume
              mountPath: /data
      containers:
        - name: ironic-dnsmasq
          volumeMounts:
            - name: ironic-data-volume
              mountPath: /shared
            - name: ironic-conf-volume
              mountPath: /conf
            - name: ironic-data-state-volume
              mountPath: /data
          envFrom:
            - configMapRef:
                name: ironic
        - name: ironic
          volumeMounts:
            - name: ironic-data-volume
              mountPath: /shared
            - name: ironic-conf-volume
              mountPath: /conf
            - name: ironic-data-state-volume
              mountPath: /data
          envFrom:
            - configMapRef:
                name: ironic
          livenessProbe:
            failureThreshold: 30
          readinessProbe:
            failureThreshold: 30
        - name: ironic-log-watch
          volumeMounts:
            - name: ironic-data-volume
              mountPath: /shared
            - name: ironic-conf-volume
              mountPath: /conf
            - name: ironic-data-state-volume
              mountPath: /data
          envFrom:
            - configMapRef:
                name: ironic
        - name: ironic-httpd
          volumeMounts:
            - name: ironic-data-volume
              mountPath: /shared
            - name: ironic-conf-volume
              mountPath: /conf
            - name: ironic-data-state-volume
              mountPath: /data
          securityContext:
            runAsUser: 0
          envFrom:
            - configMapRef:
                name: ironic
          livenessProbe:
            failureThreshold: 30
          readinessProbe:
            failureThreshold: 30
      volumes:
        - name: ironic-data-volume
          persistentVolumeClaim:
            claimName: image-pvc
        - name: ironic-conf-volume
          emptyDir: {}
        - name: ironic-data-state-volume
          emptyDir: {}
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: ironic
  namespace: metal3
data:
  PROVISIONING_INTERFACE: enx00e04c247a98
  PROVISIONING_IP: 172.16.0.10
  PROVISIONING_GATEWAY: 172.16.0.1
  PROVISIONING_DNS: 8.8.8.8
  HTTP_PORT: "6180"
  DHCP_RANGE: 172.16.10.101,172.16.10.200
  IRONIC_KERNEL_PARAMS: console=tty0 console=ttyS0,115200 nomodeset
  IRONIC_FAST_TRACK: "true"
  IRONIC_PROVISIONING_INTERFACE: enx00e04c247a98
  DEPLOY_KERNEL_URL: file:///shared/html/images/ironic-python-agent.kernel
  DEPLOY_RAMDISK_URL: file:///shared/html/images/ironic-python-agent.initramfs
  IRONIC_ENDPOINT: http://172.16.0.10:6385/v1/
  IRONIC_BASE_URL: http://172.16.0.10:6385
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: baremetal-operator-manager-role
rules:
  - apiGroups:
      - metal3.io
    resources:
      - hostclaims
    verbs:
      - get
      - list
      - watch
      - create
      - update
      - patch
      - delete
