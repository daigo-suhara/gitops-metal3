apiVersion: v1
kind: ConfigMap
metadata:
  name: ironic
data:
  PROVISIONING_INTERFACE: enx00e04c247a98
  PROVISIONING_IP: 172.16.0.10
  GATEWAY_IP: 172.16.0.1
  DNS_IP: 8.8.8.8
  HTTP_PORT: "6180"
