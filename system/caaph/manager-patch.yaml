apiVersion: apps/v1
kind: Deployment
metadata:
  name: caaph-controller-manager
  namespace: caaph-system
spec:
  template:
    spec:
      containers:
        - name: manager
          image: registry.k8s.io/cluster-api-helm/cluster-api-helm-controller:v0.4.1
          args:
            - --leader-elect
            - --diagnostics-address=:8443
            - --insecure-diagnostics=false
            - --sync-period=10m
            - --v=2
