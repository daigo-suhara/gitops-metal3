# Backing store for Ironic's HTTP-served /shared/html. Populated by
# populator-job and consumed by the ironic Deployment (see
# system/ironic/ironic-deployment-patch.yaml). RWO is fine because
# mgmt is single-node microk8s; both mounters land on the same host.
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: ironic-data
spec:
  accessModes: [ReadWriteOnce]
  storageClassName: microk8s-hostpath
  resources:
    requests:
      storage: 10Gi
