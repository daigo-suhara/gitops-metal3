apiVersion: v1
kind: ServiceAccount
metadata:
  name: cluster-registrar
  namespace: argocd
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: cluster-registrar
rules:
  - apiGroups: [""]
    resources: ["secrets"]
    verbs: ["get", "list", "watch", "create", "update", "patch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: cluster-registrar
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: cluster-registrar
subjects:
  - kind: ServiceAccount
    name: cluster-registrar
    namespace: argocd
---
apiVersion: batch/v1
kind: CronJob
metadata:
  name: register-homelab
  namespace: argocd
spec:
  schedule: "*/5 * * * *"
  concurrencyPolicy: Replace
  successfulJobsHistoryLimit: 1
  failedJobsHistoryLimit: 1
  jobTemplate:
    spec:
      template:
        spec:
          serviceAccountName: cluster-registrar
          restartPolicy: OnFailure
          containers:
            - name: register
              image: bitnami/kubectl:1.31
              command:
                - sh
                - -c
                - |
                  set -eu
                  KCFG=$(kubectl -n metal3 get secret homelab-kubeconfig -o jsonpath='{.data.value}' | base64 -d)
                  SERVER=$(echo "$KCFG" | grep -m1 server: | awk '{print $2}')
                  CA=$(echo "$KCFG" | awk '/certificate-authority-data:/{print $2; exit}')
                  CERT=$(echo "$KCFG" | awk '/client-certificate-data:/{print $2; exit}')
                  KEY=$(echo "$KCFG" | awk '/client-key-data:/{print $2; exit}')
                  CONFIG=$(printf '{"tlsClientConfig":{"caData":"%s","certData":"%s","keyData":"%s"}}' "$CA" "$CERT" "$KEY")
                  cat <<EOF | kubectl apply -f -
                  apiVersion: v1
                  kind: Secret
                  metadata:
                    name: homelab-cluster
                    namespace: argocd
                    labels:
                      argocd.argoproj.io/secret-type: cluster
                  stringData:
                    name: homelab
                    server: $SERVER
                    config: |
                      $CONFIG
                  EOF
