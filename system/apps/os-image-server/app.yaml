apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: os-image-server
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://github.com/daigo-suhara/gitops-metal3.git
    targetRevision: HEAD
    path: system/apps/os-image-server/manifests
  destination:
    server: https://kubernetes.default.svc
    namespace: metal3
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
