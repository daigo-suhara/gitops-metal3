apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: os-image-pvc
  namespace: metal3
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 50Gi
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: os-image-server
  namespace: metal3
spec:
  replicas: 1
  selector:
    matchLabels:
      app: os-image-server
  template:
    metadata:
      labels:
        app: os-image-server
    spec:
      initContainers:
        - name: downloader
          image: alpine:3.20
          command: ["/bin/sh", "-c"]
          args:
            - |
              set -ex
              apk add --no-cache curl qemu-img
              DEST=/usr/share/nginx/html
              mkdir -p $DEST
              
              # 1. IPA (Ironic Python Agent)
              IPA_BASE="https://tarballs.opendev.org/openstack/ironic-python-agent/dib"
              if [ ! -f $DEST/ironic-python-agent.kernel ]; then
                curl -L -o $DEST/ironic-python-agent.kernel $IPA_BASE/ipa-centos9-master.kernel
                curl -L -o $DEST/ironic-python-agent.initramfs $IPA_BASE/ipa-centos9-master.initramfs
              fi
              
              # 2. OSISM Image
              IMAGE_URL="https://nbg1.your-objectstorage.com/osism/openstack-k8s-capi-images/ubuntu-2404-kube-v1.35/ubuntu-2404-kube-v1.35.qcow2"
              if [ ! -f $DEST/ubuntu-2404-kube-v1.35.raw ]; then
                curl -L -o $DEST/tmp.qcow2 $IMAGE_URL
                qemu-img convert -f qcow2 -O raw $DEST/tmp.qcow2 $DEST/ubuntu-2404-kube-v1.35.raw
                rm $DEST/tmp.qcow2
                sha256sum $DEST/ubuntu-2404-kube-v1.35.raw > $DEST/ubuntu-2404-kube-v1.35.raw.sha256
              fi
              chmod -R 644 $DEST/*
          volumeMounts:
            - name: storage
              mountPath: /usr/share/nginx/html
      containers:
        - name: nginx
          image: nginx:alpine
          ports:
            - containerPort: 80
          volumeMounts:
            - name: storage
              mountPath: /usr/share/nginx/html
      volumes:
        - name: storage
          persistentVolumeClaim:
            claimName: os-image-pvc
---
apiVersion: v1
kind: Service
metadata:
  name: os-image-server
  namespace: metal3
spec:
  type: NodePort
  ports:
    - port: 80
      targetPort: 80
      nodePort: 30180
  selector:
    app: os-image-server
