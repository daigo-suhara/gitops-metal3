apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
namespace: metal3

resources:
  - 00-namespace.yaml
  - hostclaims-crd.yaml
  - image-pvc.yaml
  - https://github.com/metal3-io/baremetal-operator//config/default?ref=release-0.9
  - https://github.com/metal3-io/baremetal-operator//ironic-deployment/default?ref=release-0.9

generatorOptions:
  disableNameSuffixHash: true

patches:
  - target:
      kind: ClusterRole
      name: baremetal-operator-manager-role
    patch: |
      - op: add
        path: /rules/-
        value:
          apiGroups:
            - metal3.io
          resources:
            - hostclaims
          verbs:
            - get
            - list
            - watch
            - create
            - update
            - patch
            - delete

  - target:
      kind: CustomResourceDefinition
      name: (.*).metal3.io
    patch: |
      - op: replace
        path: /metadata/annotations/cert-manager.io~1inject-ca-from
        value: metal3/baremetal-operator-serving-cert

  - target:
      kind: ValidatingWebhookConfiguration
      name: baremetal-operator-validating-webhook-configuration
    patch: |
      - op: replace
        path: /metadata/annotations/cert-manager.io~1inject-ca-from
        value: metal3/baremetal-operator-serving-cert

  - target:
      kind: Certificate
      name: baremetal-operator-serving-cert
    patch: |
      - op: replace
        path: /spec/dnsNames/0
        value: baremetal-operator-webhook-service.metal3.svc
      - op: replace
        path: /spec/dnsNames/1
        value: baremetal-operator-webhook-service.metal3.svc.cluster.local

  - target:
      kind: Deployment
      name: baremetal-operator-ironic
    patch: |
      - op: replace
        path: /spec/template/spec/securityContext/runAsNonRoot
        value: false
      - op: replace
        path: /spec/template/spec/initContainers
        value:
          - name: image-downloader
            image: alpine:3.20
            securityContext:
              runAsUser: 0
            command: ["sh", "-c"]
            args:
              - |
                set -ex
                apk add --no-cache curl xz jq
                DEST=/shared/html/images
                mkdir -p $DEST /shared/tftpboot /shared/ironic /shared/db
                chmod -R 777 /shared

                # 1. Download IPA (Ironic Python Agent)
                # Use reliable RDO project URLs
                IPA_BASE="https://images.rdoproject.org/central/ironic/ipa/master/centos9"
                
                if [ -f $DEST/ironic-python-agent.kernel ] && grep -q "404 Not Found" $DEST/ironic-python-agent.kernel; then
                  rm -f $DEST/ironic-python-agent.kernel $DEST/ironic-python-agent.initramfs
                fi

                if [ ! -f $DEST/ironic-python-agent.kernel ]; then
                  curl -L -o $DEST/ironic-python-agent.kernel $IPA_BASE/ipa-centos9-master.kernel
                  curl -L -o $DEST/ironic-python-agent.initramfs $IPA_BASE/ipa-centos9-master.initramfs
                fi

                # 2. Download Pre-built Image and Convert to RAW
                IMAGE_URL_BASE="https://nbg1.your-objectstorage.com/osism/openstack-k8s-capi-images/ubuntu-2404-kube-v1.35"
                QCOW2_IMAGE="ubuntu-2404-kube-v1.35.qcow2"
                RAW_IMAGE="ubuntu-2404-kube-v1.35.raw"

                if [ ! -f $DEST/$RAW_IMAGE ]; then
                  echo "Downloading $QCOW2_IMAGE..."
                  curl -L -o $DEST/$QCOW2_IMAGE $IMAGE_URL_BASE/$QCOW2_IMAGE
                  
                  echo "Converting QCOW2 to RAW..."
                  apk add --no-cache qemu-img
                  qemu-img convert -f qcow2 -O raw $DEST/$QCOW2_IMAGE $DEST/$RAW_IMAGE
                  
                  echo "Cleaning up QCOW2..."
                  rm $DEST/$QCOW2_IMAGE
                  
                  echo "Generating checksum..."
                  sha256sum $DEST/$RAW_IMAGE > $DEST/$RAW_IMAGE.sha256
                fi

                chmod -R 777 /shared
            env:
              - name: IMAGE_NAME
                value: ubuntu-2404-kube-v1.35.raw
            volumeMounts:
              - name: ironic-data-volume
                mountPath: /shared
      - op: replace
        path: /spec/template/spec/containers/3/securityContext
        value:
          runAsUser: 0
      - op: add
        path: /spec/template/spec/hostNetwork
        value: false
      - op: replace
        path: /spec/template/spec/containers/1/livenessProbe/failureThreshold
        value: 30
      - op: replace
        path: /spec/template/spec/containers/1/readinessProbe/failureThreshold
        value: 30
      - op: replace
        path: /spec/template/spec/containers/3/livenessProbe/failureThreshold
        value: 30
      - op: replace
        path: /spec/template/spec/containers/3/readinessProbe/failureThreshold
        value: 30
      - op: replace
        path: /spec/template/spec/containers/0/envFrom/0/configMapRef/name
        value: ironic
      - op: replace
        path: /spec/template/spec/containers/1/envFrom/0/configMapRef/name
        value: ironic
      - op: add
        path: /spec/template/spec/containers/2/envFrom
        value:
          - configMapRef:
              name: ironic
      - op: add
        path: /spec/template/spec/containers/3/envFrom
        value:
          - configMapRef:
              name: ironic
      - op: replace
        path: /spec/template/spec/initContainers/0/env
        value:
          - name: CACHEURL
            value: ""
          - name: IPA_BASEURI
            value: https://tarballs.opendev.org/openstack/ironic-python-agent/dib
      - op: replace
        path: /spec/template/spec/volumes/0
        value:
          name: ironic-data-volume
          persistentVolumeClaim:
            claimName: image-pvc

configMapGenerator:
  - name: ironic
    behavior: merge
    literals:
      - PROVISIONING_INTERFACE=enx00e04c247a98
      - PROVISIONING_IP=172.16.10.50
      - PROVISIONING_GATEWAY=172.16.0.1
      - PROVISIONING_DNS=8.8.8.8
      - HTTP_PORT=6180
      - IRONIC_REVERSE_PROXY_SETUP=false
      - DHCP_RANGE=172.16.10.101,172.16.10.200
      - IRONIC_USE_MARIADB=false
      - IRONIC_ENABLE_PBOOT=false
      - IRONIC_KERNEL_PARAMS=console=ttyS0
      - INSPECTOR_REVERSE_PROXY_SETUP=false
      - IRONIC_FAST_TRACK=true
      - IRONIC_FAST_TRACK_TIMEOUT=0
      - IRONIC_IPMI_POWER_OFF_TIMEOUT=0
      - IRONIC_INSPECTOR_VLAN_INTERFACES=all
      - IRONIC_PROVISIONING_INTERFACE=enx00e04c247a98
      - IPA_BASE_URL=http://172.16.10.50:6180/images
      - IPA_KERNEL_URL=http://172.16.10.50:6180/images/ironic-python-agent.kernel
      - IPA_RAMDISK_URL=http://172.16.10.50:6180/images/ironic-python-agent.initramfs
      - DEPLOY_KERNEL_URL=http://172.16.10.50:6180/images/ironic-python-agent.kernel
      - DEPLOY_RAMDISK_URL=http://172.16.10.50:6180/images/ironic-python-agent.initramfs
      - IRONIC_ENDPOINT=http://172.16.10.50:6385/v1/
      - IRONIC_BASE_URL=http://172.16.10.50:6385
      - CACHEURL=http://172.16.10.50:6180/images
