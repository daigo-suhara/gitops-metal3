apiVersion: v1
kind: ConfigMap
metadata:
  name: argocd-cmd-params-cm
  namespace: argocd
  labels:
    app.kubernetes.io/name: argocd-cmd-params-cm
    app.kubernetes.io/part-of: argocd
data:
  # Disable server-side diff to avoid schema errors on Kubernetes 1.32+
  # (terminatingReplicas field added in k8s 1.32 is unknown to ArgoCD 2.13 schema)
  # SSA is still used for applying; only diff reverts to 3-way merge.
  controller.server.side.diff.enabled: "false"
