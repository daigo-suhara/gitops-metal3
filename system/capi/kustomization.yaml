apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
resources:
  - namespaces.yaml
  - providers.yaml

patches:
  - target:
      kind: CustomResourceDefinition
      name: metal3machinetemplates.infrastructure.cluster.x-k8s.io
    patch: |
      - op: replace
        path: /spec/versions/0/schema/openAPIV3Schema/properties/spec/properties/template/properties/spec/properties/image/required
        value:
          - url
  - target:
      kind: ValidatingWebhookConfiguration
      name: capm3-validating-webhook-configuration
    patch: |
      - op: remove
        path: /webhooks/5
