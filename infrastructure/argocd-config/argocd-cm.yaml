apiVersion: v1
kind: ConfigMap
metadata:
  name: argocd-cm
  namespace: argocd
  labels:
    app.kubernetes.io/name: argocd-cm
    app.kubernetes.io/part-of: argocd
data:
  # Strip terminatingReplicas from Deployment status before structured merge diff.
  # k8s 1.32+ adds this field but ArgoCD 2.13's bundled schema lacks it,
  # causing ComparisonError when the cluster is on k8s 1.32+.
  resource.customizations.ignoreDifferences.apps_Deployment: |
    jqPathExpressions:
      - .status.terminatingReplicas

  # Exclude PVCs from ArgoCD management on the workload cluster.
  # PVCs hold persistent data; automatic deletion by ArgoCD (prune) is
  # dangerous, and SSA claiming immutable spec fields causes apply errors.
  resource.exclusions: |
    - apiGroups:
        - ""
      kinds:
        - PersistentVolumeClaim
      clusters:
        - https://172.16.10.10:6443
