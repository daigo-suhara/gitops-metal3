apiVersion: v1
kind: ConfigMap
metadata:
  name: argocd-cm
  namespace: argocd
  labels:
    app.kubernetes.io/name: argocd-cm
    app.kubernetes.io/part-of: argocd
data:
  # Strip terminatingReplicas from Deployment status before structured merge diff.
  # k8s 1.32+ adds this field but ArgoCD 2.13's bundled schema lacks it,
  # causing ComparisonError when the cluster is on k8s 1.32+.
  resource.customizations.ignoreDifferences.apps_Deployment: |
    jqPathExpressions:
      - .status.terminatingReplicas

  # Prevent SSA from claiming ownership of immutable PVC spec fields.
  # Bound PVCs reject any spec update except storage expansion; claiming
  # storageClassName or volumeMode via SSA triggers the immutability error.
  resource.customizations.ignoreDifferences.v1_PersistentVolumeClaim: |
    jqPathExpressions:
      - .spec.storageClassName
      - .spec.volumeMode
