apiVersion: infrastructure.cluster.x-k8s.io/v1beta1
kind: Metal3MachineTemplate
metadata:
  name: prod-control-plane
  namespace: metal3
spec:
  template:
    spec:
      image:
        url: http://172.16.10.50:6180/images/noble-server-cloudimg-amd64.raw
        checksum: http://172.16.10.50:6180/images/noble-server-cloudimg-amd64.raw.sha256
        format: raw
      hostSelector:
        matchLabels:
          cluster-role: control-plane
---
apiVersion: controlplane.cluster.x-k8s.io/v1beta1
kind: KubeadmControlPlane
metadata:
  name: prod-control-plane
  namespace: metal3
spec:
  replicas: 3
  rolloutStrategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 0
  machineTemplate:
    infrastructureRef:
      apiVersion: infrastructure.cluster.x-k8s.io/v1beta1
      kind: Metal3MachineTemplate
      name: prod-control-plane
      namespace: metal3
  kubeadmConfigSpec:
    format: cloud-config
    initConfiguration:
      nodeRegistration:
        kubeletExtraArgs:
          node-labels: "metal3.io/uuid={{ ds.meta_data.uuid }}"
    joinConfiguration:
      nodeRegistration:
        kubeletExtraArgs:
          node-labels: "metal3.io/uuid={{ ds.meta_data.uuid }}"
    clusterConfiguration:
      apiServer:
        certSANs:
          - 172.16.10.100
      controllerManager:
        extraArgs:
          enable-hostpath-provisioner: "true"
    preKubeadmCommands:
      - /opt/install-k8s.sh
    postKubeadmCommands:
      - |
        # Allow CAPI to perform health checks (API Server -> Kubelet)
        # This is needed for Machine controller to see nodes as healthy
        kubectl --kubeconfig /etc/kubernetes/super-admin.conf apply -f - <<EOF
        apiVersion: rbac.authorization.k8s.io/v1
        kind: ClusterRole
        metadata:
          name: system:kube-apiserver-to-kubelet
        rules:
          - apiGroups: [""]
            resources: ["nodes/proxy", "nodes/stats", "nodes/log", "nodes/spec", "nodes/metrics"]
            verbs: ["*"]
        ---
        apiVersion: rbac.authorization.k8s.io/v1
        kind: ClusterRoleBinding
        metadata:
          name: system:kube-apiserver-to-kubelet
        roleRef:
          apiGroup: rbac.authorization.k8s.io
          kind: ClusterRole
          name: system:kube-apiserver-to-kubelet
        subjects:
          - apiGroup: rbac.authorization.k8s.io
            kind: User
            name: kube-apiserver-kubelet-client
        EOF
    files:
      - path: /opt/install-k8s.sh
        permissions: "0755"
        content: |
          #!/bin/bash
          set -euxo pipefail
          export DEBIAN_FRONTEND=noninteractive
          K8S_MINOR=v1.35
          # Ironic dnsmasq does not provide gateway/DNS via DHCP, so set
          # them up before any network call.
          # Wait for eno1 to be up
          while ! ip link show eno1 | grep -q "UP,LOWER_UP"; do
            echo "Waiting for eno1 to be up..."
            sleep 2
          done
          ip route replace default via 172.16.0.1
          mkdir -p /etc/systemd/resolved.conf.d
          printf '[Resolve]\nDNS=8.8.8.8 1.1.1.1\n' >/etc/systemd/resolved.conf.d/99-public.conf
          systemctl restart systemd-resolved
          # kube-vip's k8s client falls back to https://kubernetes:6443
          # before kube-apiserver advertises the VIP. Map it to localhost so
          # kube-vip can authenticate to the local apiserver and claim the
          # VIP, which unblocks the post-init kubeadm phases.
          grep -q '^127.0.0.1 kubernetes$' /etc/hosts || echo '127.0.0.1 kubernetes' >>/etc/hosts
          # disable swap
          swapoff -a || true
          sed -i '/\sswap\s/ s/^/#/' /etc/fstab
          # kernel modules + sysctl
          modprobe overlay
          modprobe br_netfilter
          printf 'overlay\nbr_netfilter\n' >/etc/modules-load.d/k8s.conf
          printf 'net.bridge.bridge-nf-call-iptables=1\nnet.bridge.bridge-nf-call-ip6tables=1\nnet.ipv4.ip_forward=1\n' >/etc/sysctl.d/k8s.conf
          sysctl --system
          # containerd
          apt-get update
          apt-get install -y containerd apt-transport-https ca-certificates curl gpg
          mkdir -p /etc/containerd
          containerd config default | sed 's/SystemdCgroup = false/SystemdCgroup = true/' >/etc/containerd/config.toml
          systemctl enable --now containerd
          # kubernetes apt repo
          mkdir -p -m 755 /etc/apt/keyrings
          curl -fsSL "https://pkgs.k8s.io/core:/stable:/${K8S_MINOR}/deb/Release.key" | gpg --dearmor -o /etc/apt/keyrings/kubernetes-apt-keyring.gpg
          echo "deb [signed-by=/etc/apt/keyrings/kubernetes-apt-keyring.gpg] https://pkgs.k8s.io/core:/stable:/${K8S_MINOR}/deb/ /" >/etc/apt/sources.list.d/kubernetes.list
          apt-get update
          apt-get install -y kubelet kubeadm kubectl
          apt-mark hold kubelet kubeadm kubectl
          systemctl enable kubelet
      - content: |
          apiVersion: v1
          kind: Pod
          metadata:
            name: kube-vip
            namespace: kube-system
          spec:
            containers:
            - args: [ "manager" ]
              env:
              - { name: vip_arp, value: "true" }
              - { name: port, value: "6443" }
              - { name: vip_interface, value: eno1 }
              - { name: vip_address, value: 172.16.10.100 }
              - { name: vip_leaderelection, value: "false" }
              image: ghcr.io/kube-vip/kube-vip:v0.8.2
              name: kube-vip
              securityContext:
                capabilities: { add: [ "NET_ADMIN", "NET_RAW", "SYS_TIME" ] }
            hostNetwork: true
        path: /etc/kubernetes/manifests/kube-vip.yaml
        permissions: "0644"
      - name: metal3
        sudo: "ALL=(ALL) NOPASSWD:ALL"
        sshAuthorizedKeys:
          - "ssh-ed25519 AAAAC3NzaC1lZDI1NTE5AAAAID+3Q/eAOgoIs0pNtGvQ8ueXK1Gg8CnIdhcU9rwpeMFm suharadaigo"
  version: v1.35.4
