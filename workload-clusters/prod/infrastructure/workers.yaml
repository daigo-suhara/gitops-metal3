apiVersion: infrastructure.cluster.x-k8s.io/v1beta1
kind: Metal3MachineTemplate
metadata:
  name: prod-worker
  namespace: metal3
spec:
  template:
    spec:
      image:
        url: http://172.16.10.50:6180/images/noble-server-cloudimg-amd64.raw
        checksum: http://172.16.10.50:6180/images/noble-server-cloudimg-amd64.raw.sha256
        format: raw
      hostSelector:
        matchLabels:
          cluster-role: worker
---
apiVersion: cluster.x-k8s.io/v1beta1
kind: MachineDeployment
metadata:
  name: prod-worker
  namespace: metal3
spec:
  clusterName: prod
  replicas: 0
  selector:
    matchLabels:
      cluster.x-k8s.io/cluster-name: prod
  template:
    metadata:
      labels:
        cluster.x-k8s.io/cluster-name: prod
    spec:
      clusterName: prod
      version: v1.35.4
      bootstrap:
        configRef:
          apiVersion: bootstrap.cluster.x-k8s.io/v1beta1
          kind: KubeadmConfigTemplate
          name: prod-worker
      infrastructureRef:
        apiVersion: infrastructure.cluster.x-k8s.io/v1beta1
        kind: Metal3MachineTemplate
        name: prod-worker
---
apiVersion: bootstrap.cluster.x-k8s.io/v1beta1
kind: KubeadmConfigTemplate
metadata:
  name: prod-worker
  namespace: metal3
spec:
  template:
    spec:
      format: cloud-config
      joinConfiguration:
        nodeRegistration:
          kubeletExtraArgs:
            node-labels: "metal3.io/uuid={{ ds.meta_data.uuid }}"
      preKubeadmCommands:
        - /opt/install-k8s.sh
      files:
        - path: /opt/install-k8s.sh
          permissions: "0755"
          content: |
            #!/bin/bash
            set -euxo pipefail
            export DEBIAN_FRONTEND=noninteractive
            K8S_MINOR=v1.35
            # Wait for eno1 to be up
            while ! ip link show eno1 | grep -q "UP,LOWER_UP"; do
              echo "Waiting for eno1 to be up..."
              sleep 2
            done
            ip route replace default via 172.16.0.1
            mkdir -p /etc/systemd/resolved.conf.d
            printf '[Resolve]\nDNS=8.8.8.8 1.1.1.1\n' >/etc/systemd/resolved.conf.d/99-public.conf
            systemctl restart systemd-resolved
            grep -q '^127.0.0.1 kubernetes$' /etc/hosts || echo '127.0.0.1 kubernetes' >>/etc/hosts
            swapoff -a || true
            sed -i '/\sswap\s/ s/^/#/' /etc/fstab
            modprobe overlay
            modprobe br_netfilter
            printf 'overlay\nbr_netfilter\n' >/etc/modules-load.d/k8s.conf
            printf 'net.bridge.bridge-nf-call-iptables=1\nnet.bridge.bridge-nf-call-ip6tables=1\nnet.ipv4.ip_forward=1\n' >/etc/sysctl.d/k8s.conf
            sysctl --system
            apt-get update
            apt-get install -y containerd apt-transport-https ca-certificates curl gpg
            mkdir -p /etc/containerd
            containerd config default | sed 's/SystemdCgroup = false/SystemdCgroup = true/' >/etc/containerd/config.toml
            systemctl enable --now containerd
            mkdir -p -m 755 /etc/apt/keyrings
            curl -fsSL "https://pkgs.k8s.io/core:/stable:/${K8S_MINOR}/deb/Release.key" | gpg --dearmor -o /etc/apt/keyrings/kubernetes-apt-keyring.gpg
            echo "deb [signed-by=/etc/apt/keyrings/kubernetes-apt-keyring.gpg] https://pkgs.k8s.io/core:/stable:/${K8S_MINOR}/deb/ /" >/etc/apt/sources.list.d/kubernetes.list
            apt-get update
            apt-get install -y kubelet kubeadm kubectl
            apt-mark hold kubelet kubeadm kubectl
            systemctl enable kubelet
      users:
        - name: metal3
          sudo: "ALL=(ALL) NOPASSWD:ALL"
          sshAuthorizedKeys:
            - "ssh-ed25519 AAAAC3NzaC1lZDI1NTE5AAAAID+3Q/eAOgoIs0pNtGvQ8ueXK1Gg8CnIdhcU9rwpeMFm suharadaigo"
