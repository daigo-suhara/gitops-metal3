apiVersion: infrastructure.cluster.x-k8s.io/v1beta2
kind: Metal3DataTemplate
metadata:
  name: homelab-control-plane
  namespace: metal3
spec:
  clusterName: homelab
---
apiVersion: infrastructure.cluster.x-k8s.io/v1beta2
kind: Metal3MachineTemplate
metadata:
  name: homelab-control-plane
  namespace: metal3
spec:
  template:
    spec:
      automatedCleaningMode: metadata
      dataTemplate:
        name: homelab-control-plane
      image:
        url: http://172.16.0.10:6180/ubuntu-k8s.qcow2
        checksum: http://172.16.0.10:6180/ubuntu-k8s.qcow2.sha256
        checksumType: sha256
        diskFormat: qcow2
      hostSelector:
        matchLabels:
          cluster-role: control-plane
---
apiVersion: controlplane.cluster.x-k8s.io/v1beta2
kind: KubeadmControlPlane
metadata:
  name: homelab-control-plane
  namespace: metal3
spec:
  replicas: 3
  rollout:
    strategy:
      type: RollingUpdate
  machineTemplate:
    spec:
      infrastructureRef:
        apiGroup: infrastructure.cluster.x-k8s.io
        kind: Metal3MachineTemplate
        name: homelab-control-plane
  version: v1.35.4
  kubeadmConfigSpec:
    users:
      - name: ubuntu
        sshAuthorizedKeys:
          - ssh-ed25519 AAAAC3NzaC1lZDI1NTE5AAAAID+3Q/eAOgoIs0pNtGvQ8ueXK1Gg8CnIdhcU9rwpeMFm suharadaigo
        sudo: ALL=(ALL) NOPASSWD:ALL
    clusterConfiguration:
      apiServer:
        certSANs: [172.16.10.100, 127.0.0.1]
    initConfiguration:
      nodeRegistration:
        name: '{{ ds.meta_data.name }}'
        taints: []
        kubeletExtraArgs:
          - name: node-labels
            value: 'metal3.io/uuid={{ ds.meta_data.uuid }}'
    joinConfiguration:
      controlPlane: {}
      nodeRegistration:
        name: '{{ ds.meta_data.name }}'
        taints: []
        kubeletExtraArgs:
          - name: node-labels
            value: 'metal3.io/uuid={{ ds.meta_data.uuid }}'
    files:
      - path: /etc/kubernetes/manifests/kube-vip.yaml
        permissions: "0600"
        owner: root:root
        content: |
          apiVersion: v1
          kind: Pod
          metadata: { name: kube-vip, namespace: kube-system }
          spec:
            hostNetwork: true
            hostAliases:
              - ip: 127.0.0.1
                hostnames: [kubernetes]
            containers:
              - name: kube-vip
                image: ghcr.io/kube-vip/kube-vip:v0.8.9
                args: [manager]
                env:
                  - { name: vip_interface,     value: eno1 }
                  - { name: address,           value: "172.16.10.100" }
                  - { name: cp_enable,         value: "true" }
                  - { name: vip_arp,           value: "true" }
                  - { name: vip_leaderelection,value: "true" }
                  - { name: vip_leasename,     value: plndr-cp-lock }
                  - { name: vip_leaseduration, value: "5" }
                  - { name: vip_renewdeadline, value: "3" }
                  - { name: vip_retryperiod,   value: "1" }
                securityContext:
                  capabilities: { add: [NET_ADMIN, NET_RAW] }
                volumeMounts:
                  - { name: kubeconfig, mountPath: /etc/kubernetes/admin.conf, readOnly: true }
            volumes:
              - name: kubeconfig
                hostPath: { path: /etc/kubernetes/super-admin.conf, type: File }
