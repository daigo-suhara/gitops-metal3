apiVersion: infrastructure.cluster.x-k8s.io/v1beta2
kind: Metal3DataTemplate
metadata:
  name: homelab-control-plane
  namespace: metal3
spec:
  clusterName: homelab
---
apiVersion: infrastructure.cluster.x-k8s.io/v1beta2
kind: Metal3MachineTemplate
metadata:
  name: homelab-control-plane
  namespace: metal3
spec:
  template:
    spec:
      automatedCleaningMode: metadata
      dataTemplate:
        name: homelab-control-plane
      image:
        url: https://cloud-images.ubuntu.com/releases/24.04/release/ubuntu-24.04-server-cloudimg-amd64.img
        checksum: ffe6203da54deeb6db5d2a98a83f9ec8e55f149d3f7ba622e1abe5fa966ee3d6
        checksumType: sha256
        diskFormat: qcow2
      hostSelector:
        matchLabels:
          cluster-role: control-plane
---
apiVersion: controlplane.cluster.x-k8s.io/v1beta2
kind: KubeadmControlPlane
metadata:
  name: homelab-control-plane
  namespace: metal3
spec:
  replicas: 3
  rollout:
    strategy:
      type: RollingUpdate
      rollingUpdate:
        maxSurge: 0
  machineTemplate:
    spec:
      infrastructureRef:
        apiGroup: infrastructure.cluster.x-k8s.io
        kind: Metal3MachineTemplate
        name: homelab-control-plane
  version: v1.36.2
  kubeadmConfigSpec:
    users:
      - name: ubuntu
        sshAuthorizedKeys:
          - ssh-ed25519 AAAAC3NzaC1lZDI1NTE5AAAAID+3Q/eAOgoIs0pNtGvQ8ueXK1Gg8CnIdhcU9rwpeMFm suharadaigo
        sudo: ALL=(ALL) NOPASSWD:ALL
    clusterConfiguration:
      apiServer:
        certSANs: [172.16.10.100, 127.0.0.1]
    initConfiguration:
      nodeRegistration:
        taints: []
        kubeletExtraArgs:
          - name: node-labels
            value: 'metal3.io/uuid={{ ds.meta_data.uuid }}'
    joinConfiguration:
      controlPlane: {}
      nodeRegistration:
        taints: []
        kubeletExtraArgs:
          - name: node-labels
            value: 'metal3.io/uuid={{ ds.meta_data.uuid }}'
    preKubeadmCommands:
      - /root/install-kubernetes.sh
    files:
      - path: /root/install-kubernetes.sh
        permissions: "0755"
        owner: root:root
        content: |
          #!/bin/bash
          set -eux
          export DEBIAN_FRONTEND=noninteractive
          install -d -m 0755 /etc/apt/keyrings
          curl -fsSL https://pkgs.k8s.io/core:/stable:/v1.36/deb/Release.key \
            | gpg --dearmor -o /etc/apt/keyrings/kubernetes-apt-keyring.gpg
          echo 'deb [signed-by=/etc/apt/keyrings/kubernetes-apt-keyring.gpg] https://pkgs.k8s.io/core:/stable:/v1.36/deb/ /' \
            > /etc/apt/sources.list.d/kubernetes.list
          apt-get update
          apt-get install -y containerd kubelet=1.36.2-2.1 kubeadm=1.36.2-2.1 kubectl=1.36.2-2.1
          apt-mark hold kubelet kubeadm kubectl
          install -d /etc/containerd
          containerd config default \
            | sed 's/SystemdCgroup = false/SystemdCgroup = true/' \
            > /etc/containerd/config.toml
          systemctl restart containerd
          systemctl enable kubelet
          printf 'br_netfilter\noverlay\n' > /etc/modules-load.d/k8s.conf
          modprobe br_netfilter overlay
          printf 'net.bridge.bridge-nf-call-iptables=1\nnet.ipv4.ip_forward=1\nnet.bridge.bridge-nf-call-ip6tables=1\n' \
            > /etc/sysctl.d/k8s.conf
          sysctl --system
      - path: /etc/kubernetes/manifests/kube-vip.yaml
        permissions: "0600"
        owner: root:root
        content: |
          apiVersion: v1
          kind: Pod
          metadata: { name: kube-vip, namespace: kube-system }
          spec:
            hostNetwork: true
            hostAliases:
              - ip: 127.0.0.1
                hostnames: [kubernetes]
            containers:
              - name: kube-vip
                image: ghcr.io/kube-vip/kube-vip:v1.2.1
                args: [manager]
                env:
                  - { name: vip_interface,     value: eno1 }
                  - { name: address,           value: "172.16.10.100" }
                  - { name: cp_enable,         value: "true" }
                  - { name: vip_arp,           value: "true" }
                  - { name: vip_leaderelection,value: "true" }
                  - { name: vip_leasename,     value: plndr-cp-lock }
                  - { name: vip_leaseduration, value: "5" }
                  - { name: vip_renewdeadline, value: "3" }
                  - { name: vip_retryperiod,   value: "1" }
                securityContext:
                  capabilities: { add: [NET_ADMIN, NET_RAW] }
                volumeMounts:
                  - { name: kubeconfig, mountPath: /etc/kubernetes/admin.conf, readOnly: true }
            volumes:
              - name: kubeconfig
                hostPath: { path: /etc/kubernetes/admin.conf, type: File }
