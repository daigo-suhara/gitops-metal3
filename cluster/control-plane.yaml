apiVersion: infrastructure.cluster.x-k8s.io/v1beta1
kind: Metal3MachineTemplate
metadata:
  name: prod-control-plane
  namespace: metal3
spec:
  template:
    spec:
      image:
        url: http://172.16.0.10:6180/images/ubuntu-2404-kube-v1.35.qcow2
        checksum: http://172.16.0.10:6180/images/ubuntu-2404-kube-v1.35.qcow2.sha256
        format: qcow2
      hostSelector:
        matchLabels:
          cluster-role: control-plane
---
apiVersion: controlplane.cluster.x-k8s.io/v1beta2
kind: KubeadmControlPlane
metadata:
  name: prod-control-plane
  namespace: metal3
spec:
  replicas: 3
  rollout:
    strategy:
      type: RollingUpdate
  machineTemplate:
    spec:
      infrastructureRef:
        apiGroup: infrastructure.cluster.x-k8s.io
        kind: Metal3MachineTemplate
        name: prod-control-plane
  version: v1.35.4
  kubeadmConfigSpec:
    format: cloud-config
    clusterConfiguration:
      apiServer:
        certSANs: [172.16.10.100, 127.0.0.1]
