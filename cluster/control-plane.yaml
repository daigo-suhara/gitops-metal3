apiVersion: infrastructure.cluster.x-k8s.io/v1beta2
kind: Metal3DataTemplate
metadata:
  name: homelab-control-plane
  namespace: metal3
spec:
  clusterName: homelab
  metaData:
    objectNames:
      - key: hostname
        object: baremetalhost
---
apiVersion: infrastructure.cluster.x-k8s.io/v1beta2
kind: Metal3MachineTemplate
metadata:
  name: homelab-control-plane
  namespace: metal3
spec:
  template:
    spec:
      automatedCleaningMode: metadata
      dataTemplate:
        name: homelab-control-plane
      image:
        url: https://stable.release.flatcar-linux.net/amd64-usr/current/flatcar_production_openstack_image.img
        checksum: 39abdd660255eb6f29611cce8d66229e5368ac21b8841c50a6b611ae9e6ae2dafe9db1354d185145819386bf7b6c771e28153e522c61deb95aaee7694b12f153
        checksumType: sha512
        diskFormat: qcow2
      hostSelector:
        matchLabels:
          cluster-role: control-plane
---
apiVersion: controlplane.cluster.x-k8s.io/v1beta2
kind: KubeadmControlPlane
metadata:
  name: homelab-control-plane
  namespace: metal3
spec:
  replicas: 3
  rollout:
    strategy:
      type: RollingUpdate
      rollingUpdate:
        maxSurge: 0
  machineTemplate:
    spec:
      infrastructureRef:
        apiGroup: infrastructure.cluster.x-k8s.io
        kind: Metal3MachineTemplate
        name: homelab-control-plane
  version: v1.36.2
  kubeadmConfigSpec:
    format: ignition
    users:
      - name: core
        sshAuthorizedKeys:
          - ssh-ed25519 AAAAC3NzaC1lZDI1NTE5AAAAID+3Q/eAOgoIs0pNtGvQ8ueXK1Gg8CnIdhcU9rwpeMFm suharadaigo
        sudo: ALL=(ALL) NOPASSWD:ALL
    clusterConfiguration:
      apiServer:
        certSANs: [172.16.10.100, 127.0.0.1]
    initConfiguration:
      nodeRegistration:
        taints: []
    joinConfiguration:
      controlPlane: {}
      nodeRegistration:
        taints: []
    preKubeadmCommands:
      - mkdir -p /var/lib/extensions /etc/extensions
      - curl -fsSL --retry 30 --retry-delay 5 --retry-all-errors -o /var/lib/extensions/kubernetes.raw https://github.com/flatcar/sysext-bakery/releases/download/kubernetes-v1.36.2/kubernetes-v1.36.2-x86-64.raw
      - ln -sf /var/lib/extensions/kubernetes.raw /etc/extensions/kubernetes.raw
      - systemd-sysext refresh
      - systemctl daemon-reload
    files:
      - path: /etc/systemd/network/10-eno2-unmanaged.network
        permissions: "0644"
        owner: root:root
        content: |
          [Match]
          Name=eno2
          [Link]
          Unmanaged=yes
          ActivationPolicy=down
      - path: /etc/kubernetes/manifests/kube-vip.yaml
        permissions: "0600"
        owner: root:root
        content: |
          apiVersion: v1
          kind: Pod
          metadata: { name: kube-vip, namespace: kube-system }
          spec:
            hostNetwork: true
            hostAliases:
              - ip: 127.0.0.1
                hostnames: [kubernetes]
            containers:
              - name: kube-vip
                image: ghcr.io/kube-vip/kube-vip:v1.2.1
                args: [manager]
                env:
                  - { name: vip_interface,     value: eno1 }
                  - { name: address,           value: "172.16.10.100" }
                  - { name: cp_enable,         value: "true" }
                  - { name: vip_arp,           value: "true" }
                  - { name: vip_leaderelection,value: "true" }
                  - { name: vip_leasename,     value: plndr-cp-lock }
                  - { name: vip_leaseduration, value: "5" }
                  - { name: vip_renewdeadline, value: "3" }
                  - { name: vip_retryperiod,   value: "1" }
                securityContext:
                  capabilities: { add: [NET_ADMIN, NET_RAW] }
                volumeMounts:
                  - { name: kubeconfig, mountPath: /etc/kubernetes/admin.conf, readOnly: true }
            volumes:
              - name: kubeconfig
                hostPath: { path: /etc/kubernetes/admin.conf, type: File }
