apiVersion: infrastructure.cluster.x-k8s.io/v1beta2
kind: Metal3DataTemplate
metadata:
  name: homelab-control-plane
  namespace: metal3
spec:
  clusterName: homelab
---
apiVersion: infrastructure.cluster.x-k8s.io/v1beta2
kind: Metal3MachineTemplate
metadata:
  name: homelab-control-plane
  namespace: metal3
spec:
  template:
    spec:
      automatedCleaningMode: metadata
      dataTemplate:
        name: homelab-control-plane
      image:
        # Vanilla Flatcar Stable 4593.2.4 qcow2 (~500MB). Kubernetes is not
        # baked in; kubelet/kubeadm arrive via a systemd-sysext downloaded
        # at first boot (see preKubeadmCommands below). The `current`
        # symlink alias is stable so it survives Flatcar patch bumps.
        url: https://stable.release.flatcar-linux.net/amd64-usr/current/flatcar_production_qemu_image.img
        checksum: 9cd59da624ad47c58686ea05ab216e0343fa1181219f493f27a81256c68170817f2f40759f9437fad80958f671e658cff9f84a67b2cb40fdc90931ce74651a21
        checksumType: sha512
        diskFormat: qcow2
      hostSelector:
        matchLabels:
          cluster-role: control-plane
---
apiVersion: controlplane.cluster.x-k8s.io/v1beta2
kind: KubeadmControlPlane
metadata:
  name: homelab-control-plane
  namespace: metal3
spec:
  replicas: 3
  rollout:
    strategy:
      type: RollingUpdate
      rollingUpdate:
        maxSurge: 0
  machineTemplate:
    spec:
      infrastructureRef:
        apiGroup: infrastructure.cluster.x-k8s.io
        kind: Metal3MachineTemplate
        name: homelab-control-plane
  version: v1.36.2
  kubeadmConfigSpec:
    # Emit Ignition (Butane-transpiled) instead of cloud-config so the
    # vanilla Flatcar image can consume it. Metal3 injects the resulting
    # user-data into the BMH the same way either format.
    format: ignition
    users:
      - name: core
        sshAuthorizedKeys:
          - ssh-ed25519 AAAAC3NzaC1lZDI1NTE5AAAAID+3Q/eAOgoIs0pNtGvQ8ueXK1Gg8CnIdhcU9rwpeMFm suharadaigo
        sudo: ALL=(ALL) NOPASSWD:ALL
    clusterConfiguration:
      apiServer:
        certSANs: [172.16.10.100, 127.0.0.1]
    initConfiguration:
      nodeRegistration:
        taints: []
        kubeletExtraArgs:
          - name: node-labels
            value: 'openstack-control-plane=enabled,openstack-compute-node=enabled,openvswitch=enabled'
    joinConfiguration:
      controlPlane: {}
      nodeRegistration:
        taints: []
        kubeletExtraArgs:
          - name: node-labels
            value: 'openstack-control-plane=enabled,openstack-compute-node=enabled,openvswitch=enabled'
    preKubeadmCommands:
      # Fetch the Kubernetes v1.36.2 sysext from Flatcar's sysext-bakery
      # (112MB) and merge it into /usr so kubelet/kubeadm/kubectl become
      # available before kubeadm init/join runs.
      - mkdir -p /var/lib/extensions /etc/extensions
      - curl -fsSL -o /var/lib/extensions/kubernetes.raw https://github.com/flatcar/sysext-bakery/releases/download/kubernetes-v1.36.2/kubernetes-v1.36.2-x86-64.raw
      - ln -sf /var/lib/extensions/kubernetes.raw /etc/extensions/kubernetes.raw
      - systemd-sysext refresh
      - systemctl daemon-reload
    files:
      - path: /etc/kubernetes/manifests/kube-vip.yaml
        permissions: "0600"
        owner: root:root
        content: |
          apiVersion: v1
          kind: Pod
          metadata: { name: kube-vip, namespace: kube-system }
          spec:
            hostNetwork: true
            hostAliases:
              - ip: 127.0.0.1
                hostnames: [kubernetes]
            containers:
              - name: kube-vip
                image: ghcr.io/kube-vip/kube-vip:v1.2.1
                args: [manager]
                env:
                  - { name: vip_interface,     value: eno1 }
                  - { name: address,           value: "172.16.10.100" }
                  - { name: cp_enable,         value: "true" }
                  - { name: vip_arp,           value: "true" }
                  - { name: vip_leaderelection,value: "true" }
                  - { name: vip_leasename,     value: plndr-cp-lock }
                  - { name: vip_leaseduration, value: "5" }
                  - { name: vip_renewdeadline, value: "3" }
                  - { name: vip_retryperiod,   value: "1" }
                securityContext:
                  capabilities: { add: [NET_ADMIN, NET_RAW] }
                volumeMounts:
                  - { name: kubeconfig, mountPath: /etc/kubernetes/admin.conf, readOnly: true }
            volumes:
              - name: kubeconfig
                hostPath: { path: /etc/kubernetes/admin.conf, type: File }
