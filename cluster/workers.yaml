apiVersion: infrastructure.cluster.x-k8s.io/v1beta2
kind: Metal3MachineTemplate
metadata:
  name: homelab-worker
  namespace: metal3
spec:
  template:
    spec:
      image:
        url: http://172.16.0.10:6180/ubuntu-2404-k8s-v1.35.4-amd64.raw.gz
        checksum: http://172.16.0.10:6180/ubuntu-2404-k8s-v1.35.4-amd64.raw.gz.sha256
        checksumType: sha256
        format: raw
      hostSelector:
        matchLabels:
          cluster-role: worker
---
apiVersion: cluster.x-k8s.io/v1beta2
kind: MachineDeployment
metadata:
  name: homelab-worker
  namespace: metal3
spec:
  clusterName: homelab
  replicas: 0
  selector:
    matchLabels:
      cluster.x-k8s.io/cluster-name: homelab
  template:
    metadata:
      labels:
        cluster.x-k8s.io/cluster-name: homelab
    spec:
      clusterName: homelab
      bootstrap:
        configRef:
          apiGroup: bootstrap.cluster.x-k8s.io
          kind: KubeadmConfigTemplate
          name: homelab-worker
      infrastructureRef:
        apiGroup: infrastructure.cluster.x-k8s.io
        kind: Metal3MachineTemplate
        name: homelab-worker
      version: v1.35.4
---
apiVersion: bootstrap.cluster.x-k8s.io/v1beta2
kind: KubeadmConfigTemplate
metadata:
  name: homelab-worker
  namespace: metal3
spec:
  template:
    spec: {}
