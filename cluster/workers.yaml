apiVersion: infrastructure.cluster.x-k8s.io/v1beta1
kind: Metal3MachineTemplate
metadata:
  name: prod-worker
  namespace: metal3
spec:
  template:
    spec:
      image:
        url: http://172.16.0.10:6180/images/ubuntu-2404-kube-v1.35.qcow2
        checksum: http://172.16.0.10:6180/images/ubuntu-2404-kube-v1.35.qcow2.sha256
        format: qcow2
      hostSelector:
        matchLabels:
          cluster-role: worker
---
apiVersion: cluster.x-k8s.io/v1beta2
kind: MachineDeployment
metadata:
  name: prod-worker
  namespace: metal3
spec:
  clusterName: prod
  replicas: 0
  selector:
    matchLabels:
      cluster.x-k8s.io/cluster-name: prod
  template:
    metadata:
      labels:
        cluster.x-k8s.io/cluster-name: prod
    spec:
      clusterName: prod
      version: v1.35.4
      bootstrap:
        configRef:
          kind: KubeadmConfigTemplate
          name: prod-worker
      infrastructureRef:
        kind: Metal3MachineTemplate
        name: prod-worker
---
apiVersion: bootstrap.cluster.x-k8s.io/v1beta2
kind: KubeadmConfigTemplate
metadata:
  name: prod-worker
  namespace: metal3
spec:
  template:
    spec:
      format: cloud-config
      preKubeadmCommands: ["/opt/install-k8s.sh"]
      files:
        - path: /opt/install-k8s.sh
          permissions: "0755"
          content: |
            #!/bin/bash
            set -euxo pipefail
            export DEBIAN_FRONTEND=noninteractive
            while ! ip link show eno1 | grep -q "UP,LOWER_UP"; do
              sleep 2
            done
            ip route replace default via 172.16.0.1
            mkdir -p /etc/systemd/resolved.conf.d
            printf '[Resolve]\nDNS=8.8.8.8 1.1.1.1\n' >/etc/systemd/resolved.conf.d/99-public.conf
            systemctl restart systemd-resolved
            apt-get update
            apt-get install -y containerd
            mkdir -p /etc/containerd
            containerd config default >/etc/containerd/config.toml
            sed -i 's/SystemdCgroup = false/SystemdCgroup = true/' /etc/containerd/config.toml
            systemctl enable --now containerd
            id ubuntu >/dev/null 2>&1 || useradd -m -s /bin/bash ubuntu
            install -d -m 0700 -o ubuntu -g ubuntu /home/ubuntu/.ssh
            printf '%s\n' 'ssh-ed25519 AAAAC3NzaC1lZDI1NTE5AAAAID+3Q/eAOgoIs0pNtGvQ8ueXK1Gg8CnIdhcU9rwpeMFm suharadaigo' >/home/ubuntu/.ssh/authorized_keys
            chown ubuntu:ubuntu /home/ubuntu/.ssh/authorized_keys
            chmod 0600 /home/ubuntu/.ssh/authorized_keys
            grep -q '^127.0.0.1 kubernetes$' /etc/hosts || echo '127.0.0.1 kubernetes' >>/etc/hosts
            swapoff -a || true
            sed -i '/\sswap\s/ s/^/#/' /etc/fstab
            modprobe overlay
            modprobe br_netfilter
            printf 'overlay\nbr_netfilter\n' >/etc/modules-load.d/k8s.conf
            printf 'net.bridge.bridge-nf-call-iptables=1\nnet.bridge.bridge-nf-call-ip6tables=1\nnet.ipv4.ip_forward=1\n' >/etc/sysctl.d/k8s.conf
            sysctl --system
            systemctl enable kubelet
