apiVersion: infrastructure.cluster.x-k8s.io/v1beta2
kind: Metal3DataTemplate
metadata:
  name: homelab-worker
  namespace: metal3
spec:
  clusterName: homelab
---
apiVersion: infrastructure.cluster.x-k8s.io/v1beta2
kind: Metal3MachineTemplate
metadata:
  name: homelab-worker
  namespace: metal3
spec:
  template:
    spec:
      automatedCleaningMode: metadata
      dataTemplate:
        name: homelab-worker
      image:
        url: https://stable.release.flatcar-linux.net/amd64-usr/current/flatcar_production_qemu_image.img
        checksum: 9cd59da624ad47c58686ea05ab216e0343fa1181219f493f27a81256c68170817f2f40759f9437fad80958f671e658cff9f84a67b2cb40fdc90931ce74651a21
        checksumType: sha512
        diskFormat: qcow2
      hostSelector:
        matchLabels:
          cluster-role: worker
---
apiVersion: cluster.x-k8s.io/v1beta2
kind: MachineDeployment
metadata:
  name: homelab-worker
  namespace: metal3
spec:
  clusterName: homelab
  replicas: 0
  selector:
    matchLabels:
      cluster.x-k8s.io/cluster-name: homelab
  template:
    metadata:
      labels:
        cluster.x-k8s.io/cluster-name: homelab
    spec:
      clusterName: homelab
      bootstrap:
        configRef:
          apiGroup: bootstrap.cluster.x-k8s.io
          kind: KubeadmConfigTemplate
          name: homelab-worker
      infrastructureRef:
        apiGroup: infrastructure.cluster.x-k8s.io
        kind: Metal3MachineTemplate
        name: homelab-worker
      version: v1.36.2
---
apiVersion: bootstrap.cluster.x-k8s.io/v1beta2
kind: KubeadmConfigTemplate
metadata:
  name: homelab-worker
  namespace: metal3
spec:
  template:
    spec:
      format: ignition
      users:
        - name: core
          sshAuthorizedKeys:
            - ssh-ed25519 AAAAC3NzaC1lZDI1NTE5AAAAID+3Q/eAOgoIs0pNtGvQ8ueXK1Gg8CnIdhcU9rwpeMFm suharadaigo
          sudo: ALL=(ALL) NOPASSWD:ALL
      preKubeadmCommands:
        - mkdir -p /var/lib/extensions /etc/extensions
        - curl -fsSL -o /var/lib/extensions/kubernetes.raw https://github.com/flatcar/sysext-bakery/releases/download/kubernetes-v1.36.2/kubernetes-v1.36.2-x86-64.raw
        - ln -sf /var/lib/extensions/kubernetes.raw /etc/extensions/kubernetes.raw
        - systemd-sysext refresh
        - systemctl daemon-reload
      joinConfiguration:
        nodeRegistration: {}
