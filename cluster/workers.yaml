apiVersion: infrastructure.cluster.x-k8s.io/v1beta2
kind: Metal3DataTemplate
metadata:
  name: homelab-worker
  namespace: metal3
spec:
  clusterName: homelab
---
apiVersion: infrastructure.cluster.x-k8s.io/v1beta2
kind: Metal3MachineTemplate
metadata:
  name: homelab-worker
  namespace: metal3
spec:
  template:
    spec:
      automatedCleaningMode: metadata
      dataTemplate:
        name: homelab-worker
      image:
        url: https://cloud-images.ubuntu.com/releases/24.04/release/ubuntu-24.04-server-cloudimg-amd64.img
        checksum: ffe6203da54deeb6db5d2a98a83f9ec8e55f149d3f7ba622e1abe5fa966ee3d6
        checksumType: sha256
        diskFormat: qcow2
      hostSelector:
        matchLabels:
          cluster-role: worker
---
apiVersion: cluster.x-k8s.io/v1beta2
kind: MachineDeployment
metadata:
  name: homelab-worker
  namespace: metal3
spec:
  clusterName: homelab
  replicas: 0
  selector:
    matchLabels:
      cluster.x-k8s.io/cluster-name: homelab
  template:
    metadata:
      labels:
        cluster.x-k8s.io/cluster-name: homelab
    spec:
      clusterName: homelab
      bootstrap:
        configRef:
          apiGroup: bootstrap.cluster.x-k8s.io
          kind: KubeadmConfigTemplate
          name: homelab-worker
      infrastructureRef:
        apiGroup: infrastructure.cluster.x-k8s.io
        kind: Metal3MachineTemplate
        name: homelab-worker
      version: v1.36.2
---
apiVersion: bootstrap.cluster.x-k8s.io/v1beta2
kind: KubeadmConfigTemplate
metadata:
  name: homelab-worker
  namespace: metal3
spec:
  template:
    spec:
      users:
        - name: ubuntu
          sshAuthorizedKeys:
            - ssh-ed25519 AAAAC3NzaC1lZDI1NTE5AAAAID+3Q/eAOgoIs0pNtGvQ8ueXK1Gg8CnIdhcU9rwpeMFm suharadaigo
          sudo: ALL=(ALL) NOPASSWD:ALL
      joinConfiguration:
        nodeRegistration:
          kubeletExtraArgs:
            - name: node-labels
              value: 'node-role.kubernetes.io/worker=true,metal3.io/uuid={{ ds.meta_data.uuid }}'
      preKubeadmCommands:
        - /root/install-kubernetes.sh
      files:
        - path: /root/install-kubernetes.sh
          permissions: "0755"
          owner: root:root
          content: |
            #!/bin/bash
            set -eux
            export DEBIAN_FRONTEND=noninteractive
            install -d -m 0755 /etc/apt/keyrings
            curl -fsSL https://pkgs.k8s.io/core:/stable:/v1.36/deb/Release.key \
              | gpg --dearmor -o /etc/apt/keyrings/kubernetes-apt-keyring.gpg
            echo 'deb [signed-by=/etc/apt/keyrings/kubernetes-apt-keyring.gpg] https://pkgs.k8s.io/core:/stable:/v1.36/deb/ /' \
              > /etc/apt/sources.list.d/kubernetes.list
            apt-get update
            apt-get install -y containerd kubelet=1.36.2-2.1 kubeadm=1.36.2-2.1 kubectl=1.36.2-2.1
            apt-mark hold kubelet kubeadm kubectl
            containerd config default \
              | sed 's/SystemdCgroup = false/SystemdCgroup = true/' \
              > /etc/containerd/config.toml
            systemctl restart containerd
            systemctl enable kubelet
            printf 'br_netfilter\noverlay\n' > /etc/modules-load.d/k8s.conf
            modprobe br_netfilter overlay
            printf 'net.bridge.bridge-nf-call-iptables=1\nnet.ipv4.ip_forward=1\nnet.bridge.bridge-nf-call-ip6tables=1\n' \
              > /etc/sysctl.d/k8s.conf
            sysctl --system
