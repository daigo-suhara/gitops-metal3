apiVersion: addons.cluster.x-k8s.io/v1alpha1
kind: HelmChartProxy
metadata:
  name: argocd
  namespace: metal3
spec:
  clusterSelector:
    matchLabels:
      cluster.x-k8s.io/cluster-name: homelab
  releaseName: argocd
  repoURL: https://argoproj.github.io/argo-helm
  chartName: argo-cd
  version: 9.5.13
  namespace: argocd
  options:
    enableClientCache: false
    waitForJobs: true
    wait: true
    timeout: 10m0s
    install:
      createNamespace: true
    upgrade:
      maxHistory: 10
  valuesTemplate: |-
    configs:
      cm:
        kustomize.buildOptions: --enable-helm
        resource.customizations: |
          "*/*":
            managedFieldsManagers:
              - kube-controller-manager
    server:
      service:
        type: ClusterIP
    extraObjects:
      - apiVersion: argoproj.io/v1alpha1
        kind: Application
        metadata:
          name: app-of-apps
          namespace: argocd
        spec:
          project: default
          source:
            repoURL: https://github.com/daigo-suhara/gitops-metal3.git
            targetRevision: HEAD
            path: homelab
          destination:
            server: https://kubernetes.default.svc
            namespace: argocd
          syncPolicy:
            automated:
              prune: true
              selfHeal: true
