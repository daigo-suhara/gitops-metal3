apiVersion: addons.cluster.x-k8s.io/v1alpha1
kind: HelmChartProxy
metadata:
  name: argocd
  namespace: metal3
spec:
  clusterSelector:
    matchLabels:
      cluster.x-k8s.io/cluster-name: homelab
  releaseName: argocd
  repoURL: https://argoproj.github.io/argo-helm
  chartName: argo-cd
  version: 9.5.13
  namespace: argocd
  options:
    enableClientCache: false
    waitForJobs: true
    wait: true
    timeout: 10m0s
    install:
      createNamespace: true
    upgrade:
      maxHistory: 10
  valuesTemplate: |-
    configs:
      cm:
        kustomize.buildOptions: --enable-helm
    server:
      service:
        type: LoadBalancer
