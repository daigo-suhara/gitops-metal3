apiVersion: addons.cluster.x-k8s.io/v1alpha1
kind: HelmChartProxy
metadata:
  name: rook-ceph-operator
  namespace: metal3
spec:
  clusterSelector:
    matchLabels:
      cluster.x-k8s.io/cluster-name: homelab
  repoURL: https://charts.rook.io/release
  chartName: rook-ceph
  version: 1.19.4
  namespace: rook-ceph
  releaseName: rook-ceph
  options:
    install: { createNamespace: true }
    wait: true
    timeout: 15m0s
