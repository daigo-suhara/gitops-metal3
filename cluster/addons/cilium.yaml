apiVersion: addons.cluster.x-k8s.io/v1alpha1
kind: HelmChartProxy
metadata:
  name: cilium
  namespace: metal3
spec:
  clusterSelector:
    matchLabels:
      cluster.x-k8s.io/cluster-name: homelab
  releaseName: cilium
  repoURL: https://helm.cilium.io/
  chartName: cilium
  version: 1.19.6
  namespace: kube-system
  options:
    enableClientCache: false
    waitForJobs: true
    wait: true
    timeout: 10m0s
    install:
      createNamespace: true
    upgrade:
      maxHistory: 10
  valuesTemplate: |-
    ipam:
      mode: kubernetes
    kubeProxyReplacement: true
    k8sServiceHost: 172.16.10.100
    k8sServicePort: 6443
    k8s:
      requireIPv4PodCIDR: true
    routingMode: tunnel
    tunnelProtocol: geneve
    operator:
      replicas: 1
    hubble:
      enabled: false
    l2announcements:
      enabled: true
    externalIPs:
      enabled: true
---
apiVersion: v1
kind: Secret
metadata:
  name: cilium-lb
  namespace: metal3
type: addons.cluster.x-k8s.io/resource-set
stringData:
  cilium-lb.yaml: |
    apiVersion: cilium.io/v2alpha1
    kind: CiliumLoadBalancerIPPool
    metadata:
      name: default
    spec:
      blocks:
        - start: 172.16.100.100
          stop:  172.16.100.200
    ---
    apiVersion: cilium.io/v2alpha1
    kind: CiliumL2AnnouncementPolicy
    metadata:
      name: default
    spec:
      externalIPs: true
      loadBalancerIPs: true
---
apiVersion: addons.cluster.x-k8s.io/v1beta1
kind: ClusterResourceSet
metadata:
  name: cilium-lb
  namespace: metal3
spec:
  clusterSelector:
    matchLabels:
      cluster.x-k8s.io/cluster-name: homelab
  strategy: Reconcile
  resources:
    - name: cilium-lb
      kind: Secret
