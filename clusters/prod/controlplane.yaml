apiVersion: infrastructure.cluster.x-k8s.io/v1beta1
kind: Metal3MachineTemplate
metadata:
  name: prod-control-plane
  namespace: metal3
spec:
  template:
    spec:
      image:
        url: http://172.16.10.50:6180/images/noble-server-cloudimg-amd64.raw
        checksum: http://172.16.10.50:6180/images/noble-server-cloudimg-amd64.raw.sha256
        format: raw
      hostSelector:
        matchLabels:
          cluster-role: control-plane
---
apiVersion: controlplane.cluster.x-k8s.io/v1beta1
kind: KubeadmControlPlane
metadata:
  name: prod-control-plane
  namespace: metal3
spec:
  replicas: 3
  machineTemplate:
    infrastructureRef:
      apiVersion: infrastructure.cluster.x-k8s.io/v1beta1
      kind: Metal3MachineTemplate
      name: prod-control-plane
  kubeadmConfigSpec:
    format: cloud-config
    initConfiguration:
      nodeRegistration:
        kubeletExtraArgs: {}
    clusterConfiguration:
      apiServer:
        certSANs:
          - 172.16.10.10
      controllerManager:
        extraArgs:
          enable-hostpath-provisioner: "true"
    preKubeadmCommands:
      - /opt/install-k8s.sh
    files:
      - path: /opt/install-k8s.sh
        permissions: "0755"
        content: |
          #!/bin/bash
          set -euxo pipefail
          export DEBIAN_FRONTEND=noninteractive
          K8S_MINOR=v1.35
          # disable swap
          swapoff -a || true
          sed -i '/\sswap\s/ s/^/#/' /etc/fstab
          # kernel modules + sysctl
          modprobe overlay
          modprobe br_netfilter
          printf 'overlay\nbr_netfilter\n' >/etc/modules-load.d/k8s.conf
          printf 'net.bridge.bridge-nf-call-iptables=1\nnet.bridge.bridge-nf-call-ip6tables=1\nnet.ipv4.ip_forward=1\n' >/etc/sysctl.d/k8s.conf
          sysctl --system
          # containerd
          apt-get update
          apt-get install -y containerd apt-transport-https ca-certificates curl gpg
          mkdir -p /etc/containerd
          containerd config default | sed 's/SystemdCgroup = false/SystemdCgroup = true/' >/etc/containerd/config.toml
          systemctl enable --now containerd
          # kubernetes apt repo
          mkdir -p -m 755 /etc/apt/keyrings
          curl -fsSL "https://pkgs.k8s.io/core:/stable:/${K8S_MINOR}/deb/Release.key" | gpg --dearmor -o /etc/apt/keyrings/kubernetes-apt-keyring.gpg
          echo "deb [signed-by=/etc/apt/keyrings/kubernetes-apt-keyring.gpg] https://pkgs.k8s.io/core:/stable:/${K8S_MINOR}/deb/ /" >/etc/apt/sources.list.d/kubernetes.list
          apt-get update
          apt-get install -y kubelet kubeadm kubectl
          apt-mark hold kubelet kubeadm kubectl
          systemctl enable kubelet
      - content: |
          apiVersion: v1
          kind: Pod
          metadata:
            name: kube-vip
            namespace: kube-system
          spec:
            containers:
            - args: [ "manager" ]
              env:
              - { name: vip_arp, value: "true" }
              - { name: port, value: "6443" }
              - { name: vip_interface, value: eno1 }
              - { name: vip_address, value: 172.16.10.10 }
              - { name: cp_enable, value: "true" }
              - { name: cp_namespace, value: kube-system }
              - { name: vip_leaderelection, value: "true" }
              image: ghcr.io/kube-vip/kube-vip:v0.8.2
              name: kube-vip
              securityContext:
                capabilities: { add: [ "NET_ADMIN", "NET_RAW", "SYS_TIME" ] }
            hostNetwork: true
        path: /etc/kubernetes/manifests/kube-vip.yaml
        permissions: "0644"
    users:
      - name: metal3
        sudo: "ALL=(ALL) NOPASSWD:ALL"
        sshAuthorizedKeys:
          - "ssh-ed25519 AAAAC3NzaC1lZDI1NTE5AAAAID+3Q/eAOgoIs0pNtGvQ8ueXK1Gg8CnIdhcU9rwpeMFm suharadaigo"
  version: v1.35.4
