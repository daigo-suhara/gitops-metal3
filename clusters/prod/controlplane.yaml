apiVersion: infrastructure.cluster.x-k8s.io/v1beta1
kind: Metal3MachineTemplate
metadata:
  name: prod-control-plane
  namespace: metal3
spec:
  template:
    spec:
      image:
        url: http://172.16.10.50:6180/images/ubuntu-24.04.qcow2
        checksum: http://172.16.10.50:6180/images/ubuntu-24.04.qcow2.sha256
        format: qcow2
      hostSelector:
        matchLabels:
          cluster-role: control-plane
---
apiVersion: controlplane.cluster.x-k8s.io/v1beta1
kind: KubeadmControlPlane
metadata:
  name: prod-control-plane
  namespace: metal3
spec:
  spec:
    image:
      url: http://172.16.10.50:6180/images/fedora-coreos.qcow2
      checksum: http://172.16.10.50:6180/images/fedora-coreos.qcow2.sha256
      format: qcow2
    kind: Metal3MachineTemplate
    name: prod-control-plane
  kubeadmConfigSpec:
  format: ignition
  initConfiguration:
    nodeRegistration:
      kubeletExtraArgs: {}
  joinConfiguration:
    nodeRegistration:
      kubeletExtraArgs: {}
  clusterConfiguration:
    apiServer:
      certSANs:
        - 172.16.10.10
    controllerManager:
      extraArgs:
        enable-hostpath-provisioner: "true"
  # FCOS handles networking and pre-reqs via Ignition/built-in defaults.
  # We still keep the kube-vip static pod manifest.
  files:
      - content: |
          apiVersion: v1
          kind: Pod
          metadata:
            name: kube-vip
            namespace: kube-system
          spec:
            containers:
            - args:
              - manager
              env:
              - name: vip_arp
                value: "true"
              - name: port
                value: "6443"
              - name: vip_interface
                value: eno1
              - name: vip_address
                value: 172.16.10.10
              - name: cp_enable
                value: "true"
              - name: cp_namespace
                value: kube-system
              - name: vip_leaderelection
                value: "true"
              - name: vip_leaseduration
                value: "5"
              - name: vip_renewdeadline
                value: "3"
              - name: vip_retryperiod
                value: "1"
              image: ghcr.io/kube-vip/kube-vip:v0.8.2
              imagePullPolicy: IfNotPresent
              name: kube-vip
              resources: {}
              securityContext:
                capabilities:
                  add:
                  - NET_ADMIN
                  - NET_RAW
                  - SYS_TIME
            hostNetwork: true
        owner: root:root
        path: /etc/kubernetes/manifests/kube-vip.yaml
        permissions: "0644"
    users:
      - name: metal3
        sudo: "ALL=(ALL) NOPASSWD:ALL"
        sshAuthorizedKeys:
          - "ssh-ed25519 AAAAC3NzaC1lZDI1NTE5AAAAID+3Q/eAOgoIs0pNtGvQ8ueXK1Gg8CnIdhcU9rwpeMFm suharadaigo"
