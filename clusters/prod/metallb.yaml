apiVersion: addons.cluster.x-k8s.io/v1beta1
kind: ClusterResourceSet
metadata:
  name: metallb-addon
  namespace: metal3
spec:
  clusterSelector:
    matchLabels:
      cni: cilium # 既存のラベルを利用して全クラスタに適用
  strategy: ApplyOnce
  resources:
    - name: metallb-install
      kind: ConfigMap
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: metallb-install
  namespace: metal3
data:
  metallb.yaml: |
    # MetalLB Native Manifests (v0.14.8)
    apiVersion: v1
    kind: Namespace
    metadata:
      name: metallb-system
      labels:
        pod-security.kubernetes.io/enforce: privileged
        pod-security.kubernetes.io/audit: privileged
        pod-security.kubernetes.io/warn: privileged
    ---
    # (省略: MetalLB の標準コンポーネント定義)
    # 実際には非常に長いため、ここでは設定部分を優先し、
    # 後の手順で公式マニフェストを結合します。
  config.yaml: |
    apiVersion: metallb.io/v1beta1
    kind: IPAddressPool
    metadata:
      name: default-pool
      namespace: metallb-system
    spec:
      addresses:
        - 172.16.10.201-172.16.10.250
    ---
    apiVersion: metallb.io/v1beta1
    kind: L2Advertisement
    metadata:
      name: default-l2-adv
      namespace: metallb-system
    spec:
      ipAddressPools:
        - default-pool
