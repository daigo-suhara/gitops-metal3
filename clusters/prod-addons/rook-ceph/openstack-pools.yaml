---
# Replicated pool for block storage (RBD)
apiVersion: v1
kind: ConfigMap
metadata:
  name: ceph-openstack-pools-bootstrap
  namespace: rook-ceph
  labels:
    app: ceph-openstack-pools
data:
  bootstrap.sh: |
    #!/bin/bash
    set -ex
    # Wait for ceph to be ready
    until ceph status | grep -q "HEALTH_OK\|HEALTH_WARN"; do
      echo "Waiting for Ceph cluster..."
      sleep 10
    done

    # Create pools for OpenStack
    ceph osd pool create volumes 64 64 replicated
    ceph osd pool create images 64 64 replicated
    ceph osd pool create vms 64 64 replicated
    ceph osd pool create replicapool 32 32 replicated
    ceph osd pool create glance 32 32 replicated
    ceph osd pool create cinder-volumes 64 64 replicated
    ceph osd pool create nova 64 64 replicated
    ceph osd pool create backups 16 16 replicated
    ceph osd pool create cephfs-data 64 64 replicated
    ceph osd pool create cephfs-metadata 16 16 replicated

    # Initialize all pools
    for pool in volumes images vms replicapool glance cinder-volumes nova backups; do
      rbd pool init $pool
    done

    # Create cephfs
    ceph fs new cephfs cephfs-metadata cephfs-data || true

    # Create users for OpenStack
    ceph auth get-or-create client.cinder \
      mon 'profile rbd' \
      osd 'profile rbd pool=volumes, profile rbd pool=vms, profile rbd pool=images, profile rbd pool=cinder-volumes, profile rbd pool=nova' \
      mgr 'profile rbd pool=volumes, profile rbd pool=vms, profile rbd pool=cinder-volumes'

    ceph auth get-or-create client.glance \
      mon 'profile rbd' \
      osd 'profile rbd pool=images, profile rbd pool=glance' \
      mgr 'profile rbd pool=images, profile rbd pool=glance'

    ceph auth get-or-create client.nova \
      mon 'profile rbd' \
      osd 'profile rbd pool=vms, profile rbd pool=nova, profile rbd pool=volumes, profile rbd pool=images, profile rbd pool=cinder-volumes' \
      mgr 'profile rbd pool=vms, profile rbd pool=nova'

    # Create openstack namespace secret aliases
    CINDER_KEY=$(ceph auth get-key client.cinder)
    GLANCE_KEY=$(ceph auth get-key client.glance)
    NOVA_KEY=$(ceph auth get-key client.nova)
    ADMIN_KEY=$(ceph auth get-key client.admin)

    echo "Pools and users created successfully"
    ceph status
