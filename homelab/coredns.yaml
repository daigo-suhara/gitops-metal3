# dcloud.internal zone. Rewrites <svc>.<projectID>.dcloud.internal to the
# standard k8s cluster DNS so users can address project resources with a
# short, cloud-provider-like hostname instead of "<svc>.<ns>.svc.cluster.local".
#
# Example:
#   wordpress-db-mysql.proj-blog-abc12345.dcloud.internal
#     -> wordpress-db-mysql.proj-blog-abc12345.svc.cluster.local
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: coredns-dcloud-zone
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "0"
spec:
  project: default
  source:
    repoURL: https://github.com/daigo-suhara/gitops-metal3.git
    targetRevision: HEAD
    path: homelab/coredns
  destination:
    server: https://kubernetes.default.svc
    namespace: kube-system
  syncPolicy:
    automated: { prune: true, selfHeal: true }
    syncOptions: [ServerSideApply=true]
    retry:
      limit: 10
      backoff: { duration: 30s, factor: 2, maxDuration: 5m }
