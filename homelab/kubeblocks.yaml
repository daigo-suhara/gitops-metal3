# KubeBlocks - the database service creates its Cluster CRDs against
# this operator (postgres/mysql/redis).
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: kubeblocks
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "18"
spec:
  project: default
  source:
    repoURL: https://apecloud.github.io/helm-charts
    chart: kubeblocks
    targetRevision: 1.0.0
    helm:
      releaseName: kubeblocks
  destination:
    server: https://kubernetes.default.svc
    namespace: kb-system
  syncPolicy:
    automated: { prune: true, selfHeal: true }
    syncOptions: [CreateNamespace=true, ServerSideApply=true]
