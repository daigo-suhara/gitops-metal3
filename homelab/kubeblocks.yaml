# KubeBlocks - the database service creates its Cluster CRDs against
# this operator (postgres/mysql/redis).
---
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: kubeblocks-crds
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "17"
spec:
  project: default
  source:
    repoURL: https://github.com/daigo-suhara/gitops-metal3.git
    targetRevision: HEAD
    path: homelab/kubeblocks-crds
  destination:
    server: https://kubernetes.default.svc
    namespace: kb-system
  syncPolicy:
    automated: { prune: true, selfHeal: true }
    syncOptions: [CreateNamespace=true, ServerSideApply=true]
    retry:
      limit: 10
      backoff: { duration: 30s, factor: 2, maxDuration: 5m }
---
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: kubeblocks
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "18"
spec:
  project: default
  source:
    repoURL: https://apecloud.github.io/helm-charts
    chart: kubeblocks
    targetRevision: 1.0.2
    helm:
      releaseName: kubeblocks
  destination:
    server: https://kubernetes.default.svc
    namespace: kb-system
  # The operator mutates its own Addon CRs post-apply (defaults + finalizer).
  ignoreDifferences:
    - group: extensions.kubeblocks.io
      kind: Addon
      jqPathExpressions: [".spec", ".metadata.finalizers", ".metadata.annotations"]
  syncPolicy:
    automated: { prune: true, selfHeal: true }
    syncOptions: [CreateNamespace=true, ServerSideApply=true, RespectIgnoreDifferences=true]
    retry:
      limit: 10
      backoff: { duration: 30s, factor: 2, maxDuration: 5m }
