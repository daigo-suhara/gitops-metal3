# dcloud-database Secret managed as a SealedSecret. See dcloud.yaml's
# values.database.externalSecret which points the chart at this Secret
# by name (chart-side auto-gen is disabled because argocd's helm template
# renderer cannot execute helm `lookup`).
#
# Re-seal: make seal-dcloud-database PASSWORD=<postgres-password>
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: dcloud-secret
  namespace: argocd
  annotations:
    # Land before dcloud (wave 30) so the Secret exists when the chart
    # rolls out pods that envFrom it.
    argocd.argoproj.io/sync-wave: "28"
spec:
  project: default
  source:
    repoURL: https://github.com/daigo-suhara/gitops-metal3.git
    targetRevision: HEAD
    path: homelab/dcloud-secret
  destination:
    server: https://kubernetes.default.svc
    namespace: dcloud-system
  syncPolicy:
    automated: { prune: true, selfHeal: true }
    syncOptions: [CreateNamespace=true, ServerSideApply=true]
    retry:
      limit: 10
      backoff: { duration: 30s, factor: 2, maxDuration: 5m }
