# Let's Encrypt ClusterIssuers for cert-manager. Two issuers: one
# staging (unlimited but untrusted certs, use for testing DNS/HTTP01
# plumbing) and one prod (rate-limited but trusted). dcloud's Ingress
# references letsencrypt-prod by default; flip to letsencrypt-staging
# while shaking out the initial configuration.
#
# Assumes cert-manager itself is installed by homelab/cert-manager.yaml.
# Assumes ingress-nginx handles the HTTP-01 challenge (see
# ingress-nginx.yaml).
---
apiVersion: cert-manager.io/v1
kind: ClusterIssuer
metadata:
  name: letsencrypt-staging
  annotations:
    argocd.argoproj.io/sync-wave: "14"
spec:
  acme:
    server: https://acme-staging-v02.api.letsencrypt.org/directory
    # Override with `--set email=you@example.com` at bootstrap or edit
    # this file to your address; Let's Encrypt requires a real one for
    # renewal notifications.
    email: admin@example.com
    privateKeySecretRef:
      name: letsencrypt-staging-account-key
    solvers:
      - http01:
          ingress:
            ingressClassName: nginx
---
apiVersion: cert-manager.io/v1
kind: ClusterIssuer
metadata:
  name: letsencrypt-prod
  annotations:
    argocd.argoproj.io/sync-wave: "14"
spec:
  acme:
    server: https://acme-v02.api.letsencrypt.org/directory
    email: admin@example.com
    privateKeySecretRef:
      name: letsencrypt-prod-account-key
    solvers:
      - http01:
          ingress:
            ingressClassName: nginx
