# Sealed-secrets controller. Regular Secrets can't safely live in git;
# a SealedSecret is public-key-encrypted so the ciphertext can be
# committed. The controller decrypts on-cluster into a real Secret.
#
# CLI (locally):
#   brew install kubeseal
#   kubectl create secret generic <name> \
#     --dry-run=client -o yaml --from-literal=key=value \
#     | kubeseal --controller-namespace sealed-secrets --format yaml \
#     > <name>-sealed.yaml
#   git add / commit / push
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: sealed-secrets
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "1"
spec:
  project: default
  source:
    repoURL: https://bitnami.github.io/sealed-secrets
    chart: sealed-secrets
    targetRevision: 2.19.1
    helm:
      releaseName: sealed-secrets
      valuesObject:
        fullnameOverride: sealed-secrets-controller
  destination:
    server: https://kubernetes.default.svc
    namespace: sealed-secrets
  syncPolicy:
    automated: { prune: true, selfHeal: true }
    syncOptions: [CreateNamespace=true, ServerSideApply=true]
    retry:
      limit: 10
      backoff: { duration: 30s, factor: 2, maxDuration: 5m }
