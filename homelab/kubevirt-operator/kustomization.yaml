apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
# KubeVirt does not publish its operator YAML inside the git tree; the
# release download URL is what installs it. Bumping the version means
# editing the tag below. The KubeVirt CR lives in this same subdir so
# ArgoCD manages the operator + its main CR as one unit.
resources:
  - https://github.com/kubevirt/kubevirt/releases/download/v1.4.0/kubevirt-operator.yaml
  - kubevirt-cr.yaml
