apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: monitoring
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "20"
spec:
  project: default
  source:
    repoURL: https://prometheus-community.github.io/helm-charts
    chart: kube-prometheus-stack
    targetRevision: 87.17.0
    helm:
      releaseName: monitoring
      valuesObject:
        grafana:
          service:
            type: LoadBalancer
          adminPassword: admin
          persistence:
            enabled: true
            size: 5Gi
          defaultDashboardsTimezone: Asia/Tokyo
          grafana.ini:
            users:
              default_language: ja-JP
            dashboards:
              default_home_dashboard_path: /var/lib/grafana/dashboards/default/node-exporter-full.json
          dashboardProviders:
            dashboardproviders.yaml:
              apiVersion: 1
              providers:
                - name: default
                  orgId: 1
                  folder: ""
                  type: file
                  disableDeletion: false
                  editable: true
                  options:
                    path: /var/lib/grafana/dashboards/default
          dashboards:
            default:
              node-exporter-full:
                gnetId: 1860
                revision: 41
                datasource: Prometheus
              k8s-views-nodes:
                gnetId: 15759
                revision: 37
                datasource: Prometheus
              k8s-views-pods:
                gnetId: 15760
                revision: 36
                datasource: Prometheus
              k8s-views-namespaces:
                gnetId: 15758
                revision: 42
                datasource: Prometheus
        prometheus:
          prometheusSpec:
            retention: 15d
            resources:
              requests: { cpu: 200m, memory: 512Mi }
              limits:   { memory: 2Gi }
            storageSpec:
              volumeClaimTemplate:
                spec:
                  accessModes: [ReadWriteOnce]
                  resources:
                    requests: { storage: 20Gi }
        alertmanager:
          alertmanagerSpec:
            storage:
              volumeClaimTemplate:
                spec:
                  accessModes: [ReadWriteOnce]
                  resources:
                    requests: { storage: 2Gi }
  destination:
    server: https://kubernetes.default.svc
    namespace: monitoring
  ignoreDifferences:
    - group: admissionregistration.k8s.io
      kind: ValidatingWebhookConfiguration
      jqPathExpressions: [".webhooks[]?.clientConfig.caBundle"]
    - group: admissionregistration.k8s.io
      kind: MutatingWebhookConfiguration
      jqPathExpressions: [".webhooks[]?.clientConfig.caBundle"]
  syncPolicy:
    automated: { prune: true, selfHeal: true }
    syncOptions: [CreateNamespace=true, ServerSideApply=true, RespectIgnoreDifferences=true]
    retry:
      limit: 10
      backoff: { duration: 30s, factor: 2, maxDuration: 5m }
