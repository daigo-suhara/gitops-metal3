# KubeVirt operator + a minimal KubeVirt CR. dcloud's compute service
# creates VirtualMachine CRs against this control plane; the
# subresources.kubevirt.io API is what /api/v1/compute/{name}/console
# proxies to over WebSocket.
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: kubevirt-operator
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "18"
spec:
  project: default
  source:
    # KubeVirt does not ship an installable operator yaml inside the
    # git tree; the subdir kustomization pulls the release download
    # asset and bundles the KubeVirt CR.
    repoURL: https://github.com/daigo-suhara/gitops-metal3.git
    targetRevision: HEAD
    path: homelab/kubevirt-operator
  destination:
    server: https://kubernetes.default.svc
    namespace: kubevirt
  syncPolicy:
    automated: { prune: true, selfHeal: true }
    # The operator YAML installs the KubeVirt CRD in the same sync;
    # SkipDryRunOnMissingResource lets the CR pass argocd's pre-apply
    # dry-run.
    syncOptions: [CreateNamespace=true, ServerSideApply=true, SkipDryRunOnMissingResource=true]
    retry:
      limit: 10
      backoff: { duration: 30s, factor: 2, maxDuration: 5m }
