# SealedSecret carrying the Cloudflare Tunnel token used by
# homelab/cloudflared.yaml. Ships before cloudflared (sync-wave "15")
# so the cloudflared Deployment finds the Secret on first apply after
# a cluster rebuild.
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: cloudflared-secret
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "15"
spec:
  project: default
  source:
    repoURL: https://github.com/daigo-suhara/gitops-metal3.git
    targetRevision: HEAD
    path: homelab/cloudflared-secret
  destination:
    server: https://kubernetes.default.svc
    namespace: cloudflare
  syncPolicy:
    automated: { prune: true, selfHeal: true }
    syncOptions: [CreateNamespace=true, ServerSideApply=true]
    retry:
      limit: 10
      backoff: { duration: 30s, factor: 2, maxDuration: 5m }
