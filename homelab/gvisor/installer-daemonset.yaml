apiVersion: v1
kind: ServiceAccount
metadata:
  name: gvisor-installer
  namespace: kube-system
---
apiVersion: apps/v1
kind: DaemonSet
metadata:
  name: gvisor-installer
  namespace: kube-system
  labels: { app: gvisor-installer }
spec:
  selector:
    matchLabels: { app: gvisor-installer }
  template:
    metadata:
      labels: { app: gvisor-installer }
    spec:
      serviceAccountName: gvisor-installer
      hostPID: true
      hostNetwork: true
      tolerations:
        - operator: Exists
      initContainers:
        - name: install
          image: debian:12-slim
          securityContext: { privileged: true }
          command: ["/bin/bash", "-c"]
          args:
            - |
              set -euo pipefail
              chroot /host bash -c '
                set -euo pipefail
                ARCH=$(uname -m)
                URL="https://storage.googleapis.com/gvisor/releases/release/latest/${ARCH}"
                mkdir -p /usr/local/bin
                for bin in runsc containerd-shim-runsc-v1; do
                  curl -fsSL "${URL}/${bin}" -o "/usr/local/bin/${bin}"
                  chmod 0755 "/usr/local/bin/${bin}"
                done
                CFG=/etc/containerd/config.toml
                if ! grep -q "runtimes.runsc" "$CFG"; then
                  cat >> "$CFG" <<EOT

              [plugins."io.containerd.grpc.v1.cri".containerd.runtimes.runsc]
                runtime_type = "io.containerd.runsc.v1"
              [plugins."io.containerd.grpc.v1.cri".containerd.runtimes.runsc.options]
                TypeUrl = "io.containerd.runsc.v1.options"
                ConfigPath = "/etc/containerd/runsc.toml"
              EOT
                  cat > /etc/containerd/runsc.toml <<EOT
              log_path = "/var/log/runsc/%ID%/shim.log"
              log_level = "warning"
              [runsc_config]
                debug = "false"
                debug-log = "/var/log/runsc/%ID%/gvisor.log"
              EOT
                  systemctl restart containerd
                fi
              '
          volumeMounts:
            - { name: host, mountPath: /host }
      containers:
        - name: pause
          image: registry.k8s.io/pause:3.10
          resources:
            requests: { cpu: 10m, memory: 16Mi }
            limits: { memory: 32Mi }
      volumes:
        - name: host
          hostPath: { path: / }
