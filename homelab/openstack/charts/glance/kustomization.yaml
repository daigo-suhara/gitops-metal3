apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
namespace: openstack
components:
  - ../_base
helmCharts:
  - name: glance
    repo: https://tarballs.opendev.org/openstack/openstack-helm
    version: 2026.1.11+a659ab8a2
    releaseName: glance
    namespace: openstack
    includeCRDs: true
    valuesInline:
      storage: pvc
      # 2Gi (chart default) can't hold the ~3.5GB StackHPC k8s qcow2 —
      # PUT /v2/images/.../file returns 413 "storage media is full".
      # Bump to 30Gi for now; multiple ubuntu + k8s images ~10Gi total.
      # SC rook-ceph-block has allowVolumeExpansion=true so live resize
      # is possible, but chart re-creates the PVC on value change so
      # existing PVCs need a manual `kubectl patch` to catch up.
      volume:
        size: 30Gi
      volume_staging:
        size: 5Gi
      # Chart's default single uwsgi worker blocks on a big upload for
      # tens of seconds; the healthcheck can't answer in time and kubelet
      # kills the pod mid-transfer. Add workers (upload keeps one busy,
      # others answer probes) and pad the probes so a slow write cycle
      # doesn't get counted as unhealthy.
      conf:
        glance:
          DEFAULT:
            workers: 4
      pod:
        resources:
          enabled: true
          api:
            requests: {cpu: "100m", memory: "1Gi"}
            limits:   {cpu: "2",    memory: "6Gi"}
        probes:
          api:
            glance-api:
              readiness:
                enabled: true
                params:
                  periodSeconds: 15
                  timeoutSeconds: 10
                  failureThreshold: 6
              liveness:
                enabled: true
                params:
                  initialDelaySeconds: 30
                  periodSeconds: 20
                  timeoutSeconds: 15
                  failureThreshold: 6
patches:
  - target:
      kind: Job
      name: glance-clean
    patch: |-
      $patch: delete
      apiVersion: batch/v1
      kind: Job
      metadata:
        name: glance-clean
