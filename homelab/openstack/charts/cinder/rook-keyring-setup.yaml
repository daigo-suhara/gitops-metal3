# Fetches client.cinder keyring from Rook Ceph and populates the
# cinder-volume-rbd-keyring Secret that the cinder-volume Pod's
# ceph-keyring-placement init container mounts. Replaces the manual
# `kubectl create secret ... --from-literal=key=...` step.
#
# Assumes rook-ceph-tools Deployment is Ready by the time this Job's
# PreSync hook fires (rook-ceph-cluster is at an earlier sync-wave).
# If not, ArgoCD retries via backoffLimit.
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: cinder-rook-keyring-setup
  namespace: openstack
  annotations:
    argocd.argoproj.io/hook: PreSync
    argocd.argoproj.io/hook-delete-policy: BeforeHookCreation
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: cinder-rook-keyring-setup
  annotations:
    argocd.argoproj.io/hook: PreSync
    argocd.argoproj.io/hook-delete-policy: BeforeHookCreation
rules:
  - apiGroups: [""]
    resources: [pods/exec]
    verbs: [create]
  - apiGroups: [""]
    resources: [secrets]
    verbs: [get, create, patch]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: cinder-rook-keyring-setup
  annotations:
    argocd.argoproj.io/hook: PreSync
    argocd.argoproj.io/hook-delete-policy: BeforeHookCreation
subjects: [{kind: ServiceAccount, name: cinder-rook-keyring-setup, namespace: openstack}]
roleRef: {apiGroup: rbac.authorization.k8s.io, kind: ClusterRole, name: cinder-rook-keyring-setup}
---
apiVersion: batch/v1
kind: Job
metadata:
  name: cinder-rook-keyring-setup
  namespace: openstack
  annotations:
    argocd.argoproj.io/hook: PreSync
    argocd.argoproj.io/hook-delete-policy: BeforeHookCreation
spec:
  ttlSecondsAfterFinished: 300
  backoffLimit: 20
  template:
    spec:
      serviceAccountName: cinder-rook-keyring-setup
      restartPolicy: OnFailure
      containers:
        - name: setup
          image: alpine/k8s:1.30.13
          command: [sh, -euc]
          args:
            - |
              KEY=$(kubectl -n rook-ceph exec deploy/rook-ceph-tools -- \
                ceph auth get-or-create-key client.cinder mon 'profile rbd' osd 'profile rbd')
              kubectl -n openstack create secret generic cinder-volume-rbd-keyring \
                --from-literal=key="$KEY" --dry-run=client -o yaml | kubectl apply -f -
