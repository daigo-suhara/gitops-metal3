apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
namespace: openstack
helmCharts:
  - name: neutron
    repo: https://tarballs.opendev.org/openstack/openstack-helm
    version: 2026.1.15+a659ab8a2
    releaseName: neutron
    namespace: openstack
    includeCRDs: true
    valuesInline:
      manifests:
        daemonset_sriov_agent: false
        pod_rally_test: false
        job_image_repo_sync: false
      pod:
        # nodes have no FQDN in DNS; short hostname avoids empty host= config
        use_fqdn:
          neutron_agent: false
      conf:
        plugins:
          openvswitch_agent:
            ovs:
              bridge_mappings: physnet1:br-ex
          ml2:
            ml2_type_flat:
              flat_networks: physnet1
patches:
  - target:
      kind: Job
    patch: |-
      - op: add
        path: /metadata/annotations/argocd.argoproj.io~1hook
        value: Sync
