apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
namespace: openstack
components:
  # Strip helm.sh/hook* from Jobs (else PostSync deadlock) + sync-wave -5 on SAs.
  - ../_base
helmCharts:
  - name: magnum
    repo: https://tarballs.opendev.org/openstack/openstack-helm
    version: 2026.1.5+a659ab8a2
    releaseName: magnum
    namespace: openstack
    includeCRDs: true
    valuesInline:
      manifests:
        job_image_repo_sync: false
        pod_rally_test: false
      # Drop Heat (orchestration) / Barbican (key_manager) from the api and
      # conductor kubernetes-entrypoint dependency lists — we don't deploy
      # those services in this lab.
      dependencies:
        static:
          api:
            jobs:
              - magnum-db-sync
              - magnum-ks-user
              - magnum-domain-ks-user
              - magnum-ks-endpoints
              - magnum-rabbit-init
            services:
              - endpoint: internal
                service: oslo_db
              - endpoint: internal
                service: identity
              - endpoint: internal
                service: oslo_messaging
          conductor:
            jobs:
              - magnum-db-sync
              - magnum-ks-user
              - magnum-domain-ks-user
              - magnum-ks-endpoints
              - magnum-rabbit-init
            services:
              - endpoint: internal
                service: oslo_db
              - endpoint: internal
                service: identity
              - endpoint: internal
                service: oslo_messaging
      conf:
        # magnum-api uwsgi: image ships no magnum-api-wsgi script → point uwsgi
        # at the in-tree magnum.wsgi.api:application module callable instead.
        magnum_api_uwsgi:
          uwsgi:
            wsgi-file: null
            module: magnum.wsgi.api:application
        # oslo_middleware 7.x's Healthcheck.factory raises when used as a paste
        # filter (app-only). Drop it from the pipeline (lab, non-critical).
        paste:
          pipeline:main:
            pipeline: cors request_id authtoken api_v1
        # The chart renders [capi-helm] with a dash, but the magnum-capi-helm
        # driver reads oslo.config group name "capi_helm" (underscore) — those
        # are literal to configparser. Add the underscore section too so the
        # driver can find its kubeconfig_file setting.
        # https://opendev.org/openstack/magnum-capi-helm/src/branch/master/magnum_capi_helm/conf.py
        magnum:
          capi_helm:
            kubeconfig_file: /etc/magnum/kubeconfig.conf
        # CAPI driver — magnum-conductor talks to the local (self-hosted) k8s
        # API to create Cluster/OpenStackCluster/KubeadmControlPlane CRs. The
        # chart mounts /etc/magnum/kubeconfig.conf from a Secret it renders
        # from these values; we point it at kubernetes.default.svc with
        # insecure-skip-tls (homelab). Cross-namespace RBAC for the
        # magnum-conductor SA is handled by the extra ClusterRoleBinding below.
        capi:
          enabled: true
          clusterName: local
          apiServer: https://kubernetes.default.svc:443
          certificateAuthorityData: ""
          contextName: default
          userName: magnum-conductor
          clientCertificateData: ""
          clientKeyData: ""
resources:
  # Grant magnum-conductor edit on Cluster CRs (CAPI + CAPO)
  - rbac-capi.yaml
patches:
  # Install magnum-capi-helm driver + helm binary at pod start.
  # Airshipit's magnum:2026.1-ubuntu_noble image doesn't include the CAPI helm
  # driver (nor the helm binary the driver invokes). Rather than fork the image,
  # a shared emptyDir /extra is populated by an initContainer:
  #   - /extra/pkgs        : pip --target install of magnum-capi-helm==1.4.0
  #   - /extra/bin/helm    : official Helm 3.16.3 binary
  # then the main container is given PATH=/extra/bin:$PATH and
  # PYTHONPATH=/extra/pkgs so importlib.metadata discovers the driver's
  # entry_points and helm CLI is on PATH.
  #
  # Refs:
  #   https://opendev.org/openstack/magnum-capi-helm/src/branch/master/doc/source/install/index.rst
  #   entry_point: magnum.drivers → k8s_capi_helm_v1 = magnum_capi_helm.driver:Driver
  - target:
      kind: Deployment
      name: magnum-api
    patch: |-
      - op: add
        path: /spec/template/spec/initContainers/-
        value:
          name: install-capi-driver
          # magnum:2026.1-ubuntu_noble ships no pip, so use the official
          # python:3.12-slim image (matches the magnum venv's python 3.12).
          image: python:3.12-slim
          command: [sh, -euc]
          args:
            - |
              # --no-deps: magnum-capi-helm's requirements.txt lists 'magnum'
              # which would shadow the image's baked-in magnum from PYTHONPATH
              # and break request handling. All other deps (pbr, oslo_log,
              # oslo_utils) are already in the image's venv.
              pip install --no-cache-dir --no-deps --target=/extra/pkgs magnum-capi-helm==1.4.0
              mkdir -p /extra/bin
              apt-get update -qq && apt-get install -qq -y curl >/dev/null
              curl -sL https://get.helm.sh/helm-v3.16.3-linux-amd64.tar.gz | tar xz -C /tmp
              mv /tmp/linux-amd64/helm /extra/bin/helm
              chmod +x /extra/bin/helm
          volumeMounts:
            - {name: extra, mountPath: /extra}
      - op: add
        path: /spec/template/spec/containers/0/volumeMounts/-
        value: {name: extra, mountPath: /extra, readOnly: true}
      - op: add
        path: /spec/template/spec/containers/0/env
        value:
          - {name: PYTHONPATH, value: /extra/pkgs}
          - {name: PATH, value: "/extra/bin:/var/lib/openstack/bin:/usr/local/sbin:/usr/local/bin:/usr/sbin:/usr/bin:/sbin:/bin"}
      - op: add
        path: /spec/template/spec/volumes/-
        value: {name: extra, emptyDir: {}}
  - target:
      kind: StatefulSet
      name: magnum-conductor
    patch: |-
      - op: add
        path: /spec/template/spec/initContainers/-
        value:
          name: install-capi-driver
          # magnum:2026.1-ubuntu_noble ships no pip, so use the official
          # python:3.12-slim image (matches the magnum venv's python 3.12).
          image: python:3.12-slim
          command: [sh, -euc]
          args:
            - |
              # --no-deps: magnum-capi-helm's requirements.txt lists 'magnum'
              # which would shadow the image's baked-in magnum from PYTHONPATH
              # and break request handling. All other deps (pbr, oslo_log,
              # oslo_utils) are already in the image's venv.
              pip install --no-cache-dir --no-deps --target=/extra/pkgs magnum-capi-helm==1.4.0
              mkdir -p /extra/bin
              apt-get update -qq && apt-get install -qq -y curl >/dev/null
              curl -sL https://get.helm.sh/helm-v3.16.3-linux-amd64.tar.gz | tar xz -C /tmp
              mv /tmp/linux-amd64/helm /extra/bin/helm
              chmod +x /extra/bin/helm
          volumeMounts:
            - {name: extra, mountPath: /extra}
      - op: add
        path: /spec/template/spec/containers/0/volumeMounts/-
        value: {name: extra, mountPath: /extra, readOnly: true}
      - op: add
        path: /spec/template/spec/containers/0/env
        value:
          - {name: PYTHONPATH, value: /extra/pkgs}
          - {name: PATH, value: "/extra/bin:/var/lib/openstack/bin:/usr/local/sbin:/usr/local/bin:/usr/sbin:/usr/bin:/sbin:/bin"}
      - op: add
        path: /spec/template/spec/volumes/-
        value: {name: extra, emptyDir: {}}
  # Chart's kubeconfig template lacks insecure-skip-tls-verify and token auth;
  # rewrite the Secret so kubectl-from-Pod uses the in-cluster SA token.
  - target:
      kind: Secret
      name: magnum-kubeconfig
    patch: |-
      apiVersion: v1
      kind: Secret
      metadata:
        name: magnum-kubeconfig
      stringData:
        kubeconfig.conf: |
          apiVersion: v1
          kind: Config
          clusters:
            - name: local
              cluster:
                server: https://kubernetes.default.svc:443
                insecure-skip-tls-verify: true
          contexts:
            - name: default
              context:
                cluster: local
                user: magnum-conductor
          current-context: default
          users:
            - name: magnum-conductor
              user:
                tokenFile: /var/run/secrets/kubernetes.io/serviceaccount/token
