apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
namespace: openstack
components:
  # Strip helm.sh/hook* from Jobs (else PostSync deadlock) + sync-wave -5 on SAs.
  - ../_base
helmCharts:
  - name: magnum
    repo: https://tarballs.opendev.org/openstack/openstack-helm
    version: 2026.1.5+a659ab8a2
    releaseName: magnum
    namespace: openstack
    includeCRDs: true
    valuesInline:
      manifests:
        job_image_repo_sync: false
        pod_rally_test: false
      # Drop Heat (orchestration) / Barbican (key_manager) from the api and
      # conductor kubernetes-entrypoint dependency lists — we don't deploy
      # those services in this lab.
      dependencies:
        static:
          api:
            jobs:
              - magnum-db-sync
              - magnum-ks-user
              - magnum-domain-ks-user
              - magnum-ks-endpoints
              - magnum-rabbit-init
            services:
              - endpoint: internal
                service: oslo_db
              - endpoint: internal
                service: identity
              - endpoint: internal
                service: oslo_messaging
          conductor:
            jobs:
              - magnum-db-sync
              - magnum-ks-user
              - magnum-domain-ks-user
              - magnum-ks-endpoints
              - magnum-rabbit-init
            services:
              - endpoint: internal
                service: oslo_db
              - endpoint: internal
                service: identity
              - endpoint: internal
                service: oslo_messaging
      conf:
        # Force magnum's internal service clients to use the "internal"
        # keystone endpoint. Chart's default publicURL resolves to
        # http://glance.openstack.svc.cluster.local (no matching Service)
        # so cluster template creation errors with 500 Name resolution.
        magnum:
          # Barbican (key-manager) not deployed → cert store must be local.
          certificates:
            cert_manager_type: x509keypair
          # region_name is REQUIRED for each *_client — cinder_region_name()
          # etc. call keystone().get_validate_region_name() which errors on None.
          glance_client:   {endpoint_type: internalURL, region_name: RegionOne}
          nova_client:     {endpoint_type: internalURL, region_name: RegionOne}
          neutron_client:  {endpoint_type: internalURL, region_name: RegionOne}
          heat_client:     {endpoint_type: internalURL, region_name: RegionOne}
          cinder_client:   {endpoint_type: internalURL, region_name: RegionOne}
          barbican_client: {endpoint_type: internalURL, region_name: RegionOne}
          octavia_client:  {endpoint_type: internalURL, region_name: RegionOne}
          # magnum's keystone client (for trustee/trust creation) picks the
          # interface from [trust].interface. Default is 'public' — same
          # non-existent hostname issue as the service clients.
          trust:
            interface: internal
          # magnum-api's own openstacksdk-based Connection uses this too.
          keystone_authtoken:
            interface: internal
          # magnum's newer "service user" auth (used by cert_manager,
          # capi driver's internal keystone calls) reads [keystone_auth]
          # not [keystone_authtoken]. Chart doesn't populate it → password
          # comes through as None. Mirror the authtoken user credentials.
          keystone_auth:
            auth_type: password
            auth_url: http://keystone-api.openstack.svc.cluster.local:5000/v3
            username: magnum
            password: password
            project_name: service
            project_domain_name: service
            user_domain_name: service
            region_name: RegionOne
            interface: internal
          # magnum-capi-helm driver reads [capi_helm] (underscore) — the chart
          # otherwise renders [capi-helm] which configparser treats as different.
          capi_helm:
            # Point at the token-based kubeconfig rendered by the init
            # container at pod boot (not the chart's empty cert one).
            kubeconfig_file: /extra/kubeconfig.conf
        # magnum-api uwsgi: image ships no magnum-api-wsgi script → point uwsgi
        # at the in-tree magnum.wsgi.api:application module callable instead.
        magnum_api_uwsgi:
          uwsgi:
            wsgi-file: null
            module: magnum.wsgi.api:application
        # oslo_middleware 7.x's Healthcheck.factory raises when used as a paste
        # filter (app-only). Drop it from the pipeline (lab, non-critical).
        paste:
          pipeline:main:
            pipeline: cors request_id authtoken api_v1
        # CAPI driver — magnum-conductor talks to the local (self-hosted) k8s
        # API to create Cluster/OpenStackCluster/KubeadmControlPlane CRs. The
        # chart mounts /etc/magnum/kubeconfig.conf from a Secret it renders
        # from these values; we point it at kubernetes.default.svc with
        # insecure-skip-tls (homelab). Cross-namespace RBAC for the
        # magnum-conductor SA is handled by the extra ClusterRoleBinding below.
        capi:
          enabled: true
          clusterName: local
          apiServer: https://kubernetes.default.svc:443
          certificateAuthorityData: ""
          contextName: default
          userName: magnum-conductor
          clientCertificateData: ""
          clientKeyData: ""
resources:
  # Grant magnum-conductor edit on Cluster CRs (CAPI + CAPO)
  - rbac-capi.yaml
patches:
  # Install magnum-capi-helm driver + helm binary at pod start.
  # Airshipit's magnum:2026.1-ubuntu_noble image doesn't include the CAPI helm
  # driver (nor the helm binary the driver invokes). Rather than fork the image,
  # a shared emptyDir /extra is populated by an initContainer:
  #   - /extra/pkgs        : pip --target install of magnum-capi-helm==1.4.0
  #   - /extra/bin/helm    : official Helm 3.16.3 binary
  # then the main container is given PATH=/extra/bin:$PATH and
  # PYTHONPATH=/extra/pkgs so importlib.metadata discovers the driver's
  # entry_points and helm CLI is on PATH.
  #
  # Refs:
  #   https://opendev.org/openstack/magnum-capi-helm/src/branch/master/doc/source/install/index.rst
  #   entry_point: magnum.drivers → k8s_capi_helm_v1 = magnum_capi_helm.driver:Driver
  - target:
      kind: Deployment
      name: magnum-api
    patch: |-
      - op: add
        path: /spec/template/spec/initContainers/-
        value:
          name: install-capi-driver
          # magnum:2026.1-ubuntu_noble ships no pip, so use the official
          # python:3.12-slim image (matches the magnum venv's python 3.12).
          image: python:3.12-slim
          command: [sh, -euc]
          args:
            - |
              # --no-deps: magnum-capi-helm's requirements.txt lists 'magnum'
              # which would shadow the image's baked-in magnum from PYTHONPATH
              # and break request handling. All other deps (pbr, oslo_log,
              # oslo_utils) are already in the image's venv.
              pip install --no-cache-dir --no-deps --target=/extra/pkgs magnum-capi-helm==1.4.0
              mkdir -p /extra/bin
              apt-get update -qq && apt-get install -qq -y curl >/dev/null
              curl -sL https://get.helm.sh/helm-v3.16.3-linux-amd64.tar.gz | tar xz -C /tmp
              mv /tmp/linux-amd64/helm /extra/bin/helm
              chmod +x /extra/bin/helm
              # magnum-capi-helm's kubernetes.py only understands 'token:'
              # inline in kubeconfig — it has no tokenFile support (see its
              # kubernetes.py:__init__). Read the SA token off the pod
              # filesystem now and render a static kubeconfig that magnum
              # can consume.
              TOKEN=$(cat /var/run/secrets/kubernetes.io/serviceaccount/token)
              # magnum-capi-helm/kubernetes.py doesn't honor
              # insecure-skip-tls-verify — must provide a valid CA. Use the
              # SA-mounted ca.crt (base64 encoded) as inline data.
              CA_B64=$(base64 -w0 /var/run/secrets/kubernetes.io/serviceaccount/ca.crt)
              cat > /extra/kubeconfig.conf <<EOF
              apiVersion: v1
              kind: Config
              clusters:
              - name: local
                cluster:
                  server: https://kubernetes.default.svc:443
                  certificate-authority-data: $CA_B64
              contexts:
              - name: default
                context:
                  cluster: local
                  user: magnum-conductor
              current-context: default
              users:
              - name: magnum-conductor
                user:
                  token: $TOKEN
              EOF
          volumeMounts:
            - {name: extra, mountPath: /extra}
      - op: add
        path: /spec/template/spec/containers/0/volumeMounts/-
        value: {name: extra, mountPath: /extra, readOnly: true}
      - op: add
        path: /spec/template/spec/containers/0/env
        value:
          - {name: PYTHONPATH, value: /extra/pkgs}
          - {name: PATH, value: "/extra/bin:/var/lib/openstack/bin:/usr/local/sbin:/usr/local/bin:/usr/sbin:/usr/bin:/sbin:/bin"}
      - op: add
        path: /spec/template/spec/volumes/-
        value: {name: extra, emptyDir: {}}
  - target:
      kind: StatefulSet
      name: magnum-conductor
    patch: |-
      - op: add
        path: /spec/template/spec/initContainers/-
        value:
          name: install-capi-driver
          # magnum:2026.1-ubuntu_noble ships no pip, so use the official
          # python:3.12-slim image (matches the magnum venv's python 3.12).
          image: python:3.12-slim
          command: [sh, -euc]
          args:
            - |
              # --no-deps: magnum-capi-helm's requirements.txt lists 'magnum'
              # which would shadow the image's baked-in magnum from PYTHONPATH
              # and break request handling. All other deps (pbr, oslo_log,
              # oslo_utils) are already in the image's venv.
              pip install --no-cache-dir --no-deps --target=/extra/pkgs magnum-capi-helm==1.4.0
              mkdir -p /extra/bin
              apt-get update -qq && apt-get install -qq -y curl >/dev/null
              curl -sL https://get.helm.sh/helm-v3.16.3-linux-amd64.tar.gz | tar xz -C /tmp
              mv /tmp/linux-amd64/helm /extra/bin/helm
              chmod +x /extra/bin/helm
              # magnum-capi-helm's kubernetes.py only understands 'token:'
              # inline in kubeconfig — it has no tokenFile support (see its
              # kubernetes.py:__init__). Read the SA token off the pod
              # filesystem now and render a static kubeconfig that magnum
              # can consume.
              TOKEN=$(cat /var/run/secrets/kubernetes.io/serviceaccount/token)
              # magnum-capi-helm/kubernetes.py doesn't honor
              # insecure-skip-tls-verify — must provide a valid CA. Use the
              # SA-mounted ca.crt (base64 encoded) as inline data.
              CA_B64=$(base64 -w0 /var/run/secrets/kubernetes.io/serviceaccount/ca.crt)
              cat > /extra/kubeconfig.conf <<EOF
              apiVersion: v1
              kind: Config
              clusters:
              - name: local
                cluster:
                  server: https://kubernetes.default.svc:443
                  certificate-authority-data: $CA_B64
              contexts:
              - name: default
                context:
                  cluster: local
                  user: magnum-conductor
              current-context: default
              users:
              - name: magnum-conductor
                user:
                  token: $TOKEN
              EOF
          volumeMounts:
            - {name: extra, mountPath: /extra}
      - op: add
        path: /spec/template/spec/containers/0/volumeMounts/-
        value: {name: extra, mountPath: /extra, readOnly: true}
      - op: add
        path: /spec/template/spec/containers/0/env
        value:
          - {name: PYTHONPATH, value: /extra/pkgs}
          - {name: PATH, value: "/extra/bin:/var/lib/openstack/bin:/usr/local/sbin:/usr/local/bin:/usr/sbin:/usr/bin:/sbin:/bin"}
      - op: add
        path: /spec/template/spec/volumes/-
        value: {name: extra, emptyDir: {}}
  # Chart's kubeconfig.tpl only supports cert-based auth (empty client-cert
  # + empty CA → SSL "no certificate or crl found" on every apply). The
  # actual file lives inside the `magnum-etc` Secret alongside magnum.conf,
  # so patch its stringData.kubeconfig.conf to a token+skip-verify variant
  # that uses the in-cluster SA.
  - target:
      kind: Secret
      name: magnum-etc
    patch: |-
      apiVersion: v1
      kind: Secret
      metadata:
        name: magnum-etc
      stringData:
        kubeconfig.conf: |
          apiVersion: v1
          kind: Config
          clusters:
            - name: local
              cluster:
                server: https://kubernetes.default.svc:443
                insecure-skip-tls-verify: true
          contexts:
            - name: default
              context:
                cluster: local
                user: magnum-conductor
          current-context: default
          users:
            - name: magnum-conductor
              user:
                tokenFile: /var/run/secrets/kubernetes.io/serviceaccount/token
