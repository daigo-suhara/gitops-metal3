apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
namespace: openstack
components:
  # Rewrite Jobs to hook=Sync (wave 5) so the api Deployment's
  # kubernetes-entrypoint init container can find them.
  - ../_base
helmCharts:
  - name: magnum
    repo: https://tarballs.opendev.org/openstack/openstack-helm
    version: 2026.1.5+a659ab8a2
    releaseName: magnum
    namespace: openstack
    includeCRDs: true
    valuesInline:
      manifests:
        job_image_repo_sync: false
        pod_rally_test: false
      # Drop Heat (orchestration) / Barbican (key_manager) from the api and
      # conductor kubernetes-entrypoint dependency lists — we don't deploy
      # those services in this lab. Without this override the init container
      # spins forever waiting for heat-api and barbican-api endpoints.
      dependencies:
        static:
          api:
            jobs:
              - magnum-db-sync
              - magnum-ks-user
              - magnum-domain-ks-user
              - magnum-ks-endpoints
              - magnum-rabbit-init
            services:
              - endpoint: internal
                service: oslo_db
              - endpoint: internal
                service: identity
              - endpoint: internal
                service: oslo_messaging
          conductor:
            jobs:
              - magnum-db-sync
              - magnum-ks-user
              - magnum-domain-ks-user
              - magnum-ks-endpoints
              - magnum-rabbit-init
            services:
              - endpoint: internal
                service: oslo_db
              - endpoint: internal
                service: identity
              - endpoint: internal
                service: oslo_messaging
      # CAPI driver — magnum-conductor talks to the local (self-hosted) k8s API
      # to create Cluster/OpenStackCluster/KubeadmControlPlane CRs. The chart
      # mounts /etc/magnum/kubeconfig.conf from a Secret it renders from these
      # values; we point it at kubernetes.default.svc with insecure-skip-tls
      # (homelab). Cross-namespace RBAC for the magnum-conductor SA is handled
      # by the extra ClusterRoleBinding below.
      conf:
        capi:
          enabled: true
          clusterName: local
          apiServer: https://kubernetes.default.svc:443
          certificateAuthorityData: ""
          contextName: default
          userName: magnum-conductor
          clientCertificateData: ""
          clientKeyData: ""
resources:
  # Grant magnum-conductor edit on Cluster CRs (CAPI + CAPO)
  - rbac-capi.yaml
patches:
  # Chart's kubeconfig template lacks insecure-skip-tls-verify and token auth;
  # rewrite the Secret so kubectl-from-Pod uses the in-cluster SA token.
  - target:
      kind: Secret
      name: magnum-kubeconfig
    patch: |-
      apiVersion: v1
      kind: Secret
      metadata:
        name: magnum-kubeconfig
      stringData:
        kubeconfig.conf: |
          apiVersion: v1
          kind: Config
          clusters:
            - name: local
              cluster:
                server: https://kubernetes.default.svc:443
                insecure-skip-tls-verify: true
          contexts:
            - name: default
              context:
                cluster: local
                user: magnum-conductor
          current-context: default
          users:
            - name: magnum-conductor
              user:
                tokenFile: /var/run/secrets/kubernetes.io/serviceaccount/token
