apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
namespace: openstack
helmCharts:
  - name: placement
    repo: https://tarballs.opendev.org/openstack/openstack-helm
    version: 2026.1.7+a659ab8a2
    releaseName: placement
    namespace: openstack
    includeCRDs: true
patches:
  - target:
      kind: Job
    patch: |-
      - op: add
        path: /metadata/annotations/argocd.argoproj.io~1hook
        value: Sync
