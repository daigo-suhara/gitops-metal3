apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
namespace: openstack
components:
  - ../_base
helmCharts:
  - name: keystone
    repo: https://tarballs.opendev.org/openstack/openstack-helm
    version: 2026.1.10+a659ab8a2
    releaseName: keystone
    namespace: openstack
    includeCRDs: true
    valuesInline:
      # Advertise a LAN-reachable IP for the *public* keystone URL so
      # workload clusters created by Magnum/CAPI (whose VMs sit on tenant
      # networks with no in-cluster DNS) can hit keystone from cloud-provider
      # add-ons like openstack-cloud-controller-manager.
      # The IP comes from Cilium's LB pool — kept static via Service
      # (see runtime/service-aliases.yaml keystone LoadBalancer).
      endpoints:
        identity:
          host_fqdn_override:
            # 172.16.100.103 is pinned to the keystone LoadBalancer Service
            # in runtime/service-aliases.yaml — reachable from tenant VMs.
            public:
              host: 172.16.100.103
patches:
  # credential-cleanup is a pre-delete-only hook whose SQL runs against a
  # non-existent table during install and errors. Drop it entirely.
  - target:
      kind: Job
      name: keystone-credential-cleanup
    patch: |-
      $patch: delete
      apiVersion: batch/v1
      kind: Job
      metadata:
        name: keystone-credential-cleanup
