apiVersion: kustomize.config.k8s.io/v1alpha1
kind: Component
# Shared across all openstack-helm chart wrappers under ../: add
# argocd.argoproj.io/hook=Sync to every Job. ArgoCD then treats them as
# Sync-phase resources instead of PostSync hooks (helm.sh/hook is honored
# only when this annotation is absent). This unblocks the deadlock where
# a service Deployment's init container waits for Jobs (db-sync/ks-*)
# that ArgoCD would otherwise only apply *after* the Deployment is Healthy.
#
# Also assign sync-wave=5 to the Jobs so ServiceAccounts / Roles / RoleBindings
# (default wave 0) are applied first. Without this the Job pod gets created
# before its SA exists and Kubernetes fails with "serviceaccount X not found".
patches:
  - target:
      kind: Job
    patch: |-
      - op: add
        path: /metadata/annotations/argocd.argoproj.io~1hook
        value: Sync
      - op: add
        path: /metadata/annotations/argocd.argoproj.io~1sync-wave
        value: "5"
