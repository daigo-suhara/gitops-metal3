apiVersion: kustomize.config.k8s.io/v1alpha1
kind: Component
# Shared across all openstack-helm chart wrappers under ../.
#
# 1) Strip all helm.sh/hook* annotations from every Job. openstack-helm
#    annotates the db-init / db-sync / ks-* / rabbit-init Jobs as
#    post-install hooks; ArgoCD interprets that as PostSync and defers
#    them until after the Deployment is Healthy — but the Deployment's
#    kubernetes-entrypoint init container polls for exactly those Jobs
#    to complete. Deadlock. Stripping the annotations makes them regular
#    Sync-phase resources.
#
#    We remove helm.sh/hook, helm.sh/hook-weight AND helm.sh/hook-delete-policy
#    because ArgoCD's hook detection appears to treat orphaned hook-weight as
#    a hook indicator too (the Job was still applied ahead of ConfigMap/Secret
#    when only helm.sh/hook was stripped).
#
# 2) Assign sync-wave=-5 to ServiceAccounts. Same-wave resources are
#    applied concurrently, and on fresh installs the Job pod could
#    sometimes be scheduled before its SA propagated through kubelet's
#    informer cache ("serviceaccount X not found"). Bumping SAs a wave
#    earlier fixes this.
#
# Notes on Kustomize gotchas:
# - JSON 6902 `remove` op fails if the path doesn't exist. Only helm.sh/hook
#   is guaranteed on all Jobs; hook-weight/hook-delete-policy vary. We use
#   `test`+`remove` semantics via a strategic-merge fallback would set them
#   to the string "null" (Kustomize bug). Instead we use conditional
#   annotation removal below by targeting specific job groups.
patches:
  - target:
      kind: Job
    patch: |-
      - op: remove
        path: /metadata/annotations/helm.sh~1hook
  # hook-weight is on all Jobs except magnum-domain-ks-user (which has
  # hook-delete-policy instead). Apply remove to matched jobs.
  - target:
      kind: Job
      annotationSelector: helm.sh/hook-weight
    patch: |-
      - op: remove
        path: /metadata/annotations/helm.sh~1hook-weight
  - target:
      kind: Job
      annotationSelector: helm.sh/hook-delete-policy
    patch: |-
      - op: remove
        path: /metadata/annotations/helm.sh~1hook-delete-policy
  - target:
      kind: ServiceAccount
    patch: |-
      - op: add
        path: /metadata/annotations
        value:
          argocd.argoproj.io/sync-wave: "-5"
