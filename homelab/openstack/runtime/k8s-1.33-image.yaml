# Downloads the StackHPC azimuth-images k8s-preinstalled Ubuntu 22.04 (Jammy)
# image and registers it in Glance. Idempotent — skips if image already active.
#
# Required by magnum-capi-helm driver: the driver looks up the cluster
# template's image by os_distro/os_version/kube_version properties and
# expects a Kubernetes-ready qcow2 (kubelet, kubeadm, containerd baked in).
#
# Source: https://github.com/stackhpc/azimuth-images/releases/tag/0.32.0
# The 1.33 stream matches the CAPI operator's KubeadmControlPlane defaults.
---
apiVersion: batch/v1
kind: Job
metadata:
  name: glance-upload-k8s-1-33-jammy
  namespace: openstack
spec:
  ttlSecondsAfterFinished: 3600
  backoffLimit: 6
  template:
    spec:
      # Reuses SA/Role/RoleBinding defined in ubuntu-2404-image.yaml
      serviceAccountName: openstack-image-upload
      restartPolicy: OnFailure
      # Avoid the 16GB node (tx1320m3-03) — it's already 120% overcommitted,
      # so a burstable Job gets evicted before finishing a 5-minute upload.
      affinity:
        nodeAffinity:
          requiredDuringSchedulingIgnoredDuringExecution:
            nodeSelectorTerms:
              - matchExpressions:
                  - {key: kubernetes.io/hostname, operator: NotIn, values: [tx1320m3-03]}
      containers:
        - name: upload
          image: quay.io/airshipit/openstack-client:2026.1-ubuntu_noble
          env:
            - {name: OS_AUTH_URL, value: http://keystone-api.openstack.svc.cluster.local:5000/v3}
            - {name: OS_USERNAME, value: admin}
            - name: OS_PASSWORD
              valueFrom:
                secretKeyRef: {name: keystone-keystone-admin, key: OS_PASSWORD}
            - {name: OS_PROJECT_NAME, value: admin}
            - {name: OS_USER_DOMAIN_NAME, value: Default}
            - {name: OS_PROJECT_DOMAIN_NAME, value: Default}
            - {name: OS_IDENTITY_API_VERSION, value: "3"}
            - {name: OS_INTERFACE, value: internal}
          resources:
            requests: {cpu: 200m, memory: 512Mi}
            # curl streaming (below) doesn't buffer — 1Gi is plenty.
            limits: {cpu: 2, memory: 1Gi}
          volumeMounts:
            - {name: cache, mountPath: /tmp}
          command: [sh, -euc]
          args:
            - |
              IMG=ubuntu-jammy-kube-v1.33.13
              URL=https://azimuth-images.stackhpc.cloud/ubuntu-jammy-kube-v1.33.13-260705-1940.qcow2
              SHA=1699ba08a303de52a282ddc57a6b7631df33accd8707672160f3a72ddaf2a537
              STATUS=$(openstack image show "$IMG" -f value -c status 2>/dev/null || true)
              if [ "$STATUS" = active ]; then
                echo "$IMG already active"
                exit 0
              fi
              apt-get -qq update && apt-get -qq install -y curl jq
              GLANCE=http://glance-api.openstack.svc.cluster.local:9292
              TOKEN=$(openstack token issue -f value -c id)
              # 1) Purge stale queued records left over from failed retries.
              #    (name is not unique in glance — multiple queued rows can
              #    accumulate; delete them all before creating a fresh one.)
              for id in $(openstack image list --name "$IMG" -f value -c ID); do
                echo "purging stale record $id"
                curl -sf -X DELETE -H "X-Auth-Token: $TOKEN" "$GLANCE/v2/images/$id" || true
              done
              # 2) Create empty image record via Glance API. `openstack image
              # create` without --file reads stdin and PUTs it as body → 415.
              IMG_ID=$(curl -sf -X POST "$GLANCE/v2/images" \
                -H "X-Auth-Token: $TOKEN" \
                -H "Content-Type: application/json" \
                -d "{
                  \"name\": \"$IMG\",
                  \"disk_format\": \"qcow2\",
                  \"container_format\": \"bare\",
                  \"visibility\": \"public\",
                  \"os_distro\": \"ubuntu\",
                  \"os_version\": \"22.04\",
                  \"architecture\": \"x86_64\",
                  \"kube_version\": \"v1.33.13\"
                }" | jq -r .id)
              echo "created empty image record: $IMG_ID"
              # 3) Stage the qcow2 on disk so curl can PUT with a known
              # Content-Length. Glance's file endpoint 415s on chunked
              # Transfer-Encoding bodies (which stdin-piped curl produces).
              echo "downloading $URL"
              curl -fsSL "$URL" -o /tmp/k8s.qcow2
              ls -lh /tmp/k8s.qcow2
              echo "uploading to $GLANCE/v2/images/$IMG_ID/file"
              curl -f -X PUT -H "X-Auth-Token: $TOKEN" \
                -H "Content-Type: application/octet-stream" \
                --upload-file /tmp/k8s.qcow2 \
                "$GLANCE/v2/images/$IMG_ID/file"
              # 4) Sanity-check what Glance recorded.
              openstack image show "$IMG" -c status -c size -c checksum
      volumes:
        - name: cache
          # We stage the qcow2 on disk so curl can PUT with a known
          # Content-Length; Glance rejects Transfer-Encoding: chunked
          # bodies with 415. Image is ~3.5GB — pad to 5Gi.
          emptyDir: {sizeLimit: 5Gi}
