# openstack-helm's keystone catalog puts the *public* interface at
# http://<service>.openstack.svc.cluster.local:80 (chart value
# endpoints.identity.hosts.default=keystone / port.api.default=80), but the
# actual Kubernetes Services expose only the internal name+port
# (keystone-api:5000, glance-api:9292, etc).
#
# Two flavors:
#   - LoadBalancer (Cilium IPAM, IPs on 172.16.100.x) for endpoints that
#     workload-cluster VMs must reach (keystone, nova, neutron, cinder are
#     accessed by OCCM/CSI running inside CAPI-managed k8s clusters).
#   - ClusterIP for endpoints only host-cluster pods use (glance, placement,
#     magnum) — the ClusterIP alias fixes the public-URL name resolution
#     for tools like magnum-conductor's openstacksdk Connection.
---
apiVersion: v1
kind: Service
metadata:
  name: keystone
  namespace: openstack
  annotations:
    # Pin the LB IP so the openstack-helm keystone catalog can bake it into
    # the *public* endpoint URL (see charts/keystone/kustomization.yaml).
    io.cilium/lb-ipam-ips: 172.16.100.103
spec:
  type: LoadBalancer
  ports:
    - {name: http, port: 80, targetPort: 5000}
  selector:
    application: keystone
    component: api
---
apiVersion: v1
kind: Service
metadata:
  name: nova
  namespace: openstack
  annotations:
    io.cilium/lb-ipam-ips: 172.16.100.104
spec:
  type: LoadBalancer
  ports:
    - {name: http, port: 80, targetPort: 8774}
  selector:
    application: nova
    component: os-api
---
apiVersion: v1
kind: Service
metadata:
  name: neutron
  namespace: openstack
  annotations:
    io.cilium/lb-ipam-ips: 172.16.100.105
spec:
  type: LoadBalancer
  ports:
    - {name: http, port: 80, targetPort: 9696}
  selector:
    application: neutron
    component: server
---
apiVersion: v1
kind: Service
metadata:
  name: cinder
  namespace: openstack
  annotations:
    io.cilium/lb-ipam-ips: 172.16.100.106
spec:
  type: LoadBalancer
  ports:
    - {name: http, port: 80, targetPort: 8776}
  selector:
    application: cinder
    component: api
---
apiVersion: v1
kind: Service
metadata:
  name: glance
  namespace: openstack
spec:
  type: ClusterIP
  ports:
    - {name: http, port: 80, targetPort: 9292}
  selector:
    application: glance
    component: api
---
apiVersion: v1
kind: Service
metadata:
  name: placement
  namespace: openstack
spec:
  type: ClusterIP
  ports:
    - {name: http, port: 80, targetPort: 8778}
  selector:
    application: placement
    component: api
---
apiVersion: v1
kind: Service
metadata:
  name: magnum
  namespace: openstack
spec:
  type: ClusterIP
  ports:
    - {name: http, port: 80, targetPort: 9511}
  selector:
    application: magnum
    component: api
