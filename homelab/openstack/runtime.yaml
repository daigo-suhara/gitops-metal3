apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: openstack-runtime
  namespace: argocd
  annotations:
    # After keystone (wave 20) and glance (wave 21), before capi providers (25)
    argocd.argoproj.io/sync-wave: "24"
spec:
  project: default
  source:
    repoURL: https://github.com/daigo-suhara/gitops-metal3.git
    targetRevision: HEAD
    path: homelab/openstack/runtime
  destination:
    server: https://kubernetes.default.svc
    namespace: openstack
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true
