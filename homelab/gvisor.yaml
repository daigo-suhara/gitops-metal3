# gVisor (runsc) DaemonSet installs the runtime binary on every node and
# patches containerd config, then a RuntimeClass exposes it to workloads.
# Set `runtimeClassName: gvisor` on any pod that needs the extra kernel
# isolation - Knative Services from dcloud's container service inherit
# this via the chart.
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: gvisor
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "5"
spec:
  project: default
  source:
    repoURL: https://github.com/daigo-suhara/gitops-metal3.git
    targetRevision: HEAD
    path: homelab/gvisor
  destination:
    server: https://kubernetes.default.svc
    namespace: kube-system
  syncPolicy:
    automated: { prune: true, selfHeal: true }
    syncOptions: [ServerSideApply=true]
    retry:
      limit: 10
      backoff: { duration: 30s, factor: 2, maxDuration: 5m }
