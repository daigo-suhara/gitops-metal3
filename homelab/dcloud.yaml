apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: dcloud
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "30"
spec:
  project: default
  source:
    repoURL: https://github.com/daigo-suhara/dcloud.git
    targetRevision: HEAD
    path: charts/dcloud
    helm:
      releaseName: dcloud
      valuesObject:
        image:
          registry: ghcr.io
          repositoryOwner: daigo-suhara
          tag: latest
        storageClass:
          createClass: false
          className: ""
        publicServiceDomain: drkatana.com
        console:
          publicHostname: cloud.daigo-suhara.com
          replicaCount: 1
        database:
          externalSecret: dcloud-database
        storage:
          replicaCount: 1
          rgwEndpoint: "http://rook-ceph-rgw-default.rook-ceph.svc.cluster.local:80"
        identity:  { replicaCount: 1 }
        project:   { replicaCount: 1 }
        container: { replicaCount: 1 }
        compute:   { replicaCount: 1 }
        ingress:
          enabled: false
  destination:
    server: https://kubernetes.default.svc
    namespace: dcloud-system
  ignoreDifferences:
    # knative-operator continuously updates the aggregated ClusterRole
    # rules to reflect discovered CRDs; Argo would otherwise flag drift
    # on every reconcile.
    - group: rbac.authorization.k8s.io
      kind: ClusterRole
      name: knative-serving-operator-aggregated-stable
      jsonPointers: [/rules]
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true
      - RespectIgnoreDifferences=true
    retry:
      limit: 10
      backoff: { duration: 30s, factor: 2, maxDuration: 5m }
