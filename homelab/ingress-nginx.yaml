# Public entry point for the cluster. ingress-nginx binds the host's
# port 80/443 via hostPort so the home router only needs to forward
# those two ports to any node IP. TLS certificates are issued by
# cert-manager (see cert-manager-issuer.yaml).
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: ingress-nginx
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "12"
spec:
  project: default
  source:
    repoURL: https://kubernetes.github.io/ingress-nginx
    chart: ingress-nginx
    targetRevision: 4.11.3
    helm:
      releaseName: ingress-nginx
      valuesObject:
        controller:
          # LoadBalancer Service backed by the existing L2/BGP announcer.
          # If MetalLB / Cilium LB is not set up, switch this to
          # hostPort + DaemonSet and expose 80/443 directly.
          service:
            type: LoadBalancer
          # Wildcard TLS server that presents the cert cert-manager
          # provisions per Ingress.
          extraArgs:
            enable-ssl-passthrough: "true"
          # Real client IPs for logging / rate limits.
          config:
            use-forwarded-headers: "true"
            proxy-real-ip-cidr: "0.0.0.0/0"
          # Give ingress-nginx CPU/RAM to survive burst upload traffic.
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              memory: 512Mi
  destination:
    server: https://kubernetes.default.svc
    namespace: ingress-nginx
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true
    retry:
      limit: 10
      backoff: { duration: 30s, factor: 2, maxDuration: 5m }
