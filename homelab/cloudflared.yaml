# Cloudflare Tunnel that publishes the cluster to the internet with no
# port forward on the home router. The tunnel token is committed as a
# SealedSecret via homelab/cloudflared-secret.yaml (sync-wave 15), so
# no manual `kubectl create secret` is needed after a cluster rebuild.
# To rotate: fetch a new token from Cloudflare Zero Trust ->
# Networks -> Tunnels, re-seal with kubeseal, and commit.
#
# Hostname -> Service routing is configured in the Cloudflare Zero Trust
# dashboard for the tunnel. Example:
#   grafana.<your-domain>  -> http://monitoring-grafana.monitoring.svc.cluster.local:80
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: cloudflared
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "20"
spec:
  project: default
  source:
    repoURL: https://github.com/daigo-suhara/gitops-metal3.git
    targetRevision: HEAD
    path: homelab/cloudflared
  destination:
    server: https://kubernetes.default.svc
    namespace: cloudflare
  syncPolicy:
    automated: { prune: true, selfHeal: true }
    syncOptions: [CreateNamespace=true, ServerSideApply=true]
    retry:
      limit: 10
      backoff: { duration: 30s, factor: 2, maxDuration: 5m }
