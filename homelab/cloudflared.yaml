# Cloudflare Tunnel that publishes the cluster to the internet with no
# port forward on the home router. The tunnel token is a one-time secret
# fetched from Cloudflare Zero Trust -> Networks -> Tunnels -> Create;
# create the Secret with:
#
#   kubectl create secret generic cloudflared-tunnel-token \
#     -n cloudflare \
#     --from-literal=token=<TOKEN>
#
# Hostname -> Service routing is configured in the Cloudflare Zero Trust
# dashboard for the tunnel:
#   cloud.<your-domain>   -> http://dcloud-console.dcloud-system.svc.cluster.local:8080
#   *.<your-domain>       -> http://istio-ingressgateway.istio-system.svc.cluster.local:80
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: cloudflared
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "20"
spec:
  project: default
  source:
    repoURL: https://github.com/daigo-suhara/gitops-metal3.git
    targetRevision: HEAD
    path: homelab/cloudflared
  destination:
    server: https://kubernetes.default.svc
    namespace: cloudflare
  syncPolicy:
    automated: { prune: true, selfHeal: true }
    syncOptions: [CreateNamespace=true, ServerSideApply=true]
    retry:
      limit: 10
      backoff: { duration: 30s, factor: 2, maxDuration: 5m }
