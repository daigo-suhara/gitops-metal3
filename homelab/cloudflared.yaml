# Cloudflare Tunnel that publishes cloud.daigo-suhara.com and the tenant
# *.drkatana.com hostnames. Assumes a Secret named `cloudflared-tunnel-token`
# in the `cloudflare` namespace holds the tunnel token (created manually
# per operations/tunnel setup).
---
apiVersion: v1
kind: Namespace
metadata:
  name: cloudflare
  annotations:
    argocd.argoproj.io/sync-wave: "20"
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: cloudflared
  namespace: cloudflare
  annotations:
    argocd.argoproj.io/sync-wave: "22"
spec:
  replicas: 2
  selector:
    matchLabels:
      app: cloudflared
  template:
    metadata:
      labels:
        app: cloudflared
    spec:
      containers:
        - name: cloudflared
          image: cloudflare/cloudflared:2024.11.0
          args: [tunnel, --no-autoupdate, run, --token, $(TUNNEL_TOKEN)]
          env:
            - name: TUNNEL_TOKEN
              valueFrom:
                secretKeyRef:
                  name: cloudflared-tunnel-token
                  key: token
          resources:
            requests:
              cpu: 50m
              memory: 128Mi
            limits:
              memory: 256Mi
