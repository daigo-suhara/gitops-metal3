# Cloudflare Tunnel that publishes the cluster to the internet with no
# port forward on the home router. The tunnel token is a one-time secret
# fetched from Cloudflare Zero Trust -> Networks -> Tunnels -> Create;
# create the Secret with:
#
#   kubectl create secret generic cloudflared-tunnel-token \
#     -n cloudflare \
#     --from-literal=token=<TOKEN>
#
# Hostname -> Service routing is configured in the Cloudflare Zero Trust
# dashboard for the tunnel:
#   cloud.<your-domain>   -> http://dcloud-console.dcloud-system.svc.cluster.local:8080
#   *.<your-domain>       -> http://istio-ingressgateway.istio-system.svc.cluster.local:80
#
# dcloud's chart is public-exposure agnostic - if you drop cloudflared
# in favour of an ingress-nginx / gateway / LAN-only setup, only this
# file and the ingress values under homelab/dcloud.yaml change.
---
apiVersion: v1
kind: Namespace
metadata:
  name: cloudflare
  annotations:
    argocd.argoproj.io/sync-wave: "20"
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: cloudflared
  namespace: cloudflare
  annotations:
    argocd.argoproj.io/sync-wave: "22"
spec:
  replicas: 2
  selector:
    matchLabels:
      app: cloudflared
  template:
    metadata:
      labels:
        app: cloudflared
    spec:
      containers:
        - name: cloudflared
          image: cloudflare/cloudflared:2024.11.0
          args: [tunnel, --no-autoupdate, run, --token, $(TUNNEL_TOKEN)]
          env:
            - name: TUNNEL_TOKEN
              valueFrom:
                secretKeyRef:
                  name: cloudflared-tunnel-token
                  key: token
          resources:
            requests:
              cpu: 50m
              memory: 128Mi
            limits:
              memory: 256Mi
