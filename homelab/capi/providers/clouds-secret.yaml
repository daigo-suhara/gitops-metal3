apiVersion: v1
kind: Secret
metadata:
  name: openstack-credentials
  namespace: capo-system
type: Opaque
stringData:
  # CAPO reads this to authenticate against Nova/Neutron/Cinder/Glance.
  # For homelab we use admin/password; production should use a dedicated
  # capi-tenant user via Barbican or ExternalSecrets.
  clouds.yaml: |
    clouds:
      openstack:
        auth:
          auth_url: http://keystone-api.openstack.svc.cluster.local:5000/v3
          username: admin
          password: password
          project_name: admin
          user_domain_name: default
          project_domain_name: default
        region_name: RegionOne
        interface: internal
        identity_api_version: 3
