# k-orc/openstack-resource-controller (ORC)
#
# CAPO 0.14.x's OpenStackServer controller watches Image resources from
# k-orc.cloud (v1alpha1.Image). Without ORC's CRDs installed, capo-controller
# crash-loops with "no matches for kind Image in version openstack.k-orc.cloud/v1alpha1",
# so capo-webhook-service has zero endpoints and helm-installed OpenStackCluster
# fails validation with 'operation not permitted'.
---
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: openstack-resource-controller
  namespace: argocd
  annotations:
    # Before capi providers (wave 15) so CRDs exist when CAPO starts.
    argocd.argoproj.io/sync-wave: "10"
spec:
  project: default
  source:
    repoURL: https://github.com/k-orc/openstack-resource-controller
    targetRevision: v2.6.0
    path: config/default
  destination:
    server: https://kubernetes.default.svc
    namespace: orc-system
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true
