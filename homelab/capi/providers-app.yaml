apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: capi-providers
  namespace: argocd
  annotations:
    # After cluster-api-operator (wave 15) so its CRDs (CoreProvider etc.) exist.
    argocd.argoproj.io/sync-wave: "25"
spec:
  project: default
  source:
    repoURL: https://github.com/daigo-suhara/gitops-metal3.git
    targetRevision: HEAD
    path: homelab/capi/providers
  destination:
    server: https://kubernetes.default.svc
    namespace: capi-system
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true
