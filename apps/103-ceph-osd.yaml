apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: ceph-osd
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "103"
spec:
  project: default
  source:
    repoURL: https://opendev.org/openstack/openstack-helm.git
    path: ceph-osd
    targetRevision: master
    helm:
      releaseName: ceph-osd
      values: |
        labels:
          osd:
            node_selector_key: ceph-osd
            node_selector_value: enabled
          job:
            node_selector_key: ceph-osd
            node_selector_value: enabled

        network:
          public: 172.16.0.0/16
          cluster: 172.16.0.0/16

        conf:
          ceph:
            global:
              fsid: c12792b1-87d4-4a43-98dd-c6374e6ab9e4
              public_network: 172.16.0.0/16
              cluster_network: 172.16.0.0/16
          storage:
            osd:
              - data:
                  type: bluestore
                  location: /dev/sdb

        pod:
          tolerations:
            osd:
              - key: node-role.kubernetes.io/control-plane
                operator: Exists
                effect: NoSchedule
            bootstrap:
              - key: node-role.kubernetes.io/control-plane
                operator: Exists
                effect: NoSchedule

        endpoints:
          ceph_mon:
            namespace: rook-ceph

        images:
          tags:
            ceph_osd: "quay.io/airshipit/ceph-daemon:ubuntu_jammy_20.2.1-1-20260407"
            ceph_bootstrap: "quay.io/airshipit/ceph-daemon:ubuntu_jammy_20.2.1-1-20260407"
            ceph_config_helper: "quay.io/airshipit/ceph-config-helper:ubuntu_jammy_20.2.1-1-20260407"
            dep_check: "quay.io/airshipit/kubernetes-entrypoint:latest-ubuntu_noble"
            image_repo_sync: "docker.io/library/docker:17.07.0"
  destination:
    server: https://172.16.10.100:6443
    namespace: rook-ceph
  syncPolicy:
    automated:
      prune: false
      selfHeal: true
    retry:
      limit: 5
      backoff:
        duration: 30s
        factor: 2
        maxDuration: 5m
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true
