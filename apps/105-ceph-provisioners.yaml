apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: ceph-provisioners
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "105"
spec:
  project: default
  source:
    repoURL: https://opendev.org/openstack/openstack-helm.git
    path: ceph-provisioners
    targetRevision: master
    helm:
      releaseName: ceph-provisioners
      values: |
        labels:
          job:
            node_selector_key: ceph-mon
            node_selector_value: enabled
          provisioner:
            node_selector_key: openstack-control-plane
            node_selector_value: enabled
          csi_rbd_plugin:
            node_selector_key: openstack-control-plane
            node_selector_value: enabled

        network:
          public: 172.16.0.0/16
          cluster: 172.16.0.0/16

        conf:
          ceph:
            global:
              fsid: c12792b1-87d4-4a43-98dd-c6374e6ab9e4

        deployment:
          ceph: true
          client_secrets: true
          csi_rbd_provisioner: true

        endpoints:
          ceph_mon:
            namespace: rook-ceph

        storageclass:
          rbd:
            metadata:
              name: ceph-rbd
              annotations:
                storageclass.kubernetes.io/is-default-class: "true"
            parameters:
              adminId: admin
              userSecretName: pvc-ceph-client-key
              adminSecretName: pvc-ceph-client-key
              adminSecretNamespace: openstack
              pool: replicapool

        ceph:
          enabled: true
          rgw_keystone_auth: false

        images:
          tags:
            ceph_bootstrap: "quay.io/airshipit/ceph-daemon:ubuntu_jammy_20.2.1-1-20260407"
            ceph_config_helper: "quay.io/airshipit/ceph-config-helper:ubuntu_jammy_20.2.1-1-20260407"
            csi_provisioner: "registry.k8s.io/sig-storage/csi-provisioner:v4.0.1"
            csi_snapshotter: "registry.k8s.io/sig-storage/csi-snapshotter:v7.0.2"
            csi_attacher: "registry.k8s.io/sig-storage/csi-attacher:v4.5.1"
            csi_resizer: "registry.k8s.io/sig-storage/csi-resizer:v1.10.1"
            csi_registrar: "registry.k8s.io/sig-storage/csi-node-driver-registrar:v2.10.1"
            cephcsi: "quay.io/cephcsi/cephcsi:v3.16.2"
            dep_check: "quay.io/airshipit/kubernetes-entrypoint:latest-ubuntu_noble"
            image_repo_sync: "docker.io/library/docker:17.07.0"
  destination:
    server: https://172.16.10.100:6443
    namespace: rook-ceph
  syncPolicy:
    automated:
      prune: false
      selfHeal: true
    retry:
      limit: 5
      backoff:
        duration: 30s
        factor: 2
        maxDuration: 5m
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true
