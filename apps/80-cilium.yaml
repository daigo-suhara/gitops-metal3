apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: cilium-prod
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "30"
spec:
  project: default
  source:
    repoURL: https://helm.cilium.io/
    targetRevision: 1.15.4
    chart: cilium
    helm:
      values: |
        kubeProxyReplacement: true
        k8sServiceHost: 172.16.10.10
        k8sServicePort: 6443
        ipam:
          mode: kubernetes
  destination:
    server: https://172.16.10.10:6443
    namespace: kube-system
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true
