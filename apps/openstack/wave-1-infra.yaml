---
# Wave 1-a: MariaDB Galera (database for all OpenStack services)
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: openstack-mariadb
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "1"
spec:
  project: default
  source:
    repoURL: https://opendev.org/openstack/openstack-helm.git
    path: mariadb
    targetRevision: master
    helm:
      releaseName: mariadb
      values: |
        labels:
          server:
            node_selector_key: openstack-control-plane
            node_selector_value: enabled
          ingress:
            node_selector_key: openstack-control-plane
            node_selector_value: enabled
          error_page:
            node_selector_key: openstack-control-plane
            node_selector_value: enabled
          prometheus_mysql_exporter:
            node_selector_key: openstack-control-plane
            node_selector_value: enabled

        pod:
          replicas:
            server: 3
          management_policy: Parallel

        volume:
          enabled: true
          class_name: ceph-rbd
          size: 10Gi

        images:
          pull_policy: "IfNotPresent"
          tags:
            mariadb: "quay.io/airshipit/mariadb:latest-ubuntu_noble"
            mariadb_perms: "quay.io/airshipit/mariadb:latest-ubuntu_noble"
            db_init: "quay.io/airshipit/openstack-client:latest-ubuntu_noble"
            db_drop: "quay.io/airshipit/openstack-client:latest-ubuntu_noble"
            dep_check: "quay.io/airshipit/kubernetes-entrypoint:latest-ubuntu_noble"
            image_repo_sync: "docker.io/library/docker:17.07.0"
            prometheus_mysql_exporter: "docker.io/prom/mysqld-exporter:v0.12.1"

        bootstrap:
          enabled: true

        endpoints:
          oslo_db:
            auth:
              admin:
                password: openstack-changeme
              exporter:
                password: openstack-changeme
  destination:
    server: https://172.16.10.100:6443
    namespace: openstack
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    retry:
      limit: 5
      backoff:
        duration: 30s
        factor: 2
        maxDuration: 5m
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true
      - WaitForJobs=true
---
# Wave 1-b: RabbitMQ (message broker for all OpenStack services)
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: openstack-rabbitmq
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "1"
spec:
  project: default
  source:
    repoURL: https://opendev.org/openstack/openstack-helm.git
    path: rabbitmq
    targetRevision: master
    helm:
      releaseName: rabbitmq
      values: |
        labels:
          server:
            node_selector_key: openstack-control-plane
            node_selector_value: enabled
          prometheus_rabbitmq_exporter:
            node_selector_key: openstack-control-plane
            node_selector_value: enabled

        pod:
          replicas:
            server: 3

        volume:
          enabled: true
          class_name: ceph-rbd
          size: 5Gi

        images:
          pull_policy: "IfNotPresent"
          tags:
            rabbitmq: "docker.io/library/rabbitmq:3.13-management"
            rabbitmq_init: "quay.io/airshipit/openstack-client:latest-ubuntu_noble"
            dep_check: "quay.io/airshipit/kubernetes-entrypoint:latest-ubuntu_noble"
            image_repo_sync: "docker.io/docker:17.07.0"

        endpoints:
          oslo_messaging:
            auth:
              admin:
                username: admin
                password: openstack-changeme
              openstack:
                username: openstack
                password: openstack-changeme
  destination:
    server: https://172.16.10.100:6443
    namespace: openstack
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    retry:
      limit: 5
      backoff:
        duration: 30s
        factor: 2
        maxDuration: 5m
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true
---
# Wave 1-c: Memcached (caching for OpenStack services)
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: openstack-memcached
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "1"
spec:
  project: default
  source:
    repoURL: https://opendev.org/openstack/openstack-helm.git
    path: memcached
    targetRevision: master
    helm:
      releaseName: memcached
      values: |
        labels:
          server:
            node_selector_key: openstack-control-plane
            node_selector_value: enabled

        images:
          pull_policy: "IfNotPresent"
          tags:
            memcached: "docker.io/library/memcached:1.6"
            dep_check: "quay.io/airshipit/kubernetes-entrypoint:latest-ubuntu_noble"
            image_repo_sync: "docker.io/docker:17.07.0"
  destination:
    server: https://172.16.10.100:6443
    namespace: openstack
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    retry:
      limit: 3
      backoff:
        duration: 15s
        factor: 2
        maxDuration: 3m
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true
---
# Wave 1-d: OVN database (network control plane)
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: openstack-ovn
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "1"
spec:
  project: default
  source:
    repoURL: https://opendev.org/openstack/openstack-helm.git
    path: ovn
    targetRevision: master
    helm:
      releaseName: ovn
      values: |
        labels:
          ovn_ovsdb_nb:
            node_selector_key: openstack-network-node
            node_selector_value: enabled
          ovn_ovsdb_sb:
            node_selector_key: openstack-network-node
            node_selector_value: enabled
          ovn_northd:
            node_selector_key: openstack-network-node
            node_selector_value: enabled
          ovn_controller:
            node_selector_key: openstack-compute-node
            node_selector_value: enabled
          ovn_controller_gw:
            node_selector_key: openstack-control-plane
            node_selector_value: enabled

        images:
          pull_policy: "IfNotPresent"
          tags:
            ovn_ovsdb_nb: "quay.io/airshipit/ovn:ubuntu_noble"
            ovn_ovsdb_sb: "quay.io/airshipit/ovn:ubuntu_noble"
            ovn_northd: "quay.io/airshipit/ovn:ubuntu_noble"
            ovn_controller: "quay.io/airshipit/ovn:ubuntu_noble"
            ovn_controller_gw: "quay.io/airshipit/ovn:ubuntu_noble"
            dep_check: "quay.io/airshipit/kubernetes-entrypoint:latest-ubuntu_noble"
            image_repo_sync: "docker.io/library/docker:17.07.0"

        volume:
          class_name: ceph-rbd

        conf:
          ovn_bridge_mappings: "external:br-ex"
          ovn_system_id_compat: false
  destination:
    server: https://172.16.10.100:6443
    namespace: openstack
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    retry:
      limit: 5
      backoff:
        duration: 30s
        factor: 2
        maxDuration: 5m
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true
