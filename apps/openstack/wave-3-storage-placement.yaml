---
# Wave 3-c: Cinder (block storage - needs keystone + mariadb + rabbitmq)
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: openstack-cinder
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "3"
spec:
  project: default
  source:
    repoURL: https://opendev.org/openstack/openstack-helm.git
    path: cinder
    targetRevision: master
    helm:
      releaseName: cinder
      values: |
        labels:
          api:
            node_selector_key: openstack-control-plane
            node_selector_value: enabled
          backup:
            node_selector_key: openstack-control-plane
            node_selector_value: enabled
          scheduler:
            node_selector_key: openstack-control-plane
            node_selector_value: enabled
          volume:
            node_selector_key: openstack-control-plane
            node_selector_value: enabled
          job:
            node_selector_key: openstack-control-plane
            node_selector_value: enabled

        images:
          pull_policy: "IfNotPresent"
          tags:
            bootstrap: "quay.io/airshipit/openstack-client:latest-ubuntu_noble"
            db_init: "quay.io/airshipit/openstack-client:latest-ubuntu_noble"
            cinder_db_sync: "quay.io/airshipit/cinder:2025.1-ubuntu_noble"
            db_drop: "quay.io/airshipit/openstack-client:latest-ubuntu_noble"
            ks_endpoints: "quay.io/airshipit/openstack-client:latest-ubuntu_noble"
            ks_service: "quay.io/airshipit/openstack-client:latest-ubuntu_noble"
            ks_user: "quay.io/airshipit/openstack-client:latest-ubuntu_noble"
            rabbit_init: "docker.io/library/rabbitmq:3.13-management"
            cinder_api: "quay.io/airshipit/cinder:2025.1-ubuntu_noble"
            cinder_backup: "quay.io/airshipit/cinder:2025.1-ubuntu_noble"
            cinder_scheduler: "quay.io/airshipit/cinder:2025.1-ubuntu_noble"
            cinder_volume: "quay.io/airshipit/cinder:2025.1-ubuntu_noble"
            cinder_volume_usage_audit: "quay.io/airshipit/cinder:2025.1-ubuntu_noble"
            dep_check: "quay.io/airshipit/kubernetes-entrypoint:latest-ubuntu_noble"
            image_repo_sync: "docker.io/library/docker:17.07.0"

        manifests:
          job_db_init: true
          job_db_sync: true
          job_ks_user: true
          job_ks_service: true
          job_ks_endpoints: true
          test: false

        conf:
          ceph:
            enabled: true
          cinder:
            DEFAULT:
              log_config_append: null
              enabled_backends: ceph
              default_volume_type: ceph
            ceph:
              volume_driver: cinder.volume.drivers.rbd.RBDDriver
              rbd_cluster_name: ceph
              rbd_pool: cinder-volumes
              rbd_ceph_conf: /etc/ceph/ceph.conf
              rbd_flatten_volume_from_snapshot: false
              rbd_max_clone_depth: 5
              rbd_store_chunk_size: 4
              rbd_user: cinder
              rbd_secret_uuid: 457eb676-33da-42ec-9a8c-9293d545c337

        endpoints:
          identity:
            auth:
              admin:
                password: openstack-changeme
              cinder:
                password: openstack-changeme
          oslo_db:
            auth:
              admin:
                password: openstack-changeme
              cinder:
                password: openstack-changeme
          oslo_messaging:
            auth:
              admin:
                username: admin
                password: openstack-changeme
              cinder:
                username: cinder
                password: openstack-changeme
  destination:
    server: https://172.16.10.100:6443
    namespace: openstack
  syncPolicy:
    automated:
      prune: false
      selfHeal: true
    retry:
      limit: 5
      backoff:
        duration: 30s
        factor: 2
        maxDuration: 5m
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true
      - WaitForJobs=true
