---
# Wave 0: Ingress NGINX (prerequisite - needed by all services for endpoint exposure)
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: openstack-ingress
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "0"
spec:
  project: default
  source:
    repoURL: https://kubernetes.github.io/ingress-nginx
    chart: ingress-nginx
    targetRevision: "4.11.2"
    helm:
      releaseName: ingress-openstack
      values: |
        controller:
          kind: DaemonSet
          hostNetwork: true
          ingressClassResource:
            name: ingress-openstack
            enabled: true
            default: false
          ingressClass: ingress-openstack
          nodeSelector:
            openstack-control-plane: "enabled"
          image:
            registry: registry.k8s.io
            image: ingress-nginx/controller
            tag: "v1.11.2"
            digest: ""
          service:
            type: LoadBalancer
            loadBalancerIP: 172.16.10.210
          config:
            proxy-body-size: "0"
          tolerations:
            - key: node-role.kubernetes.io/control-plane
              operator: Exists
              effect: NoSchedule
  destination:
    server: https://172.16.10.100:6443
    namespace: openstack
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    retry:
      limit: 3
      backoff:
        duration: 15s
        factor: 2
        maxDuration: 3m
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true
---
# Wave 0: Libvirt (compute hypervisor - must be ready before nova-compute)
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: openstack-libvirt
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "0"
spec:
  project: default
  source:
    repoURL: https://opendev.org/openstack/openstack-helm.git
    path: libvirt
    targetRevision: master
    helm:
      releaseName: libvirt
      values: |
        labels:
          agent:
            libvirt:
              node_selector_key: openstack-compute-node
              node_selector_value: enabled

        conf:
          ceph:
            enabled: true
          qemu:
            user: "root"
            group: "root"
          libvirt:
            listen_addr: "0.0.0.0"

        images:
          pull_policy: "IfNotPresent"
          tags:
            libvirt: "quay.io/airshipit/libvirt:2026.1-ubuntu_noble"
            dep_check: "quay.io/airshipit/kubernetes-entrypoint:latest-ubuntu_noble"
            image_repo_sync: "docker.io/library/docker:17.07.0"
            libvirt_exporter: "docker.io/prom/libvirt-exporter:v0.1.0"

        network:
          backend:
            - ovs
  destination:
    server: https://172.16.10.100:6443
    namespace: openstack
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    retry:
      limit: 5
      backoff:
        duration: 30s
        factor: 2
        maxDuration: 5m
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true
