# Builds a CAPI-ready qcow2 with kubernetes-sigs/image-builder (the same
# tool Nordix uses), publishes it to a GitHub Release so
# Metal3MachineTemplate can pull it over the Cloudflare-fronted GH CDN
# instead of Nordix's slower Artifactory.
name: build-node-image

on:
  workflow_dispatch:
    inputs:
      k8s_version:
        description: 'Kubernetes version without leading v (e.g. 1.36.2)'
        required: true
        default: '1.36.2'
      slim:
        description: 'Skip pre-pulling kubeadm images to shrink qcow2 by ~500MB'
        type: boolean
        default: false
  push:
    tags: ['node-image-v*']

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 90
    steps:
      - name: Resolve k8s version
        id: v
        run: |
          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            echo "k8s=${{ inputs.k8s_version }}" >> "$GITHUB_OUTPUT"
            echo "slim=${{ inputs.slim }}"       >> "$GITHUB_OUTPUT"
          else
            v="${GITHUB_REF_NAME#node-image-v}"
            echo "k8s=$v"    >> "$GITHUB_OUTPUT"
            echo "slim=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Enable KVM on runner
        run: |
          sudo apt-get update
          sudo apt-get install -y qemu-utils qemu-system-x86 \
            libvirt-daemon-system libvirt-clients bridge-utils
          sudo chmod 666 /dev/kvm

      - name: Checkout kubernetes-sigs/image-builder
        uses: actions/checkout@v4
        with:
          repository: kubernetes-sigs/image-builder
          ref: main
          path: image-builder

      - name: Build ubuntu-2404 qcow2
        env:
          KUBERNETES_SEMVER: v${{ steps.v.outputs.k8s }}
          KUBERNETES_DEB_VERSION: ${{ steps.v.outputs.k8s }}-1.1
          KUBERNETES_RPM_VERSION: ${{ steps.v.outputs.k8s }}-0
          # PACKER_VAR_FILES lets us override just the tweakable knobs
          # (load_additional_components toggles the pre-pull role).
          SLIM: ${{ steps.v.outputs.slim }}
        working-directory: image-builder/images/capi
        run: |
          make deps-qemu
          if [[ "$SLIM" == "true" ]]; then
            cat > /tmp/slim-overrides.json <<EOF
          { "load_additional_components": "false" }
          EOF
            PACKER_VAR_FILES=/tmp/slim-overrides.json make build-qemu-ubuntu-2404
          else
            make build-qemu-ubuntu-2404
          fi

      - name: Compute checksum and rename
        id: art
        working-directory: image-builder/images/capi
        run: |
          set -euo pipefail
          out_dir=$(ls -d output/ubuntu-2404-kube-* | head -1)
          in=$(ls "$out_dir"/*.qcow2 | head -1)
          suffix=""
          [[ "${{ steps.v.outputs.slim }}" == "true" ]] && suffix="-slim"
          artifact="ubuntu-2404-kube-v${{ steps.v.outputs.k8s }}${suffix}.qcow2"
          cp "$in" "$artifact"
          sha256sum "$artifact" | awk '{print $1}' > "$artifact.sha256"
          ls -lh "$artifact" "$artifact.sha256"
          echo "artifact=$artifact"       >> "$GITHUB_OUTPUT"
          echo "artifact_dir=$(pwd)"      >> "$GITHUB_OUTPUT"

      - name: Publish to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: node-image-v${{ steps.v.outputs.k8s }}${{ steps.v.outputs.slim == 'true' && '-slim' || '' }}
          name: node image v${{ steps.v.outputs.k8s }}${{ steps.v.outputs.slim == 'true' && ' (slim)' || '' }}
          fail_on_unmatched_files: true
          files: |
            image-builder/images/capi/${{ steps.art.outputs.artifact }}
            image-builder/images/capi/${{ steps.art.outputs.artifact }}.sha256
