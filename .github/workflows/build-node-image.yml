name: Build node image

on:
  workflow_dispatch:
    inputs:
      ubuntu_version:
        description: Ubuntu version (2204 / 2404 / 2604)
        default: "2404"
        type: choice
        options: ["2204", "2404", "2604"]
      kubernetes_version:
        description: Kubernetes semver (e.g. v1.36.2)
        default: v1.36.2
        type: string
      image_builder_ref:
        description: k8s-sigs/image-builder git ref
        default: main
        type: string

concurrency:
  group: build-node-image-${{ inputs.ubuntu_version }}-${{ inputs.kubernetes_version }}
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-24.04
    timeout-minutes: 90
    steps:
      - name: Enable KVM and install QEMU
        run: |
          echo 'KERNEL=="kvm", GROUP="kvm", MODE="0666"' | sudo tee /etc/udev/rules.d/99-kvm4all.rules
          sudo udevadm control --reload-rules
          sudo udevadm trigger --name-match=kvm
          sudo apt-get update
          sudo apt-get install -y qemu-system-x86 qemu-utils xorriso

      - name: Checkout image-builder
        uses: actions/checkout@v4
        with:
          repository: kubernetes-sigs/image-builder
          ref: ${{ inputs.image_builder_ref }}
          path: image-builder

      - name: Install QEMU build dependencies
        working-directory: image-builder/images/capi
        run: make deps-qemu

      - name: Build qcow2
        working-directory: image-builder/images/capi
        env:
          PACKER_LOG: "1"
        run: |
          echo '{"kubernetes_semver": "${{ inputs.kubernetes_version }}"}' > /tmp/vars.json
          PACKER_VAR_FILES=/tmp/vars.json make build-qemu-ubuntu-${{ inputs.ubuntu_version }}-cloudimg

      - name: Locate output and compute checksum
        id: out
        working-directory: image-builder/images/capi
        run: |
          set -eux
          ASSET=$(find output -mindepth 2 -maxdepth 2 -type f ! -name '*.json' -print -quit)
          sha256sum "$ASSET" | tee "$ASSET.sha256"
          echo "asset=$PWD/$ASSET" >>"$GITHUB_OUTPUT"
          echo "sha256=$PWD/$ASSET.sha256" >>"$GITHUB_OUTPUT"
          echo "tag=node-image/ubuntu-${{ inputs.ubuntu_version }}-k8s-${{ inputs.kubernetes_version }}" >>"$GITHUB_OUTPUT"

      - name: Publish GitHub release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -eux
          TAG='${{ steps.out.outputs.tag }}'
          if gh release view "$TAG" >/dev/null 2>&1; then
            gh release upload "$TAG" '${{ steps.out.outputs.asset }}' '${{ steps.out.outputs.sha256 }}' --clobber
          else
            gh release create "$TAG" \
              --title "Ubuntu ${{ inputs.ubuntu_version }} + Kubernetes ${{ inputs.kubernetes_version }}" \
              --notes "Built from k8s-sigs/image-builder@${{ inputs.image_builder_ref }} by run ${{ github.run_id }}." \
              '${{ steps.out.outputs.asset }}' '${{ steps.out.outputs.sha256 }}'
          fi
