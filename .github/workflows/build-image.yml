name: Build and Push Kubernetes Node Image
run-name: Build k8s ${{ inputs.kubernetesVersion || 'v1.35.4' }} (flatcar)

on:
  workflow_dispatch:
    inputs:
      kubernetesVersion:
        description: "Kubernetes version (e.g., v1.35.4)"
        required: true
        default: "v1.35.4"
      imageBuilderRef:
        description: "kubernetes-sigs/image-builder ref"
        required: true
        default: "main"

env:
  REGISTRY: ghcr.io
  KUBERNETES_VERSION: ${{ inputs.kubernetesVersion || 'v1.35.4' }}
  IMAGE_BUILDER_REF: ${{ inputs.imageBuilderRef || 'main' }}
  OS_FLAVOR: flatcar

permissions:
  contents: read
  packages: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: amd64
            runner: ubuntu-24.04
    runs-on: ${{ matrix.runner }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install QEMU/KVM
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            qemu-utils qemu-system-x86 qemu-kvm
          sudo modprobe kvm || true
          test -e /dev/kvm && sudo chmod 666 /dev/kvm || true

      - name: Checkout kubernetes-sigs/image-builder
        run: |
          git clone --depth 1 --branch "${IMAGE_BUILDER_REF}" \
            https://github.com/kubernetes-sigs/image-builder.git

      - name: Build image
        working-directory: image-builder/images/capi
        env:
          PACKER_FLAGS: "--var kubernetes_semver=${{ env.KUBERNETES_VERSION }}"
        run: |
          make deps-qemu
          make build-qemu-${{ env.OS_FLAVOR }}

      - name: Stage artifact
        run: |
          mkdir -p dist
          echo "=== image-builder output ==="
          ls -laR image-builder/images/capi/output/ || true
          SRC=$(find image-builder/images/capi/output -type f \( -name '*.qcow2' -o -name '*.img' -o -name '*.raw' \) | head -1)
          [ -z "$SRC" ] && { echo "ERROR: no image produced"; exit 1; }
          EXT="${SRC##*.}"
          DST=dist/${{ env.OS_FLAVOR }}-k8s-${{ env.KUBERNETES_VERSION }}-${{ matrix.arch }}.${EXT}
          cp "$SRC" "$DST"
          md5sum "$DST" | cut -d ' ' -f 1 > "$DST.md5"

      - name: Upload image artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.OS_FLAVOR }}-k8s-${{ env.KUBERNETES_VERSION }}-${{ matrix.arch }}
          path: dist/
          retention-days: 2

  push:
    needs: build
    strategy:
      fail-fast: false
      matrix:
        arch: [amd64]
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download image artifact
        uses: actions/download-artifact@v4
        with:
          name: ${{ env.OS_FLAVOR }}-k8s-${{ env.KUBERNETES_VERSION }}-${{ matrix.arch }}
          path: dist/

      - name: Install oras
        uses: oras-project/setup-oras@v2

      - name: Log in to container registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Compute lowercase repository owner
        run: echo "OWNER_LC=${GITHUB_REPOSITORY_OWNER,,}" >> "$GITHUB_ENV"

      - name: Push image to OCI registry
        run: |
          IMAGE=dist/${{ env.OS_FLAVOR }}-k8s-${{ env.KUBERNETES_VERSION }}-${{ matrix.arch }}.qcow2
          REPO=${{ env.REGISTRY }}/${OWNER_LC}/gitops-metal3/${{ env.OS_FLAVOR }}
          TAG=${{ env.KUBERNETES_VERSION }}-${{ matrix.arch }}

          oras push \
            --artifact-type application/vnd.unknown.artifact.v1 \
            --annotation diskformat=qcow2 \
            "${REPO}:${TAG}" \
            "${IMAGE}" \
            "${IMAGE}.md5"
