name: Build and Push Kubernetes Node Image
run-name: Build k8s ${{ inputs.kubernetesVersion || 'v1.35.4' }} (arm64)

on:
  workflow_dispatch:
    inputs:
      kubernetesVersion:
        description: "Kubernetes version (e.g., v1.35.4)"
        required: true
        default: "v1.35.4"
      imageBuilderRef:
        description: "kubernetes-sigs/image-builder ref"
        required: true
        default: "main"

env:
  REGISTRY: ghcr.io
  KUBERNETES_VERSION: ${{ inputs.kubernetesVersion || 'v1.35.4' }}
  UBUNTU_VERSION: "24.04"
  ARCH: arm64

permissions:
  contents: read
  packages: write

jobs:
  build:
    name: Build arm64
    runs-on: ubuntu-24.04-arm
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y git make qemu-utils qemu-system-arm
          sudo modprobe kvm || true
          test -e /dev/kvm && sudo chmod 666 /dev/kvm || true

      - name: Checkout kubernetes-sigs/image-builder
        run: |
          git clone --depth 1 --branch "${{ inputs.imageBuilderRef }}" https://github.com/kubernetes-sigs/image-builder.git

      - name: Build Raw Image
        working-directory: image-builder/images/capi
        env:
          PACKER_FLAGS: >-
            --var kubernetes_semver=${{ env.KUBERNETES_VERSION }}
            --var qemu_binary=qemu-system-aarch64
        run: |
          make deps-qemu
          make build-raw-ubuntu-2404 ARCH=${{ env.ARCH }}

      - name: Prepare Artifacts
        run: |
          mkdir -p dist
          SOURCE="image-builder/images/capi/output/ubuntu-2404-kube-${{ env.KUBERNETES_VERSION }}.gz"
          FILENAME="ubuntu-${{ env.UBUNTU_VERSION }}-k8s-${{ env.KUBERNETES_VERSION }}-${{ env.ARCH }}.gz"
          cp "$SOURCE" "dist/$FILENAME"
          sha256sum "dist/$FILENAME" | cut -d ' ' -f 1 > "dist/$FILENAME.sha256"

      - name: Upload Image
        uses: actions/upload-artifact@v4
        with:
          name: node-image-arm64
          path: dist/
          retention-days: 1

  push:
    name: Push arm64
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Download Artifacts
        uses: actions/download-artifact@v4
        with:
          name: node-image-arm64
          path: dist/

      - name: Setup ORAS
        uses: oras-project/setup-oras@v2

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Push to OCI Registry
        run: |
          IMAGE_FILE="ubuntu-${{ env.UBUNTU_VERSION }}-k8s-${{ env.KUBERNETES_VERSION }}-${{ env.ARCH }}.gz"
          TAG="${{ env.UBUNTU_VERSION }}-${{ env.KUBERNETES_VERSION }}-${{ env.ARCH }}.gz"
          REPO="${{ env.REGISTRY }}/${{ github.repository_owner }}/gitops-metal3/ubuntu"
          
          oras push \
            --artifact-type application/vnd.unknown.artifact.v1 \
            --annotation disktype=raw \
            "${REPO,,}:${TAG}" \
            "dist/${IMAGE_FILE}"
