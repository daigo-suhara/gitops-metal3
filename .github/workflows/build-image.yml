name: Build and Push Kubernetes Node Image
run-name: Build k8s ${{ inputs.kubernetesVersion || 'v1.35.4' }} (ubuntu 24.04)

on:
  workflow_dispatch:
    inputs:
      kubernetesVersion:
        description: "Kubernetes version (e.g., v1.35.4)"
        required: true
        default: "v1.35.4"
      image_builder_ref:
        description: "kubernetes-sigs/image-builder ref"
        required: true
        default: "main"

env:
  REGISTRY: ghcr.io
  KUBERNETES_VERSION: ${{ inputs.kubernetesVersion || 'v1.35.4' }}
  UBUNTU_VERSION: "24.04"

permissions:
  contents: read
  packages: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: amd64
            runner: ubuntu-24.04
          - arch: arm64
            runner: ubuntu-24.04-arm
    runs-on: ${{ matrix.runner }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Install host dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y git make qemu-utils
          if [ "${{ matrix.arch }}" = "amd64" ]; then
            sudo apt-get install -y qemu-system-x86 qemu-kvm
          else
            sudo apt-get install -y qemu-system-arm
          fi
          sudo modprobe kvm || true
          test -e /dev/kvm && sudo chmod 666 /dev/kvm || true

      - name: Checkout image-builder
        run: |
          git clone --depth 1 --branch "${{ inputs.image_builder_ref }}" https://github.com/kubernetes-sigs/image-builder.git

      - name: Build image
        working-directory: image-builder/images/capi
        env:
          PACKER_FLAGS: >-
            --var kubernetes_semver=${{ env.KUBERNETES_VERSION }}
            ${{ matrix.arch == 'arm64' && '--var qemu_binary=qemu-system-aarch64' || '' }}
        run: |
          make deps-qemu
          make build-raw-ubuntu-2404 ARCH=${{ matrix.arch }}

      - name: Prepare image assets
        run: |
          mkdir -p dist
          SOURCE_IMAGE="image-builder/images/capi/output/ubuntu-2404-kube-${{ env.KUBERNETES_VERSION }}.gz"
          DEST_IMAGE="ubuntu-${{ env.UBUNTU_VERSION }}-k8s-${{ env.KUBERNETES_VERSION }}-${{ matrix.arch }}.gz"
          cp "$SOURCE_IMAGE" "dist/$DEST_IMAGE"
          sha256sum "dist/$DEST_IMAGE" | cut -d ' ' -f 1 > "dist/$DEST_IMAGE.sha256"

      - name: Upload image artifact
        uses: actions/upload-artifact@v7
        with:
          name: ubuntu-${{ env.UBUNTU_VERSION }}-k8s-${{ env.KUBERNETES_VERSION }}-${{ matrix.arch }}
          path: dist/
          retention-days: 2

  push:
    needs: build
    strategy:
      fail-fast: false
      matrix:
        arch: [amd64, arm64]
    runs-on: ubuntu-latest
    steps:
      - name: Download image artifact
        uses: actions/download-artifact@v8
        with:
          name: ubuntu-${{ env.UBUNTU_VERSION }}-k8s-${{ env.KUBERNETES_VERSION }}-${{ matrix.arch }}
          path: dist/

      - name: Setup ORAS
        uses: oras-project/setup-oras@v2

      - name: Log in to container registry
        uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Compute lowercase repository owner
        run: echo "OWNER_LC=${GITHUB_REPOSITORY_OWNER,,}" >> "$GITHUB_ENV"

      - name: Push image to OCI registry
        run: |
          IMAGE_FILE="ubuntu-${{ env.UBUNTU_VERSION }}-k8s-${{ env.KUBERNETES_VERSION }}-${{ matrix.arch }}.gz"
          TAG="${{ env.UBUNTU_VERSION }}-${{ env.KUBERNETES_VERSION }}-${{ matrix.arch }}.gz"
          
          oras push \
            --artifact-type application/vnd.unknown.artifact.v1 \
            --annotation disktype=raw \
            "${{ env.REGISTRY }}/${{ env.OWNER_LC }}/gitops-metal3/ubuntu:${TAG}" \
            "dist/${IMAGE_FILE}"
