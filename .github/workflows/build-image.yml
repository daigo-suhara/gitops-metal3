name: Build and Push Flatcar Node Image
run-name: Build Flatcar k8s ${{ inputs.kubernetesVersion || 'v1.35.4' }} (amd64)

on:
  workflow_dispatch:
    inputs:
      kubernetesVersion:
        description: "Kubernetes version (e.g., v1.35.4)"
        required: true
        default: "v1.35.4"
      imageBuilderRef:
        description: "kubernetes-sigs/image-builder ref"
        required: true
        default: "main"

env:
  REGISTRY: ghcr.io
  KUBERNETES_VERSION: ${{ inputs.kubernetesVersion || 'v1.35.4' }}
  OS_FLAVOR: flatcar
  ARCH: amd64

permissions:
  contents: read
  packages: write

jobs:
  build:
    name: Build amd64
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y git make qemu-utils qemu-system-x86 qemu-kvm
          sudo modprobe kvm || true
          test -e /dev/kvm && sudo chmod 666 /dev/kvm || true

      - name: Checkout kubernetes-sigs/image-builder
        run: |
          git clone --depth 1 --branch "${{ inputs.imageBuilderRef }}" https://github.com/kubernetes-sigs/image-builder.git

      - name: Build Flatcar Image
        working-directory: image-builder/images/capi
        env:
          PACKER_FLAGS: "--var kubernetes_semver=${{ env.KUBERNETES_VERSION }}"
        run: |
          make deps-qemu
          make build-qemu-flatcar

      - name: Prepare Artifacts
        run: |
          mkdir -p dist
          SOURCE=$(ls image-builder/images/capi/output/flatcar-kube-*/*.qcow2 | head -1)
          FILENAME="flatcar-k8s-${{ env.KUBERNETES_VERSION }}-${{ env.ARCH }}.qcow2"
          cp "$SOURCE" "dist/$FILENAME"
          md5sum "dist/$FILENAME" | cut -d ' ' -f 1 > "dist/$FILENAME.md5"

      - name: Upload Image
        uses: actions/upload-artifact@v4
        with:
          name: node-image-amd64
          path: dist/
          retention-days: 1

  push:
    name: Push amd64
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Download Artifacts
        uses: actions/download-artifact@v4
        with:
          name: node-image-amd64
          path: dist/

      - name: Setup ORAS
        uses: oras-project/setup-oras@v2

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Push to OCI Registry
        run: |
          IMAGE_FILE="flatcar-k8s-${{ env.KUBERNETES_VERSION }}-${{ env.ARCH }}.qcow2"
          TAG="${{ env.KUBERNETES_VERSION }}-${{ env.ARCH }}"
          REPO="${{ env.REGISTRY }}/${{ github.repository_owner }}/gitops-metal3/flatcar"

          oras push \
            --artifact-type application/vnd.unknown.artifact.v1 \
            --annotation diskformat=qcow2 \
            "${REPO,,}:${TAG}" \
            "dist/${IMAGE_FILE}" \
            "dist/${IMAGE_FILE}.md5"
