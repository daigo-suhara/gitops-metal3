name: Build OS Image

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      k8s_version:
        description: 'Kubernetes Version'
        required: true
        default: 'v1.35.4'

jobs:
  build:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y qemu-utils qemu-system-x86 python3-pip unzip cpu-checker
          pip3 install ansible --break-system-packages
          # KVMの権限を強制付与
          sudo chmod 666 /dev/kvm || true

      - name: Check KVM
        run: |
          kvm-ok || echo "KVM is not available"
          ls -l /dev/kvm || echo "/dev/kvm not found"

      - name: Clone image-builder
        run: git clone https://github.com/kubernetes-sigs/image-builder.git

      - name: Add swap space
        run: |
          SWAPFILE="/swapfile_extra"
          if [ ! -f "$SWAPFILE" ]; then
            sudo dd if=/dev/zero of="$SWAPFILE" bs=1M count=4096
            sudo chmod 600 "$SWAPFILE"
            sudo mkswap "$SWAPFILE"
            sudo swapon "$SWAPFILE"
          else
            echo "Swap file already exists, skipping creation"
          fi

      - name: Build Image
        working-directory: image-builder/images/capi
        env:
          PACKER_LOG: 1
        run: |
          export PATH="$PWD/.local/bin:$PATH"
          make deps-raw
          
          # KVMが使えない環境向けに tcg を強制し、メモリ割り当てを調整
          # image-builderのMakefileは PACKER_FLAGS を受け取る設計が多いです
          export PACKER_FLAGS="-var 'qemu_accelerator=tcg' -var 'memory=4096' -var 'cpus=2'"
          
          make build-raw-ubuntu-2404 KUBERNETES_VERSION=${{ github.event.inputs.k8s_version || 'v1.35.4' }}
          
          IMAGE_NAME="ubuntu-2404-kube-${{ github.event.inputs.k8s_version || 'v1.35.4' }}.raw"
          mv $(find output -name "*.raw" | head -n 1) "$IMAGE_NAME"
          sha256sum "$IMAGE_NAME" > "$IMAGE_NAME.sha256"
          echo "IMAGE_NAME=$IMAGE_NAME" >> $GITHUB_ENV

      - name: Release
        uses: softprops/action-gh-release@v2
        if: startsWith(github.ref, 'refs/tags/')
        with:
          files: |
            image-builder/images/capi/${{ env.IMAGE_NAME }}
            image-builder/images/capi/${{ env.IMAGE_NAME }}.sha256
