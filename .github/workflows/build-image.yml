name: Build OS Image

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      k8s_version:
        description: 'Kubernetes Version'
        required: true
        default: 'v1.35.4'

jobs:
  build:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y qemu-utils qemu-system-x86 python3-pip unzip
          pip3 install ansible --break-system-packages

      - name: Clone image-builder
        run: git clone https://github.com/kubernetes-sigs/image-builder.git

      - name: Build Image
        working-directory: image-builder/images/capi
        run: |
          export PATH="$PWD/.local/bin:$PATH"
          make deps-raw
          make build-raw-ubuntu-2404 KUBERNETES_VERSION=${{ github.event.inputs.k8s_version || 'v1.35.4' }}
          
          IMAGE_NAME="ubuntu-2404-kube-${{ github.event.inputs.k8s_version || 'v1.35.4' }}.raw"
          mv $(find output -name "*.raw" | head -n 1) "$IMAGE_NAME"
          sha256sum "$IMAGE_NAME" > "$IMAGE_NAME.sha256"
          echo "IMAGE_NAME=$IMAGE_NAME" >> $GITHUB_ENV

      - name: Release
        uses: softprops/action-gh-release@v2
        if: startsWith(github.ref, 'refs/tags/')
        with:
          files: |
            image-builder/images/capi/${{ env.IMAGE_NAME }}
            image-builder/images/capi/${{ env.IMAGE_NAME }}.sha256
