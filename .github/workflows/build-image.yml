name: Build OS Image

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      k8s_version:
        description: 'Kubernetes Version'
        required: true
        default: 'v1.35.4'

jobs:
  build:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y qemu-utils qemu-system-x86 python3-pip unzip cpu-checker
          pip3 install ansible --break-system-packages

      - name: Enable KVM
        run: |
          echo 'KERNEL=="kvm", GROUP="kvm", MODE="0666", OPTIONS+="static_node=kvm"' | sudo tee /etc/udev/rules.d/99-kvm4all.rules
          sudo udevadm control --reload-rules
          sudo udevadm trigger --name-match=kvm
          sudo usermod -a -G kvm $USER
          sudo chmod 666 /dev/kvm || true
          kvm-ok || echo "KVM is not available"

      - name: Clone image-builder
        run: git clone https://github.com/kubernetes-sigs/image-builder.git

      - name: Add swap space
        run: |
          SWAPFILE="/swapfile_extra"
          if [ ! -f "$SWAPFILE" ]; then
            sudo dd if=/dev/zero of="$SWAPFILE" bs=1M count=4096
            sudo chmod 600 "$SWAPFILE"
            sudo mkswap "$SWAPFILE"
            sudo swapon "$SWAPFILE"
          else
            echo "Swap file already exists, skipping creation"
          fi

      - name: Build Image
        working-directory: image-builder/images/capi
        env:
          PACKER_LOG: 1
        run: |
          export PATH="$PWD/.local/bin:$PATH"
          make deps-raw
          
          # KVMが使えない環境向けに tcg を強制し、リソース制限を調整
          # PACKER_FLAGS を make の引数として明示的に渡します
          export P_FLAGS="-var 'qemu_accelerator=tcg' -var 'memory=2048' -var 'cpus=1'"
          
          make build-raw-ubuntu-2404 \
            KUBERNETES_VERSION=${{ github.event.inputs.k8s_version || 'v1.35.4' }} \
            PACKER_FLAGS="$P_FLAGS"
          
          IMAGE_NAME="ubuntu-2404-kube-${{ github.event.inputs.k8s_version || 'v1.35.4' }}.raw"
          mv $(find output -name "*.raw" | head -n 1) "$IMAGE_NAME"
          sha256sum "$IMAGE_NAME" > "$IMAGE_NAME.sha256"
          echo "IMAGE_NAME=$IMAGE_NAME" >> $GITHUB_ENV

      - name: Release
        uses: softprops/action-gh-release@v2
        if: startsWith(github.ref, 'refs/tags/')
        with:
          files: |
            image-builder/images/capi/${{ env.IMAGE_NAME }}
            image-builder/images/capi/${{ env.IMAGE_NAME }}.sha256
