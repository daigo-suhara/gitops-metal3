name: Build and Push Kubernetes Node Image
run-name: Build k8s ${{ inputs.kubernetesVersion || 'v1.35.4' }} (ubuntu-2404)

on:
  workflow_dispatch:
    inputs:
      kubernetesVersion:
        description: "Kubernetes version (e.g., v1.35.4)"
        required: true
        default: "v1.35.4"
      imageBuilderRef:
        description: "kubernetes-sigs/image-builder ref"
        required: true
        default: "main"

env:
  KUBERNETES_VERSION: ${{ inputs.kubernetesVersion || 'v1.35.4' }}
  IMAGE_BUILDER_REF: ${{ inputs.imageBuilderRef || 'main' }}
  OS_FLAVOR: ubuntu-2404-efi

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: amd64
            runner: ubuntu-24.04
    runs-on: ${{ matrix.runner }}
    steps:
      - name: Install QEMU/KVM
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            qemu-utils qemu-system-x86 qemu-kvm
          sudo modprobe kvm || true
          test -e /dev/kvm && sudo chmod 666 /dev/kvm || true

      - name: Checkout kubernetes-sigs/image-builder
        run: |
          git clone --depth 1 --branch "${IMAGE_BUILDER_REF}" \
            https://github.com/kubernetes-sigs/image-builder.git

      - name: Build image
        working-directory: image-builder/images/capi
        env:
          PACKER_FLAGS: "--var kubernetes_semver=${{ env.KUBERNETES_VERSION }}"
        run: |
          make deps-raw
          make build-raw-${{ env.OS_FLAVOR }}

      - name: Stage artifact
        run: |
          mkdir -p dist
          SRC=$(find image-builder/images/capi/output -type f -name '*.gz' -size +100M | head -1)
          [ -z "$SRC" ] && { echo "ERROR: no image produced"; ls -laR image-builder/images/capi/output/; exit 1; }
          DST=dist/${{ env.OS_FLAVOR }}-k8s-${{ env.KUBERNETES_VERSION }}-${{ matrix.arch }}.raw.gz
          cp "$SRC" "$DST"
          sha256sum "$DST" | awk '{print $1}' > "$DST.sha256"

      - name: Upload to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ env.OS_FLAVOR }}-${{ env.KUBERNETES_VERSION }}
          name: ${{ env.OS_FLAVOR }} ${{ env.KUBERNETES_VERSION }}
          files: dist/*
