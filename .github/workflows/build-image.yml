name: Customize Metal3 Ubuntu image with kube-vip
run-name: Image k8s ${{ inputs.kubernetesVersion || 'v1.35.4' }} + kube-vip ${{ inputs.kubeVipVersion || 'v0.8.9' }}

on:
  workflow_dispatch:
    inputs:
      kubernetesVersion:
        description: "Kubernetes version (matches Nordix path)"
        required: true
        default: "v1.35.4"
      kubeVipVersion:
        description: "kube-vip release"
        required: true
        default: "v0.8.9"

permissions:
  contents: write

env:
  K8S_VERSION: ${{ inputs.kubernetesVersion || 'v1.35.4' }}
  KUBE_VIP_VERSION: ${{ inputs.kubeVipVersion || 'v0.8.9' }}

jobs:
  build:
    runs-on: ubuntu-24.04
    steps:
      - name: Install libguestfs and qemu
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            libguestfs-tools linux-image-generic qemu-utils
          sudo chmod 0644 /boot/vmlinuz-*

      - name: Stage Nordix base image
        run: |
          mkdir -p dist
          curl -fL --retry 10 -o dist/ubuntu-k8s.qcow2 \
            "https://artifactory.nordix.org/artifactory/metal3/images/k8s_${K8S_VERSION}/UBUNTU_24.04_NODE_IMAGE_K8S_${K8S_VERSION}.qcow2"

      - name: Stage kube-vip binary
        run: |
          curl -fL --retry 10 -o /tmp/kube-vip.tgz \
            "https://github.com/kube-vip/kube-vip/releases/download/${KUBE_VIP_VERSION}/kube-vip_${KUBE_VIP_VERSION#v}_linux_amd64.tar.gz"
          mkdir -p /tmp/kubevip && tar -xzf /tmp/kube-vip.tgz -C /tmp/kubevip kube-vip
          chmod +x /tmp/kubevip/kube-vip

      - name: Inject kube-vip into image
        run: |
          export LIBGUESTFS_BACKEND=direct
          sudo -E virt-customize -a dist/ubuntu-k8s.qcow2 \
            --copy-in /tmp/kubevip/kube-vip:/usr/local/bin \
            --run-command 'chmod 0755 /usr/local/bin/kube-vip' \
            --run-command 'mkdir -p /etc/kubernetes/manifests'

      - name: Compute checksum
        run: |
          sha256sum dist/ubuntu-k8s.qcow2 | awk '{print $1}' > dist/ubuntu-k8s.qcow2.sha256
          ls -la dist/

      - name: Upload to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: image-${{ env.K8S_VERSION }}-kubevip-${{ env.KUBE_VIP_VERSION }}
          name: Ubuntu 24.04 + k8s ${{ env.K8S_VERSION }} + kube-vip ${{ env.KUBE_VIP_VERSION }}
          files: dist/*
