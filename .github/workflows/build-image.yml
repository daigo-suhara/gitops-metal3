name: Build CAPI image

on:
  workflow_dispatch:
    inputs:
      kubernetes_version:
        description: Kubernetes version to install
        required: true
        default: v1.35.4
      kubernetes_series:
        description: Kubernetes package series
        required: true
        default: v1.35
      kubernetes_deb_version:
        description: Kubernetes deb package version
        required: true
        default: 1.35.4-1.1
      image_builder_ref:
        description: kubernetes-sigs/image-builder ref
        required: true
        default: main
      image_ref:
        description: ghcr reference for the OCI artifact
        required: true
        default: ghcr.io/daigo-suhara/gitops-metal3/ubuntu-2404-kube-v1.35:latest

permissions:
  contents: read
  packages: write

jobs:
  build:
    runs-on: ubuntu-24.04
    timeout-minutes: 360
    env:
      IMAGE_NAME: ubuntu-2404-kube-v1.35.qcow2

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install host dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y git make qemu-kvm qemu-utils
          sudo modprobe kvm || true
          test -e /dev/kvm && sudo chmod 666 /dev/kvm || true
          go install oras.land/oras/cmd/oras@v1.2.0
          echo "$HOME/go/bin" >> "$GITHUB_PATH"

      - name: Checkout image-builder
        run: |
          git clone --depth 1 --branch "${{ inputs.image_builder_ref }}" https://github.com/kubernetes-sigs/image-builder.git

      - name: Build qcow2 image
        working-directory: image-builder/images/capi
        env:
          PACKER_FLAGS: >-
            --var "kubernetes_semver=${{ inputs.kubernetes_version }}"
            --var "kubernetes_series=${{ inputs.kubernetes_series }}"
            --var "kubernetes_deb_version=${{ inputs.kubernetes_deb_version }}"
        run: |
          make deps-qemu
          make build-qemu-ubuntu-2404

      - name: Prepare image assets
        run: |
          mkdir -p dist
          image_path="$(
            find image-builder/images/capi/output -type f \
              ! -name '*.gz' \
              ! -name '*.sha*' \
              ! -name '*.log' \
              | sort \
              | head -n 1
          )"
          test -n "$image_path"
          qemu-img info "$image_path"
          qemu-img convert -O qcow2 "$image_path" "dist/$IMAGE_NAME"
          sha256sum "dist/$IMAGE_NAME" | cut -d ' ' -f 1 > "dist/$IMAGE_NAME.sha256"
          qemu-img info "dist/$IMAGE_NAME"
          ls -lh dist

      - name: Push OCI artifact
        env:
          GHCR_USER: ${{ github.actor }}
          GHCR_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          printf '%s' "$GHCR_TOKEN" | oras login ghcr.io -u "$GHCR_USER" --password-stdin
          oras push \
            --artifact-type application/vnd.unknown.artifact.v1 \
            --annotation disktype=qcow2 \
            "${{ inputs.image_ref }}" \
            "dist/$IMAGE_NAME"
