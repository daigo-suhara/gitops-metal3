name: Build CAPI image

on:
  workflow_dispatch:
    inputs:
      kubernetes_version:
        description: Kubernetes version to install
        required: true
        default: v1.35.4
      kubernetes_series:
        description: Kubernetes package series
        required: true
        default: v1.35
      kubernetes_deb_version:
        description: Kubernetes deb package version
        required: true
        default: 1.35.4-1.1
      image_builder_ref:
        description: kubernetes-sigs/image-builder ref
        required: true
        default: main
      image_ref:
        description: ghcr reference for the OCI artifact
        required: true
        default: ghcr.io/daigo-suhara/gitops-metal3/ubuntu:2404-v1.35.4-arm64.gz

permissions:
  contents: read
  packages: write

jobs:
  build:
    runs-on: ubuntu-24.04
    timeout-minutes: 360
    env:
      IMAGE_NAME: ubuntu-2404-${{ inputs.kubernetes_version }}-arm64.gz

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install host dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y git make qemu-kvm qemu-utils
          sudo modprobe kvm || true
          test -e /dev/kvm && sudo chmod 666 /dev/kvm || true

      - name: Setup ORAS
        uses: oras-project/setup-oras@v1

      - name: Checkout image-builder
        run: |
          git clone --depth 1 --branch "${{ inputs.image_builder_ref }}" https://github.com/kubernetes-sigs/image-builder.git

      - name: Build image
        working-directory: image-builder/images/capi
        env:
          PACKER_FLAGS: >-
            --var "kubernetes_semver=${{ inputs.kubernetes_version }}"
            --var "kubernetes_series=${{ inputs.kubernetes_series }}"
            --var "kubernetes_deb_version=${{ inputs.kubernetes_deb_version }}"
        run: |
          make deps-qemu
          make build-raw-ubuntu-2404

      - name: Prepare image assets
        run: |
          mkdir -p dist
          cp image-builder/images/capi/output/ubuntu-2404-kube-${{ inputs.kubernetes_version }}.gz "dist/$IMAGE_NAME"
          sha256sum "dist/$IMAGE_NAME" | cut -d ' ' -f 1 > "dist/$IMAGE_NAME.sha256"
          ls -lh dist

      - name: Push OCI artifact
        env:
          GHCR_USER: ${{ github.actor }}
          GHCR_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          oras login ghcr.io -u "$GHCR_USER" -p "$GHCR_TOKEN"
          oras push \
            --artifact-type application/vnd.unknown.artifact.v1 \
            --annotation disktype=raw \
            "${{ inputs.image_ref }}" \
            "dist/$IMAGE_NAME"
